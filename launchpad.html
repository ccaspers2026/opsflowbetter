<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>OpsFlowBetter — LaunchPad</title>
    <style>
        :root {
            --bg-page: #0d1117;
            --bg-card: #161b22;
            --border: #21262d;
            --border-hover: #30363d;
            --text-bright: #e6edf3;
            --text-primary: #c9d1d9;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Top Bar ─────────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: rgba(13, 17, 23, 0.95);
            border-bottom: 1px solid var(--border);
        }
        .brand {
            font-size: 22px;
            font-weight: 800;
            text-decoration: none;
        }
        .brand:hover { opacity: 0.85; }
        .brand .ops { color: var(--text-bright); }
        .brand .flow { color: #3b82f6; }
        .brand .better { color: #8b5cf6; }
        .topbar-meta { font-size: 12px; color: var(--text-dim); }

        /* ── Main ────────────────────────────────────────────── */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 28px 32px 40px;
        }

        .greeting {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }
        .greeting-sub {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        /* ── Section Labels ──────────────────────────────────── */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        /* ── Sphere Grid (Suite section — not in cards) ──────── */
        .sphere-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            margin-bottom: 36px;
        }

        /* ── Card Grid ───────────────────────────────────────── */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 36px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 20px 20px;
            transition: border-color 0.25s ease;
        }
        .card:hover { border-color: var(--border-hover); }
        .card-wide { grid-column: 1 / -1; }
        .card-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            text-align: center;
        }
        .card-spheres {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
        }

        /* ══════════════════════════════════════════════════════════
           3D SPHERE
           - Two-layer radial gradient: main color + dark vignette
           - Deep inset shadows for curvature
           - Specular highlight (::after)
           - Colored ground glow (.sphere-shadow)
           - Hover: scale + colored glow
           ══════════════════════════════════════════════════════════ */

        .sphere-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.35s ease;
        }
        .sphere-item:hover {
            transform: scale(1.12);
        }

        .sphere-wrap {
            position: relative;
            width: 88px;
            height: 88px;
        }

        .sphere {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.35s ease;
            box-shadow:
                inset -12px -12px 30px rgba(0, 0, 0, 0.75),
                inset 6px 6px 18px rgba(255, 255, 255, 0.08),
                0 10px 30px rgba(0, 0, 0, 0.6),
                0 3px 10px rgba(0, 0, 0, 0.4);
        }

        /* Hover glow — uses --glow from sphere-item */
        .sphere-item:hover .sphere {
            box-shadow:
                inset -12px -12px 30px rgba(0, 0, 0, 0.75),
                inset 6px 6px 18px rgba(255, 255, 255, 0.08),
                0 10px 30px rgba(0, 0, 0, 0.6),
                0 3px 10px rgba(0, 0, 0, 0.4),
                0 0 40px var(--glow, rgba(88,166,255,0.3));
        }

        /* Specular highlight */
        .sphere::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 16%;
            width: 24%;
            height: 18%;
            background: radial-gradient(
                ellipse at 50% 50%,
                rgba(255, 255, 255, 0.7) 0%,
                rgba(255, 255, 255, 0.3) 35%,
                transparent 70%
            );
            border-radius: 50%;
            transform: rotate(-20deg);
            pointer-events: none;
            z-index: 3;
        }

        /* Ground shadow — colored glow matching sphere color via --glow */
        .sphere-shadow {
            width: 60px;
            height: 10px;
            margin: 8px auto 0;
            background: radial-gradient(ellipse,
                var(--glow, rgba(88,166,255,0.2)) 0%,
                transparent 70%);
            border-radius: 50%;
            filter: blur(4px);
            transition: all 0.35s ease;
        }
        .sphere-item:hover .sphere-shadow {
            width: 72px;
            height: 8px;
            filter: blur(5px);
        }

        /* Sphere text */
        .sphere-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4;
            font-weight: 800;
            font-size: 15px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7), 0 0 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .sphere-label {
            font-size: 12px; font-weight: 600; color: var(--text-primary);
            text-align: center; max-width: 90px; line-height: 1.3;
        }
        .sphere-item:hover .sphere-label { color: #fff; }
        .sphere-sublabel { font-size: 10px; color: var(--text-dim); }

        /* ── Sphere Colors ───────────────────────────────────── */
        .sphere-p2m {

                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }

        }
        .sphere-removebg {

                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        .sphere-cloudflare {

        }

        }
        .sphere-r2 {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }
        .sphere-services {
            background:

        }
        .sphere-tasty {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #88ff88 0%, #38d860 30%, #20a840 55%, #107028 80%, #083818 100%);
        }
        .sphere-truist {

                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #dab0ff 0%, #9848d8 30%, #7028b8 55%, #481080 80%, #280848 100%);
        }
        .sphere-optionstrat {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }
        .sphere-youtube {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #ff8080 0%, #e83838 30%, #c01818 55%, #801010 80%, #400808 100%);
        }
        .sphere-amazon {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #ffe088 0%, #f0a828 30%, #d08018 55%, #885008 80%, #402800 100%);
        }
        .sphere-chatgpt {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #90f8d0 0%, #20c090 30%, #109870 55%, #086850 80%, #043830 100%);
        }
        .sphere-claude {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }
        .sphere-tradingview {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }
        .sphere-tradersync {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #80e8b8 0%, #38c878 30%, #20a058 55%, #107038 80%, #083820 100%);
        }
        .sphere-discord {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #a0a8ff 0%, #5865f2 30%, #404cc0 55%, #283080 80%, #141840 100%);
        }
        .sphere-onshape {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),

        }
        .sphere-sellercentral {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #ffcc80 0%, #ff9900 30%, #d07800 55%, #8a5000 80%, #402800 100%);
        }
        .sphere-monday {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #ff90c0 0%, #f04088 30%, #c02068 55%, #801040 80%, #400820 100%);
        }
        .sphere-calendly {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #70c8ff 0%, #006bff 30%, #0050c8 55%, #003890 80%, #001c48 100%);
        }
        .sphere-autofarm {
            background:
                radial-gradient(circle at 70% 75%, rgba(0,0,0,0.5) 0%, transparent 55%),
                radial-gradient(circle at 32% 25%, #ffd060 0%, #e8a020 30%, #c07810 55%, #785008 80%, #402800 100%);
        }

        /* ── P2M Sub-links (capsule pills) ──────────────────── */
        .p2m-sublinks {
            display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
            margin-top: -28px; margin-bottom: 36px; padding: 16px 24px 12px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            max-width: 720px; margin-left: auto; margin-right: auto;
        }
        .p2m-sublink {
            display: flex; text-decoration: none; color: inherit;
            transition: transform 0.25s ease;
        }
        .p2m-sublink:hover { transform: scale(1.08); }

        /* The capsule: two-tone pill via split gradient, text sizes the pill */
        .capsule {
            display: inline-flex; align-items: center; justify-content: center;
            height: 28px; border-radius: 14px;
            padding: 0 16px;
            position: relative; overflow: hidden;
            background:
                linear-gradient(180deg, #2884e0 0%, #1560b0 50%, #0c3870 100%);
            box-shadow:
                inset 0 -4px 10px rgba(0,0,0,0.5),
                inset 0 3px 8px rgba(255,255,255,0.06),
                0 4px 12px rgba(0,0,0,0.4);
            transition: box-shadow 0.25s ease;
        }
        /* Right-half lighter overlay */
        .capsule::before {
            content: '';
            position: absolute; top: 0; right: 0;
            width: 50%; height: 100%;
            background: linear-gradient(180deg, #60baff 0%, #3a90e8 50%, #1a6cc0 100%);
            border-left: 1px solid rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .p2m-sublink:hover .capsule {
            box-shadow:
                inset 0 -4px 10px rgba(0,0,0,0.5),
                inset 0 3px 8px rgba(255,255,255,0.06),
                0 4px 12px rgba(0,0,0,0.4),
                0 0 18px rgba(74,158,255,0.3);
        }

        /* Specular highlight across the top */
        .capsule::after {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%;
            height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            border-radius: 0 0 50% 50%;
            pointer-events: none;
            z-index: 2;
        }

        .capsule-text {
            position: relative; z-index: 3;
            font-size: 10px; font-weight: 700; color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 24px; }

        .footer {
            text-align: center; padding: 24px; font-size: 11px;
            color: var(--text-dim); border-top: 1px solid var(--border);
        }

        /* ── Admin Mode ─────────────────────────────────────── */
        .admin-toggle {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            font-size: 16px; cursor: pointer; padding: 4px 10px; border-radius: 6px;
            transition: all 0.2s; margin-left: 12px;
        }
        .admin-toggle:hover { border-color: #58a6ff; color: #58a6ff; }
        .admin-toggle.active { border-color: #f0883e; color: #f0883e; background: rgba(240,136,62,0.1); }

        /* Sphere overlay controls (hidden until admin mode) */
        .sphere-admin-overlay {
            display: none;
            position: absolute; top: -6px; right: -6px; left: -6px; bottom: -6px;
            z-index: 10;
        }
        body.admin-mode .sphere-admin-overlay { display: flex; gap: 4px; justify-content: center; align-items: flex-start; padding-top: 2px; }
        body.admin-mode .sphere-item { pointer-events: none; }
        body.admin-mode .sphere-admin-overlay,
        body.admin-mode .sphere-admin-overlay button { pointer-events: auto; }

        .sphere-admin-overlay button {
            width: 24px; height: 24px; border-radius: 50%; border: none;
            font-size: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            transition: transform 0.15s;
        }
        .sphere-admin-overlay button:hover { transform: scale(1.15); }
        .btn-sphere-edit { background: #58a6ff; color: #fff; }
        .btn-sphere-delete { background: #f85149; color: #fff; }

        /* Add sphere button */
        .sphere-add-btn {
            display: none;
            flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; transition: transform 0.25s;
        }
        body.admin-mode .sphere-add-btn { display: flex; }
        .sphere-add-btn:hover { transform: scale(1.1); }
        .sphere-add-circle {
            width: 88px; height: 88px; border-radius: 50%;
            border: 2px dashed var(--border-hover);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--text-dim);
            transition: all 0.2s;
        }
        .sphere-add-btn:hover .sphere-add-circle {
            border-color: #58a6ff; color: #58a6ff;
        }
        .sphere-add-label { font-size: 11px; color: var(--text-dim); }

        /* Add group button */
        .group-add-btn {
            display: none;
            background: var(--bg-card); border: 2px dashed var(--border-hover);
            border-radius: 12px; padding: 20px; text-align: center;
            cursor: pointer; color: var(--text-dim); font-size: 13px;
            transition: all 0.2s;
        }
        body.admin-mode .group-add-btn { display: block; }
        .group-add-btn:hover { border-color: #58a6ff; color: #58a6ff; }

        /* Card label edit in admin mode */
        body.admin-mode .card-label-editable { cursor: pointer; transition: color 0.2s; }
        body.admin-mode .card-label-editable:hover { color: #58a6ff; }

        /* ── Modal ──────────────────────────────────────────── */
        .modal-backdrop {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 10000;
            align-items: center; justify-content: center;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 24px; width: 400px; max-width: 90vw;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .modal h3 { color: #e6edf3; font-size: 16px; margin-bottom: 16px; }
        .modal label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; margin-top: 12px; }
        .modal label:first-of-type { margin-top: 0; }
        .modal input, .modal select {
            width: 100%; padding: 8px 10px; background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; color: #e6edf3; font-size: 13px;
        }
        .modal input:focus, .modal select:focus { outline: none; border-color: #58a6ff; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions button {
            padding: 8px 16px; border-radius: 6px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-modal-cancel { background: #21262d; color: #c9d1d9; }
        .btn-modal-cancel:hover { background: #30363d; }
        .btn-modal-save { background: #238636; color: #fff; }
        .btn-modal-save:hover { background: #2ea043; }
        .btn-modal-delete { background: #da3633; color: #fff; }
        .btn-modal-delete:hover { background: #f85149; }
    </style>
</head>

        <input type="text" id="modalSublabel" placeholder="e.g. ↗ code">
        <label>URL</label>
        <input type="text" id="modalUrl" placeholder="https://...">
        <label>Color</label>
        <select id="modalColor"></select>
        <div class="modal-actions">
            <button class="btn-modal-delete" id="modalDelete" style="margin-right:auto;">Delete</button>
            <button class="btn-modal-cancel" id="modalCancel">Cancel</button>
            <button class="btn-modal-save" id="modalSave">Save</button>
        </div>
    </div>
</div>

<div class="footer">
    OpsFlowBetter &mdash; Built by makers, for makers &mdash; High Point, NC
</div>

<script src="shared/opsflow-sync.js?v=084"></script>
<script>
// ══════════════════════════════════════════════════════════════
// LaunchPad v0.77.0 — Admin mode: Add / Edit / Delete spheres
//
// Links are stored in localStorage key: opsflow_launchpad
// Format: { tools: [...], personal: [...] }
// Each tool item: { text, label, sublabel, url, color }
// Personal items: { group: 'Name' } as separators, then sphere items
//
// Admin mode: click gear icon to toggle. Adds edit/delete overlays
// and "+" buttons for adding new spheres and groups.
// ══════════════════════════════════════════════════════════════

(function() {

    // ── Time-based greeting ──────────────────────────────────
    var h = new Date().getHours();
    var msg = 'Good evening';
    if (h >= 5 && h < 12) msg = 'Good morning';
    else if (h >= 12 && h < 17) msg = 'Good afternoon';
    document.getElementById('greeting').textContent = msg;

    // ── Glow color map ───────────────────────────────────────
    var GLOW_MAP = {
        p2m:           'rgba(74, 158, 255, 0.35)',
        helium:        'rgba(255, 140, 74, 0.35)',
        removebg:      'rgba(92, 224, 138, 0.35)',
        cloudflare:    'rgba(255, 184, 74, 0.35)',
        github:        'rgba(150, 150, 150, 0.25)',
        r2:            'rgba(122, 184, 255, 0.35)',
        services:      'rgba(139, 92, 246, 0.35)',
        tasty:         'rgba(34, 197, 94, 0.35)',
        truist:        'rgba(123, 47, 190, 0.35)',
        optionstrat:   'rgba(14, 165, 233, 0.35)',
        youtube:       'rgba(220, 38, 38, 0.35)',
        amazon:        'rgba(245, 158, 11, 0.35)',
        chatgpt:       'rgba(16, 163, 127, 0.35)',
        claude:        'rgba(217, 153, 61, 0.35)',
        tradingview:   'rgba(41, 98, 255, 0.35)',
        tradersync:    'rgba(56, 200, 120, 0.35)',
        discord:       'rgba(88, 101, 242, 0.35)',
        onshape:       'rgba(64, 152, 208, 0.35)',
        sellercentral: 'rgba(255, 153, 0, 0.35)',
        monday:        'rgba(240, 64, 136, 0.35)',
        calendly:      'rgba(0, 107, 255, 0.35)',
        autofarm:      'rgba(232, 160, 32, 0.35)'
    };

    // Color display names for the dropdown
    var COLOR_NAMES = {
        helium: 'Orange (Helium 10)',
        removebg: 'Green (remove.bg)',
        cloudflare: 'Gold (Cloudflare)',
        github: 'Grey (GitHub)',
        r2: 'Light Blue (R2)',
        services: 'Purple (Services)',
        tasty: 'Bright Green (tastytrade)',
        truist: 'Violet (Truist)',
        optionstrat: 'Teal (OptionStrat)',
        youtube: 'Red (YouTube)',
        amazon: 'Amber (Amazon)',
        chatgpt: 'Mint (ChatGPT)',
        claude: 'Warm Gold (Claude)',
        tradingview: 'Royal Blue (TradingView)',
        tradersync: 'Sea Green (TraderSync)',
        discord: 'Indigo (Discord)',
        onshape: 'Steel Blue (OnShape)',
        sellercentral: 'Orange (Seller Central)',
        monday: 'Pink (Monday)',
        calendly: 'Blue (Calendly)',
        autofarm: 'Dark Gold (AutoFarm3D)',
        p2m: 'P2M Blue'
    };

    // ── Default link data ────────────────────────────────────
    var DEFAULTS = {
        tools: [
            { text: 'H10',  label: 'Helium 10',      sublabel: '\u2197 research',   url: 'https://www.helium10.com/',                      color: 'helium' },
            { text: 'rb',   label: 'remove.bg',      sublabel: '\u2197 images',     url: 'https://www.remove.bg/',                         color: 'removebg' },
            { text: 'CF',   label: 'Cloudflare',     sublabel: '\u2197 infra',      url: 'https://dash.cloudflare.com/',                   color: 'cloudflare' },
            { text: 'GH',   label: 'GitHub',          sublabel: '\u2197 code',       url: 'https://github.com/ccaspers2026/opsflowbetter', color: 'github' },
            { text: 'SC',   label: 'Seller Central', sublabel: '\u2197 amazon',     url: 'https://sellercentral.amazon.com/',              color: 'sellercentral' },
            { text: 'OS',   label: 'OnShape',         sublabel: '\u2197 cad',        url: 'https://www.onshape.com/',                       color: 'onshape' },
            { text: 'M',    label: 'Monday',           sublabel: '\u2197 tasks',      url: 'https://monday.com/',                            color: 'monday' },
            { text: 'Cal',  label: 'Calendly',        sublabel: '\u2197 schedule',   url: 'https://calendly.com/',                          color: 'calendly' },
            { text: 'AF',   label: 'AutoFarm3D',     sublabel: '\u2197 print farm', url: 'http://192.168.100.144:8080/overview',           color: 'autofarm' }
        ],
        personal: [
            { group: 'Trading' },
            { text: 'TT',   label: 'tastytrade',     sublabel: '\u2197 broker',     url: 'https://tastytrade.com/',        color: 'tasty' },
            { text: 'TV',   label: 'TradingView',    sublabel: '\u2197 charts',     url: 'https://www.tradingview.com/',   color: 'tradingview' },
            { text: 'OStr', label: 'OptionStrat',     sublabel: '\u2197 options',    url: 'https://optionstrat.com/',       color: 'optionstrat' },
            { text: 'TS',   label: 'TraderSync',      sublabel: '\u2197 journal',    url: 'https://www.tradersync.com/',    color: 'tradersync' },
            { group: 'Banking' },
            { text: 'T',    label: 'Truist',           sublabel: '\u2197 banking',    url: 'https://www.truist.com/',        color: 'truist' },
            { group: 'Shopping' },
            { text: 'AMZ',  label: 'Amazon',           sublabel: '\u2197 shopping',   url: 'https://www.amazon.com/',        color: 'amazon' },
            { group: 'AI & Media' },
            { text: 'AI',   label: 'ChatGPT',          sublabel: '\u2197 ai',         url: 'https://chatgpt.com/',           color: 'chatgpt' },
            { text: 'C',    label: 'Claude',            sublabel: '\u2197 ai',         url: 'https://claude.ai/',             color: 'claude' },
            { text: 'YT',   label: 'YouTube',          sublabel: '\u2197 media',      url: 'https://www.youtube.com/',       color: 'youtube' },
            { text: 'DC',   label: 'Discord',          sublabel: '\u2197 community',  url: 'https://discord.com/channels/@me', color: 'discord' }
        ]
    };

    // ── Load / Save ──────────────────────────────────────────
    var STORAGE_KEY = 'opsflow_launchpad';
    function loadConfig() {
        try {
            return OpsFlow.getLocal(STORAGE_KEY);
        } catch(e) { return null; }
    }
    function saveConfig() {
        OpsFlow.set(STORAGE_KEY, { tools: tools, personal: personal });
    }

    var config = loadConfig();
    if (!config) config = {};
    var tools    = config.tools    || DEFAULTS.tools;
    var personal = config.personal || DEFAULTS.personal;

    // ── Parse personal items into groups ──────────────────────
    function parseGroups(items) {
        var groups = [];
        var current = { name: 'Personal', items: [] };
        for (var i = 0; i < items.length; i++) {
            if (items[i].group) {
                if (current.items.length > 0) groups.push(current);
                current = { name: items[i].group, items: [] };
            } else {
                current.items.push(items[i]);
            }
        }
        if (current.items.length > 0) groups.push(current);
        return groups;
    }

    // ── Render a single sphere item (with admin overlay) ─────
    function renderSphere(item, section, index) {
        var a = document.createElement('a');
        a.href = item.url;
        a.className = 'sphere-item';
        a.target = '_blank';
        a.rel = 'noopener';

        var glowColor = GLOW_MAP[item.color] || item.glow || 'rgba(88,166,255,0.2)';
        a.style.setProperty('--glow', glowColor);

        var sphereClass = item.color ? ' sphere-' + item.color : '';
        var inlineStyle = '';
        if (item.bg) inlineStyle += 'background:' + item.bg + ';';

        a.innerHTML =
            '<div class="sphere-wrap">' +
                '<div class="sphere' + sphereClass + '"' + (inlineStyle ? ' style="' + inlineStyle + '"' : '') + '>' +
                    '<span class="sphere-text">' + item.text + '</span>' +
                '</div>' +
                '<div class="sphere-shadow"></div>' +
                '<div class="sphere-admin-overlay">' +
                    '<button class="btn-sphere-edit" data-section="' + section + '" data-index="' + index + '" title="Edit">&#9998;</button>' +
                    '<button class="btn-sphere-delete" data-section="' + section + '" data-index="' + index + '" title="Delete">\u00D7</button>' +
                '</div>' +
            '</div>' +
            '<div class="sphere-label">' + item.label + '</div>' +
            '<div class="sphere-sublabel">' + item.sublabel + '</div>';

        return a;
    }

    // ── Add sphere button ────────────────────────────────────
    function renderAddButton(section, groupName) {
        var btn = document.createElement('div');
        btn.className = 'sphere-add-btn';
        btn.setAttribute('data-section', section);
        if (groupName) btn.setAttribute('data-group', groupName);
        btn.innerHTML =
            '<div class="sphere-add-circle">+</div>' +
            '<div class="sphere-add-label">Add</div>';
        btn.addEventListener('click', function() {
            openModal(null, section, groupName);
        });
        return btn;
    }

    // ── Build a card element ─────────────────────────────────
    function createCard(label, items, wide, section, groupName) {
        var card = document.createElement('div');
        card.className = 'card' + (wide ? ' card-wide' : '');

        var lbl = document.createElement('div');
        lbl.className = 'card-label card-label-editable';
        lbl.textContent = label;
        if (groupName) {
            lbl.addEventListener('click', function() {
                if (!document.body.classList.contains('admin-mode')) return;
                var newName = prompt('Rename group:', groupName);
                if (newName && newName.trim() && newName !== groupName) {
                    // Find the group header in personal array and rename it
                    for (var i = 0; i < personal.length; i++) {
                        if (personal[i].group === groupName) {
                            personal[i].group = newName.trim();
                            break;
                        }
                    }
                    saveConfig();
                    renderAll();
                }
            });
        }
        card.appendChild(lbl);

        var spheres = document.createElement('div');
        spheres.className = 'card-spheres';
        for (var i = 0; i < items.length; i++) {
            spheres.appendChild(renderSphere(items[i], section, i));
        }
        // Add button at end
        spheres.appendChild(renderAddButton(section, groupName));
        card.appendChild(spheres);

        return card;
    }

    // ── Render everything ────────────────────────────────────
    function renderAll() {
        var cardGrid = document.getElementById('card-grid');
        cardGrid.innerHTML = '';

        // Tools card
        cardGrid.appendChild(createCard('Tools & Services', tools, true, 'tools', null));

        // Personal group cards
        var personalGroups = parseGroups(personal);
        for (var g = 0; g < personalGroups.length; g++) {
            cardGrid.appendChild(createCard(
                personalGroups[g].name,
                personalGroups[g].items,
                false,
                'personal-' + personalGroups[g].name,
                personalGroups[g].name
            ));
        }

        // Add group button
        var addGroupBtn = document.createElement('div');
        addGroupBtn.className = 'group-add-btn';
        addGroupBtn.textContent = '+ Add Group';
        addGroupBtn.addEventListener('click', function() {
            var name = prompt('New group name:');
            if (name && name.trim()) {
                personal.push({ group: name.trim() });
                saveConfig();
                renderAll();
            }
        });
        cardGrid.appendChild(addGroupBtn);
    }

    // ── Event delegation for edit/delete buttons ─────────────
    function handleSphereAction(e) {
        var btn = e.target.closest('.btn-sphere-edit, .btn-sphere-delete');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();

        var section = btn.getAttribute('data-section');
        var index = parseInt(btn.getAttribute('data-index'), 10);

        if (btn.classList.contains('btn-sphere-edit')) {
            var item = getItem(section, index);
            if (item) openModal(item, section, null, index);
        } else if (btn.classList.contains('btn-sphere-delete')) {
            var item = getItem(section, index);
            if (item && confirm('Delete "' + item.label + '"?')) {
                deleteItem(section, index);
                saveConfig();
                renderAll();
            }
        }
    }

    // ── Get/Delete item by section key + index ───────────────
    function getItem(section, index) {
        if (section === 'tools') return tools[index];
        // personal-GroupName → find items in that group
        var groupName = section.replace('personal-', '');
        var groups = parseGroups(personal);
        for (var g = 0; g < groups.length; g++) {
            if (groups[g].name === groupName) return groups[g].items[index];
        }
        return null;
    }

    function deleteItem(section, index) {
        if (section === 'tools') {
            tools.splice(index, 1);
            return;
        }
        var groupName = section.replace('personal-', '');
        // Find the actual flat-array index of this item
        var count = -1;
        var inGroup = false;
        for (var i = 0; i < personal.length; i++) {
            if (personal[i].group === groupName) { inGroup = true; count = -1; continue; }
            if (personal[i].group && personal[i].group !== groupName) { inGroup = false; continue; }
            if (inGroup) {
                count++;
                if (count === index) {
                    personal.splice(i, 1);
                    return;
                }
            }
        }
    }

    function setItem(section, index, item) {
        if (section === 'tools') {
            tools[index] = item;
            return;
        }
        var groupName = section.replace('personal-', '');
        var count = -1;
        var inGroup = false;
        for (var i = 0; i < personal.length; i++) {
            if (personal[i].group === groupName) { inGroup = true; count = -1; continue; }
            if (personal[i].group && personal[i].group !== groupName) { inGroup = false; continue; }
            if (inGroup) {
                count++;
                if (count === index) {
                    personal[i] = item;
                    return;
                }
            }
        }
    }

    function addItem(section, groupName, item) {
        if (section === 'tools') {
            tools.push(item);
            return;
        }
        if (groupName) {
            // Insert after the last item in this group
            var lastIdx = -1;
            var inGroup = false;
            for (var i = 0; i < personal.length; i++) {
                if (personal[i].group === groupName) { inGroup = true; lastIdx = i; continue; }
                if (personal[i].group && personal[i].group !== groupName && inGroup) break;
                if (inGroup) lastIdx = i;
            }
            personal.splice(lastIdx + 1, 0, item);
        } else {
            personal.push(item);
        }
    }

    // ── Admin Toggle ─────────────────────────────────────────
    var adminBtn = document.getElementById('adminToggle');
    adminBtn.addEventListener('click', function() {
        document.body.classList.toggle('admin-mode');
        adminBtn.classList.toggle('active');
    });

    // ── Modal ────────────────────────────────────────────────
    var modal = document.getElementById('sphereModal');
    var modalTitle = document.getElementById('modalTitle');
    var fText = document.getElementById('modalText');
    var fLabel = document.getElementById('modalLabel');
    var fSublabel = document.getElementById('modalSublabel');
    var fUrl = document.getElementById('modalUrl');
    var fColor = document.getElementById('modalColor');
    var btnDelete = document.getElementById('modalDelete');
    var btnCancel = document.getElementById('modalCancel');
    var btnSave = document.getElementById('modalSave');

    // Populate color dropdown
    var colorKeys = Object.keys(COLOR_NAMES);
    fColor.innerHTML = '';
    for (var c = 0; c < colorKeys.length; c++) {
        var opt = document.createElement('option');
        opt.value = colorKeys[c];
        opt.textContent = COLOR_NAMES[colorKeys[c]];
        fColor.appendChild(opt);
    }

    var _editSection = null;
    var _editIndex = null;
    var _editGroup = null;
    var _isNew = false;

    function openModal(item, section, groupName, index) {
        _editSection = section;
        _editIndex = index != null ? index : null;
        _editGroup = groupName || (section ? section.replace('personal-', '') : null);
        _isNew = !item;

        modalTitle.textContent = _isNew ? 'Add Sphere' : 'Edit Sphere';
        fText.value = item ? item.text : '';
        fLabel.value = item ? item.label : '';
        fSublabel.value = item ? (item.sublabel || '') : '\u2197 ';
        fUrl.value = item ? item.url : 'https://';
        fColor.value = item ? (item.color || 'github') : 'github';
        btnDelete.style.display = _isNew ? 'none' : '';

        modal.classList.add('open');
        fText.focus();
    }

    function closeModal() {
        modal.classList.remove('open');
        _editSection = null;
        _editIndex = null;
        _editGroup = null;
        _isNew = false;
    }

    btnCancel.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });

    btnSave.addEventListener('click', function() {
        var item = {
            text: fText.value.trim() || '?',
            label: fLabel.value.trim() || 'New Link',
            sublabel: fSublabel.value.trim() || '',
            url: fUrl.value.trim() || '#',
            color: fColor.value
        };
        if (_isNew) {
            addItem(_editSection, _editGroup, item);
        } else {
            setItem(_editSection, _editIndex, item);
        }
        saveConfig();
        closeModal();
        renderAll();
    });

    btnDelete.addEventListener('click', function() {
        if (_editSection != null && _editIndex != null) {
            var item = getItem(_editSection, _editIndex);
            if (item && confirm('Delete "' + item.label + '"?')) {
                deleteItem(_editSection, _editIndex);
                saveConfig();
                closeModal();
                renderAll();
            }
        }
    });

    // Keyboard: Escape to close, Enter to save
    document.addEventListener('keydown', function(e) {
        if (!modal.classList.contains('open')) return;
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && e.target.tagName !== 'SELECT') { btnSave.click(); }
    });

    // ── Event delegation (once) ─────────────────────────────
    document.getElementById('card-grid').addEventListener('click', handleSphereAction);

    // ── Initial render ───────────────────────────────────────
    renderAll();

})();
</script>
<script>OpsFlow.init();</script>
