<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Workshop Setup — P2M Pipeline</title>
    <style>
        /* ===== BASE THEME (matches Pipeline) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ═══ P2M SHARED COMPONENTS — identical on all P2M pages ═══ */
        .suite-nav {
            display: flex;
            align-items: center;
            font-size: 12px;
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            padding: 8px 20px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
        }
        .suite-nav .suite-home {
            display: flex;
            align-items: center;
            margin-right: 16px;
            text-decoration: none;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 800;
        }
        .suite-nav .suite-home:hover { opacity: 0.8; text-decoration: none; }
        .suite-nav .brand-ops { color: #e6edf3; }
        .suite-nav .brand-flow { color: #3b82f6; }
        .suite-nav .brand-better { color: #8b5cf6; }
        .suite-nav .p2m-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }
        .suite-nav a { color: #58a6ff; text-decoration: none; }
        .suite-nav a:hover { text-decoration: underline; color: #79c0ff; }
        .suite-nav .current { color: #e0e0e0; font-weight: 600; }
        .suite-nav .sep { color: #30363d; }
        .suite-nav .admin-sep { color: #30363d; margin: 0 4px; font-size: 10px; border-left: 1px solid #f0883e40; padding-left: 10px; margin-left: 6px; color: #f0883e80; font-weight: 600; letter-spacing: 0.5px; }

        .p2m-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 20px 16px;
            border-bottom: 1px solid #21262d;
        }
        .p2m-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 2px 0;
            line-height: 1.2;
        }
        .p2m-header .version {
            font-size: 13px;
            color: #58a6ff;
            margin: 0 0 2px 0;
        }
        .p2m-header .tagline {
            font-size: 12px;
            color: #8b949e;
            margin: 0;
        }
        /* ═══ END P2M SHARED COMPONENTS ═══ */

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ===== SUMMARY BAR ===== */
        .summary-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            font-size: 12px;
            color: #8b949e;
        }
        .summary-bar strong { color: #e0e0e0; }
        .overall-led {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        .overall-led.led-red { background-color: #6b2020; border-color: #9b3333; }
        .overall-led.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 6px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .overall-led.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 6px rgba(201,154,29,0.4); }
            50% { box-shadow: 0 0 12px rgba(201,154,29,0.7); }
        }

        /* ===== PIPELINE WRAPPER ===== */
        .workshop-wrapper {
            padding: 20px;
            overflow-x: auto;
        }
        .workshop-pipeline {
            display: flex;
            gap: 16px;
            min-width: max-content;
            padding-bottom: 20px;
        }

        /* ===== PHASE COLUMNS ===== */
        .phase-column {
            flex: 0 0 240px;
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-top: 3px solid;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .phase-column.phase-1 { border-top-color: #2563eb; }
        .phase-column.phase-2 { border-top-color: #7c3aed; }
        .phase-column.phase-3 { border-top-color: #059669; }
        .phase-column.phase-4 { border-top-color: #d97706; }
        .phase-column.phase-5 { border-top-color: #dc2626; }
        .phase-column.phase-6 { border-top-color: #db2777; }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .phase-header:hover { opacity: 0.85; }
        .phase-collapse-arrow {
            font-size: 10px;
            color: #6e7681;
            transition: transform 0.25s ease;
            flex-shrink: 0;
            margin-left: 2px;
        }
        .phase-column.collapsed .phase-collapse-arrow { transform: rotate(-90deg); }
        .phase-column.collapsed .phase-progress-bar { margin-bottom: 0; }
        .phase-column.collapsed .phase-content { display: none; }
        .phase-column.collapsed .add-card-btn { display: none; }
        .phase-number {
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .phase-1 .phase-number { background-color: #2563eb; }
        .phase-2 .phase-number { background-color: #7c3aed; }
        .phase-3 .phase-number { background-color: #059669; }
        .phase-4 .phase-number { background-color: #d97706; }
        .phase-5 .phase-number { background-color: #dc2626; }
        .phase-6 .phase-number { background-color: #db2777; }

        .phase-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            flex: 1;
        }
        .phase-completion {
            font-size: 11px;
            color: #8b949e;
            white-space: nowrap;
        }

        /* ===== PROGRESS BAR ===== */
        .phase-progress-bar {
            height: 3px;
            background-color: #21262d;
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .phase-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .phase-1 .phase-progress-fill { background-color: #2563eb; }
        .phase-2 .phase-progress-fill { background-color: #7c3aed; }
        .phase-3 .phase-progress-fill { background-color: #059669; }
        .phase-4 .phase-progress-fill { background-color: #d97706; }
        .phase-5 .phase-progress-fill { background-color: #dc2626; }
        .phase-6 .phase-progress-fill { background-color: #db2777; }

        .phase-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        /* ===== STEP CARDS ===== */
        .step-card {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-left: 3px solid #6e7681;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .step-card:hover {
            border-color: #58a6ff;
            box-shadow: 0 4px 12px rgba(88,166,255,0.15);
            transform: translateY(-2px);
        }
        .step-card.active-card {
            background-color: #1e2a3a;
            border-color: #58a6ff;
            box-shadow: inset 0 0 12px rgba(88,166,255,0.15);
        }
        .step-card.led-red { border-left-color: #f85149; }
        .step-card.led-yellow { border-left-color: #c99a1d; }
        .step-card.led-green { border-left-color: #2ea44f; }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .step-number {
            font-size: 12px;
            font-weight: bold;
            color: #8b949e;
        }
        .step-led {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 2px solid;
            position: relative;
            flex-shrink: 0;
        }
        .step-led::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 60%; height: 60%;
            border-radius: 50%;
            background-color: inherit;
            opacity: 0.5;
        }
        .step-led.led-red { background-color: #6b2020; border-color: #9b3333; }
        .step-led.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 8px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .step-led.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        .step-title {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }
        .step-description {
            font-size: 11px;
            color: #8b949e;
            line-height: 1.3;
        }
        .step-output {
            font-size: 11px;
            color: #58a6ff;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #21262d;
        }
        .step-output::before { content: '\2192 '; color: #8b949e; }

        /* ===== ADD CARD BUTTON ===== */
        .add-card-btn {
            padding: 8px;
            margin-top: 4px;
            border: 1px dashed #30363d;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .add-card-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* ===== DETAIL PANEL ===== */
        .detail-panel {
            position: fixed;
            top: 0; right: -480px;
            width: 460px;
            height: 100vh;
            background-color: #0d1117;
            border-left: 1px solid #21262d;
            z-index: 100;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 20px rgba(0,0,0,0.4);
        }
        .detail-panel.active { right: 0; }

        .detail-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #21262d;
            background-color: #161b22;
            gap: 12px;
            flex-shrink: 0;
        }
        .detail-back-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            width: 32px; height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .detail-back-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .detail-title-section { flex: 1; }
        .detail-step-info { font-size: 12px; color: #8b949e; margin-bottom: 2px; }
        .detail-title { font-size: 16px; font-weight: 600; color: #e0e0e0; }
        .detail-phase-info { font-size: 11px; color: #6e7681; margin-top: 2px; }

        .detail-led-status {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        .detail-led-status.led-red { background-color: #6b2020; border-color: #9b3333; }
        .detail-led-status.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 8px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .detail-led-status.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        /* ===== DETAIL SECTIONS ===== */
        .detail-section {
            padding: 16px;
            border-bottom: 1px solid #21262d;
        }
        .detail-section-label {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .detail-section-text {
            font-size: 13px;
            color: #c9d1d9;
            line-height: 1.5;
        }

        /* ===== INSTRUCTIONS (collapsible) ===== */
        .instructions-section { padding: 8px 16px; border-bottom: 1px solid #21262d; }
        .instructions-toggle {
            background: none; border: none; color: #58a6ff; cursor: pointer;
            font-size: 13px; padding: 4px 0; display: flex; align-items: center; gap: 6px;
        }
        .instructions-toggle:hover { color: #79c0ff; }
        .instructions-arrow { font-size: 10px; }
        .instructions-body { padding: 8px 0; }
        .instructions-text {
            font-size: 12px; color: #c9d1d9; line-height: 1.6;
            white-space: pre-wrap; font-family: inherit; margin: 0;
            background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px;
        }

        /* ===== FLEET CAPACITY SUMMARY ===== */
        .fleet-capacity-summary {
            margin: 8px 0; padding: 10px 12px;
            background: #161b22; border: 1px solid #30363d; border-radius: 6px;
            font-size: 12px; color: #8b949e;
        }
        .fleet-capacity-summary .capacity-value {
            color: #58a6ff; font-weight: 600; font-size: 14px;
        }

        /* ===== FORM FIELDS ===== */
        .field-group {
            margin-bottom: 12px;
        }
        .field-label {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 4px;
            display: block;
        }
        .field-input {
            width: 100%;
            padding: 8px 10px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .field-input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
        }
        .field-input::placeholder { color: #6e7681; }
        .field-select {
            width: 100%;
            padding: 8px 10px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }
        .field-select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .field-hint {
            font-size: 10px;
            color: #6e7681;
            margin-top: 3px;
        }
        .field-hint-disabled {
            font-size: 10px;
            color: #8b949e;
            font-style: italic;
            margin-top: 3px;
        }
        .field-group-disabled .field-label {
            color: #6e7681;
        }
        .field-input[disabled],
        .field-select[disabled] {
            background-color: #0d1117 !important;
            color: #6e7681 !important;
            border-color: #21262d !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .field-calculated {
            padding: 8px 10px;
            background-color: #0d1117;
            border: 1px dashed #30363d;
            border-radius: 4px;
            color: #58a6ff;
            font-size: 13px;
            font-weight: 600;
            position: relative;
        }
        .field-label-calc {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .calc-badge {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #58a6ff;
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.25);
            border-radius: 3px;
            padding: 1px 5px;
        }
        .field-row {
            display: flex;
            gap: 8px;
        }
        .field-row .field-input { flex: 1; }
        .field-row .field-select { flex: 0 0 120px; }

        /* ===== ACTION BUTTONS ===== */
        .btn-verify {
            width: 100%;
            padding: 10px;
            background-color: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-verify:hover { background-color: #2ea44f; }

        .btn-unverify {
            width: 100%;
            padding: 8px;
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-unverify:hover { border-color: #f85149; color: #f85149; }

        .btn-remove-card {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #8b949e;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-remove-card:hover { border-color: #f85149; color: #f85149; }

        /* ===== AI ASSIST ===== */
        .ai-assist-section {
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .ai-assist-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: #161b22;
            border: none;
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: color 0.2s;
        }
        .ai-assist-toggle:hover:not(.disabled) { color: #c9d1d9; }
        .ai-assist-toggle.disabled {
            cursor: default;
            opacity: 0.6;
        }
        .ai-assist-hint {
            font-size: 10px;
            color: #8b949e;
            font-weight: 400;
            font-style: italic;
        }
        .ai-assist-toggle .ai-badge {
            font-size: 10px;
            background: #1f6feb33;
            color: #58a6ff;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .ai-assist-toggle .ai-chevron {
            transition: transform 0.2s;
        }
        .ai-assist-toggle.expanded .ai-chevron {
            transform: rotate(180deg);
        }
        .ai-assist-body {
            display: none;
            padding: 12px;
            border-top: 1px solid #30363d;
        }
        .ai-assist-body.show { display: block; }
        .ai-assist-label {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .ai-assist-prompt-textarea,
        .ai-assist-response-textarea {
            width: 100%;
            min-height: 80px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 11px;
            padding: 8px;
            resize: vertical;
            line-height: 1.5;
        }
        .ai-assist-prompt-textarea:focus,
        .ai-assist-response-textarea:focus {
            border-color: #58a6ff;
            outline: none;
        }
        .ai-assist-prompt-textarea { min-height: 100px; }
        .ai-assist-response-textarea { min-height: 70px; }
        .ai-assist-divider {
            border: none;
            border-top: 1px solid #21262d;
            margin: 12px 0;
        }
        .btn-ai-copy,
        .btn-ai-apply {
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #30363d;
            transition: all 0.2s;
            margin-top: 6px;
        }
        .btn-ai-copy {
            background: #21262d;
            color: #c9d1d9;
        }
        .btn-ai-copy:hover { background: #30363d; color: #fff; }
        .btn-ai-apply {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }
        .btn-ai-apply:hover { background: #388bfd; }
        .btn-ai-apply:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-ai-clear {
            display: inline-block;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid #da3633;
            background: transparent;
            color: #da3633;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn-ai-clear:hover { background: #da3633; color: #fff; }
        .ai-results-list {
            margin-top: 10px;
            font-size: 11px;
        }
        .ai-result-item {
            padding: 3px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .ai-result-item.filled { color: #3fb950; }
        .ai-result-item.unfilled { color: #8b949e; }
        .ai-results-summary {
            margin-top: 8px;
            font-size: 11px;
            color: #58a6ff;
            font-weight: 600;
        }

        /* ===== COLOR TAG LIST ===== */
        .color-tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 0;
            min-height: 32px;
        }
        .color-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 3px 8px 3px 10px;
            font-size: 11px;
            color: #c9d1d9;
            line-height: 1.3;
        }
        .color-tag-remove {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;

    function migrateState(s) {
        // v0.70.0: Fleet migrations run even without statics['1.2']

        if (s.fleet && s.fleet.length > 0) {
            for (var fi = 0; fi < s.fleet.length; fi++) {
                var fp = s.fleet[fi];
                if (fp.plate !== undefined) {
                    var plateVal = fp.plate || '';
                    var m2d = plateVal.match(/^(\d+)\s*x\s*(\d+)$/);
                    if (m2d) {
                        fp.volume = m2d[1] + ' x ' + m2d[2] + ' x ' + m2d[2];
                    } else {
                        fp.volume = plateVal;
                    }
                    delete fp.plate;

                // v0.71.2: Split combined model into brand + model

                        'Bambu Lab P1P': { brand: 'Bambu Lab', model: 'P1P' },
                        'Bambu Lab X1E': { brand: 'Bambu Lab', model: 'X1E' }

                    var mapped = brandModelMap[fp.model.trim()];
                    if (mapped) {
                        fp.brand = mapped.brand;
                        fp.model = mapped.model;
                    } else {
                        // Generic split: first word(s) as brand, last word as model
                        var parts = fp.model.trim().split(/\s+/);
                        if (parts.length >= 2) {
                            fp.model = parts.pop();
                            fp.brand = parts.join(' ');
                        } else {
                            fp.brand = '';
                        }
                    }
                }
            }

            for (var mi = 0; mi < s.materials.length; mi++) {
                if (s.materials[mi].supplierPrimary !== undefined || s.materials[mi].costPrimary !== undefined) {
                    needsReset = true;
                    break;
                }
            }
            if (needsReset) {
                // Reset to single default material — user will re-enter fresh cards
                s.materials = DEFAULT_MATERIALS.map(function(m) { return Object.assign({}, m, { status_led: 'red', verified: false }); });
                if (s.nextDynId) s.nextDynId.materials = 2;
            }
            // v0.78.0 rework: Remove deprecated 'name' field from any existing materials
            for (var mj = 0; mj < s.materials.length; mj++) {
                if (s.materials[mj].name !== undefined) delete s.materials[mj].name;

        var v = s.statics['1.2'].values;

        // v0.68.0: monthlyCost/ownership → calcMethod + cost breakdown
        if (!v.calcMethod) {
            var own = v.ownership || '';
            v.calcMethod = 'US Home Office';

    function getStaticCardStatus(cardId) {
        var def = STATIC_CARDS[cardId];
        var data = state.statics[cardId];
        if (!def || !data) return 'red';
        if (data.verified) return 'green';

        if (def.allLinked) return 'yellow';

        var requiredFields = def.fields.filter(function(f) {
            if (f.type === 'calculated' || f.type === 'linked') return false;
            if (isFieldHidden(f, data.values)) return false;
            if (isFieldDisabled(f, data.values)) return false;
            return true;
        });
        if (requiredFields.length === 0) return 'yellow';

        var filled = requiredFields.filter(function(f) {
            var val = data.values[f.key];
            return val !== undefined && val !== null && val !== '';
        }).length;

        if (def.optional && filled === 0) return 'red';
        if (filled === 0) return 'red';
        if (filled < requiredFields.length) return 'yellow';
        return 'yellow';
    }

    function getDynamicCardStatus(item) {
        if (item.verified) return 'green';
        var filled = 0;
        var total = 0;
        Object.keys(item).forEach(function(key) {
            if (key !== 'id' && key !== 'status_led' && key !== 'verified' && key !== 'costGram') {
                total++;
                if (item[key] !== '' && item[key] !== null && item[key] !== undefined) filled++;
            }
        });
        if (filled === 0) return 'red';
        return 'yellow';
    }

    function updateAllStatuses() {
        Object.keys(STATIC_CARDS).forEach(function(id) {
            state.statics[id].status = getStaticCardStatus(id);
        });
        state.fleet.forEach(function(p) { p.status_led = getDynamicCardStatus(p); });
        state.materials.forEach(function(m) { m.status_led = getDynamicCardStatus(m); });
        state.software.forEach(function(s) { s.status_led = getDynamicCardStatus(s); });

    }

    // ===================================================================
    // CONDITIONAL FIELD HELPERS
    // ===================================================================

    // Returns true if the field should be HIDDEN
    // showWhen.not: 'X' → show when value is NOT X → hide when value IS X
    // showWhen.not: ['X','Y'] → show when value is NOT X or Y → hide when value IS X or Y
    // showWhen.equals: 'X' → show when value IS X → hide when value is NOT X
    function isFieldHidden(field, values) {
        if (!field.showWhen) return false;
        var depVal = values[field.showWhen.field] || '';
        if (field.showWhen.not) {
            var notVal = field.showWhen.not;
            if (Array.isArray(notVal)) {
                return notVal.indexOf(depVal) !== -1; // hide if value is in the array
            }
            return depVal === notVal; // hide if value matches
        }
        if (field.showWhen.equals) {
            return depVal !== field.showWhen.equals; // hide if value does NOT match
        }
        return false;
    }

    // Returns true if the field should be DISABLED (greyed out but visible)
    // disableWhen.equals: 'X' → disable when value IS X
    // disableWhen.not: 'X' → disable when value is NOT X
    function isFieldDisabled(field, values) {
        if (!field.disableWhen) return false;
        var depVal = values[field.disableWhen.field] || '';
        if (field.disableWhen.equals) {
            return depVal === field.disableWhen.equals;
        }
        if (field.disableWhen.not) {
            return depVal !== field.disableWhen.not;
        }
        return false;
    }

    function calcAvgHoursPerDay() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 24;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.hours) || 0); }, 0);
        return total / active.length;
    }

    function getFleetAvgPrice() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 0;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.price) || 0); }, 0);
        return Math.round(total / active.length);
    }

    function getFleetAvgWatts() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 0;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.watts) || 0); }, 0);
        return Math.round(total / active.length * 10) / 10;
    }

    function calcDepHour() {
        var price = getFleetAvgPrice();
        var lifespanHrs = parseFloat(getFieldValue('3.1', 'lifespan')) || 5000;
        if (price === 0) return '0.0000';
        return (price / lifespanHrs).toFixed(4);
    }

    function getActiveFleetCount() {

    }

    function calcFleetCapacity() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return { printers: 0, hoursDay: 0, hoursWeek: 0 };
        var totalHours = active.reduce(function(s, p) { return s + (parseFloat(p.hours) || 0); }, 0);
        return { printers: active.length, hoursDay: Math.round(totalHours * 10) / 10, hoursWeek: Math.round(totalHours * 7 * 10) / 10 };
    }

        if (!state.labor) return { total: 0, active: 0, absorbed: 0, costedRate: 0 };

    function createClaudePromptConfig(fieldDefs, currentValues, introLine) {
        var missing = [];
        fieldDefs.forEach(function(fd) {
            var val = (currentValues[fd.key] || '').trim();
            if (val) return;
            missing.push(fd);
        });

        if (missing.length === 0) {
            return { prompt: 'All AI-fillable fields already have values.', parseResponse: function() { return { fields: {}, count: 0 }; } };
        }

        // Detect if fieldDefs support JSON mode (materials use jsonKey)
        var useJson = missing.some(function(fd) { return !!fd.jsonKey; });

        var prompt;
        if (useJson) {
            prompt = buildJsonPrompt(missing, introLine);
        } else {
            prompt = buildTextPrompt(missing, fieldDefs, introLine);
        }

        var parseResponse = useJson
            ? function(response) { return parseJsonResponse(response, missing); }
            : function(response) { return parseTextResponse(response, fieldDefs); };

        return { prompt: prompt, parseResponse: parseResponse };
    }

    // --- JSON prompt builder (Materials) ---
    function buildJsonPrompt(missing, introLine) {
        var lines = [];
        lines.push(introLine);
        lines.push('Search the manufacturer\'s official product listing for this exact filament type and provide pricing and color data.');
        lines.push('');
        lines.push('Respond with ONLY a JSON code block in this exact format, nothing else before or after:');
        lines.push('');
        lines.push('```json');
        lines.push('{');
        var jsonLines = [];
        missing.forEach(function(fd) {
            if (fd.jsonKey === 'colors') {
                jsonLines.push('  "' + fd.jsonKey + '": ["Color1", "Color2", "Color3"]');
            } else {
                jsonLines.push('  "' + fd.jsonKey + '": 0.00');
            }
        });
        lines.push(jsonLines.join(',\n'));
        lines.push('}');
        lines.push('```');
        lines.push('');
        lines.push('STRICT RULES:');
        lines.push('- Output ONLY the JSON code block \u2014 no explanations, no reasoning, no commentary');
        missing.forEach(function(fd) {
            if (fd.jsonHint) lines.push('- ' + fd.jsonKey + ': ' + fd.jsonHint);
        });
        lines.push('- Never group colors (no "variants", "various", "and more", "multiple")');
        lines.push('- Use exact manufacturer color names (e.g. "Galaxy Black" not "Black Galaxy")');
        lines.push('- Do not include URLs, footnotes, or citations anywhere in your response');
        return lines.join('\n');
    }

    // --- Text prompt builder (Fleet, static cards) ---
    function buildTextPrompt(missing, fieldDefs, introLine) {
        var lines = [];
        lines.push(introLine || 'Please look up the following information.');
        lines.push('Please provide the following specs in exactly this format:');
        lines.push('');
        missing.forEach(function(fd) {
            if (fd.numeric) {
                lines.push(fd.promptLabel + ': [number] ' + (fd.unit || ''));
            } else if (fd.transform === 'volume') {
                lines.push(fd.promptLabel + ': [X x Y x Z in mm]');
            } else {
                lines.push(fd.promptLabel + ': ' + (fd.promptHint || '[value]'));
            }
        });
        lines.push('');
        lines.push('Respond with ONLY the specs in the format above, nothing else.');
        return lines.join('\n');
    }

    // --- JSON response parser (Materials) ---
    function parseJsonResponse(response, missing) {
        var result = { fields: {}, count: 0, errors: [] };
        if (!response || !response.trim()) {
            result.errors.push('Empty response');
            return result;
        }

        // Extract JSON from code block or raw text
        var jsonStr = response.trim();
        var codeBlockMatch = jsonStr.match(/```(?:json)?\s*([\s\S]*?)```/);
        if (codeBlockMatch) {
            jsonStr = codeBlockMatch[1].trim();
        } else {
            // Try to find raw JSON object
            var braceStart = jsonStr.indexOf('{');
            var braceEnd = jsonStr.lastIndexOf('}');
            if (braceStart !== -1 && braceEnd > braceStart) {
                jsonStr = jsonStr.substring(braceStart, braceEnd + 1);
            }
        }

        var parsed;
        try {
            parsed = JSON.parse(jsonStr);
        } catch (e) {
            result.errors.push('Could not parse JSON: ' + e.message);
            // Fallback: try text-based parsing
            return parseTextResponse(response, missing);
        }

        missing.forEach(function(fd) {
            var val = parsed[fd.jsonKey];
            if (val === undefined || val === null) return;

            if (fd.jsonKey === 'colors' && Array.isArray(val)) {
                // Join array into comma-separated string for storage
                var cleaned = val.map(function(c) {
                    return String(c).replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
                }).filter(function(c) { return c.length > 0; });
                result.fields[fd.key] = cleaned.join(', ');
                result.count++;
            } else if (fd.numeric) {
                var num = parseFloat(val);
                if (!isNaN(num) && num > 0) {
                    result.fields[fd.key] = String(num);
                    result.count++;
                }
            } else {
                result.fields[fd.key] = String(val).trim();
                if (result.fields[fd.key]) result.count++;
            }
        });

        return result;
    }

    // --- Text response parser (Fleet, static cards — legacy) ---
    function parseTextResponse(response, fieldDefs) {
        var result = { fields: {}, count: 0, errors: [] };
        if (!response || !response.trim()) {
            result.errors.push('Empty response');
            return result;
        }
        var respLines = response.trim().split('\n');
        fieldDefs.forEach(function(fd) {
            for (var i = 0; i < respLines.length; i++) {
                var line = respLines[i].trim();
                if (!line) continue;
                var matched = false;
                var allKeys = [fd.promptLabel].concat(fd.parseKeys || []);
                for (var k = 0; k < allKeys.length; k++) {
                    var keyLower = allKeys[k].toLowerCase();
                    var lineLower = line.toLowerCase();
                    var colonIdx = lineLower.indexOf(keyLower);
                    if (colonIdx !== -1) {
                        var afterKey = line.substring(colonIdx + allKeys[k].length).replace(/^[\s:]+/, '').trim();
                        if (!afterKey) continue;
                        if (fd.numeric) {
                            var numMatch = afterKey.match(/[\d,]+\.?\d*/);
                            if (numMatch) {
                                result.fields[fd.key] = numMatch[0].replace(/,/g, '');
                                result.count++;
                                matched = true;
                            }
                        } else if (fd.transform === 'volume') {
                            var volNorm = afterKey
                                .replace(/mm/gi, '')
                                .replace(/\u00d7/g, 'x')
                                .replace(/\u00d7/g, 'x')
                                .replace(/\*/g, 'x')
                                .trim();
                            var volMatch = volNorm.match(/(\d+)\s*x\s*(\d+)\s*x\s*(\d+)/i);
                            if (volMatch) {
                                result.fields[fd.key] = volMatch[1] + ' x ' + volMatch[2] + ' x ' + volMatch[3];
                                result.count++;
                                matched = true;
                            } else {
                                result.fields[fd.key] = afterKey.trim();
                                result.count++;
                                matched = true;
                            }
                        } else {
                            result.fields[fd.key] = afterKey;
                            result.count++;
                            matched = true;
                        }
                        if (matched) break;
                    }
                }
                if (matched) break;
            }
        });
        return result;
    }

    function calcMaintHour() {
        var fleetBudget = parseFloat(getFieldValue('3.2', 'annualBudget')) || 0;
        var machines = getActiveFleetCount() || 1;
        var hrsPerMachinePerYear = parseFloat(getFieldValue('3.2', 'hrsPerMachinePerYear')) || 800;
        var totalFleetHrs = machines * hrsPerMachinePerYear;
        if (totalFleetHrs === 0) return '0.0000';
        return (fleetBudget / totalFleetHrs).toFixed(4);
    }

    function calcElecHour() {
        var rate = parseFloat(getFieldValue('1.1', 'rate')) || 0;
        var watts = getFleetAvgWatts();
        return (rate * (watts / 1000)).toFixed(4);
    }

    function calcBlendedRate() {
        var dep = parseFloat(calcDepHour()) || 0;
        var maint = parseFloat(calcMaintHour()) || 0;
        var elec = parseFloat(calcElecHour()) || 0;
        return (dep + maint + elec).toFixed(2);
    }

    // ── Service Cost Helpers (reads from Services page localStorage) ──
    function getManufacturingServices() {
        try {
            var services = OpsFlow.getLocal('opsflow_services') || [];
            return services.filter(function(s) {
                return s.category === 'production' || s.category === 'sales' || s.category === 'operations';
            });
        } catch(e) { return []; }
    }

    function parseServiceCost(costStr) {
        if (!costStr) return 0;
        var m = costStr.match(/\$([\d.]+)/);
        if (!m) return 0;
        var val = parseFloat(m[1]) || 0;
        if (costStr.indexOf('/yr') !== -1) return Math.round(val / 12 * 100) / 100;
        return val;
    }

    function getServiceMonthlyTotal() {
        var services = getManufacturingServices();
        var total = 0;
        for (var i = 0; i < services.length; i++) {
            total += parseServiceCost(services[i].cost);
        }
        return total;
    }

    function getServiceBreakdown() {
        var services = getManufacturingServices();
        var parts = [];
        for (var i = 0; i < services.length; i++) {
            var cost = parseServiceCost(services[i].cost);
            if (cost > 0) {
                parts.push(services[i].name + ' $' + cost.toFixed(2));
            }
        }
        if (parts.length === 0) return 'No paid services found';
        return parts.join(' + ');
    }

    function getCalculatedValue(cardId, fieldKey) {
        if (cardId === '1.3' && fieldKey === 'serviceTotal') {
            var total = getServiceMonthlyTotal();
            if (total === 0) return '$0.00 (no paid services on Services page)';
            return '$' + total.toFixed(2) + '/mo';
        }
        if (cardId === '1.3' && fieldKey === 'serviceBreakdown') {
            return getServiceBreakdown();
        }
        if (cardId === '1.3' && fieldKey === 'totalMonthly') {
            var internet = parseFloat(getFieldValue('1.3', 'internet')) || 0;
            var svcTotal = getServiceMonthlyTotal();
            var total = internet + svcTotal;
            if (total === 0) return '— (enter Internet cost)';
            return '$' + total.toFixed(2) + '/mo (Internet $' + internet.toFixed(2) + ' + Services $' + svcTotal.toFixed(2) + ')';
        }
        if (cardId === '1.2' && fieldKey === 'businessPct') {
            var method = getFieldValue('1.2', 'calcMethod');
            if (method === 'Dedicated Business Space') return '100% (dedicated space)';
            var ws = parseFloat(getFieldValue('1.2', 'sqft')) || 0;
            var total = parseFloat(getFieldValue('1.2', 'totalSqft')) || 0;
            if (total === 0 || ws === 0) return '— (enter square footage)';
            var pct = ((ws / total) * 100).toFixed(1);
            return pct + '% (' + ws + ' / ' + total + ' sq ft)';
        }
        if (cardId === '1.2' && fieldKey === 'allocatedCost') {
            var method = getFieldValue('1.2', 'calcMethod');
            var ps = getFieldValue('1.2', 'paymentStructure');
            var totalCost = 0;
            var maint = parseFloat(getFieldValue('1.2', 'maintenance')) || 0;
            if (ps === 'Mortgage with Escrow') {
                var pi = parseFloat(getFieldValue('1.2', 'mortgagePAndI')) || 0;
                var esc = parseFloat(getFieldValue('1.2', 'escrow')) || 0;
                totalCost = pi + esc + maint;
            } else if (ps === 'Mortgage without Escrow') {
                var pi = parseFloat(getFieldValue('1.2', 'mortgagePAndI')) || 0;
                var tax = parseFloat(getFieldValue('1.2', 'propertyTax')) || 0;
                var ins = parseFloat(getFieldValue('1.2', 'insurance')) || 0;
                totalCost = pi + tax + ins + maint;
            } else if (ps === 'Rent') {
                var rent = parseFloat(getFieldValue('1.2', 'rentMonthly')) || 0;
                var rIns = parseFloat(getFieldValue('1.2', 'renterInsurance')) || 0;
                totalCost = rent + rIns + maint;
            } else if (ps === 'Own Outright (no mortgage)') {
                var tax = parseFloat(getFieldValue('1.2', 'propertyTax')) || 0;
                var ins = parseFloat(getFieldValue('1.2', 'insurance')) || 0;
                totalCost = tax + ins + maint;
            }
            var pct = 1;
            if (method !== 'Dedicated Business Space') {
                var ws = parseFloat(getFieldValue('1.2', 'sqft')) || 0;
                var totalSf = parseFloat(getFieldValue('1.2', 'totalSqft')) || 0;
                pct = (totalSf > 0 && ws > 0) ? (ws / totalSf) : 0;
            }
            var allocated = totalCost * pct;
            return '$' + allocated.toFixed(2) + '/mo' + (pct < 1 ? ' (' + (pct * 100).toFixed(1) + '% of $' + totalCost.toFixed(2) + ')' : '');
        }
        if (cardId === '3.1' && fieldKey === 'fleetAvgPrice') return '$' + getFleetAvgPrice() + ' (from ' + getActiveFleetCount() + ' active printers)';
        if (cardId === '3.1' && fieldKey === 'depHour') return '$' + calcDepHour();
        if (cardId === '3.2' && fieldKey === 'fleetMachines') return getActiveFleetCount() + ' (from Fleet)';
        if (cardId === '3.2' && fieldKey === 'maintHour') return '$' + calcMaintHour();
        if (cardId === '3.3' && fieldKey === 'electricityRate') return '$' + (getFieldValue('1.1', 'rate') || '—');
        if (cardId === '3.3' && fieldKey === 'fleetAvgWatts') return getFleetAvgWatts() + 'W (from ' + getActiveFleetCount() + ' active printers)';
        if (cardId === '3.3' && fieldKey === 'elecHour') return '$' + calcElecHour();
        if (cardId === '3.4' && fieldKey === 'depComponent') return '$' + calcDepHour();
        if (cardId === '3.4' && fieldKey === 'maintComponent') return '$' + calcMaintHour();
        if (cardId === '3.4' && fieldKey === 'elecComponent') return '$' + calcElecHour();
        if (cardId === '3.4' && fieldKey === 'blendedRate') return '$' + calcBlendedRate();
        return '—';
    }

    // ===================================================================
    // COMPLETION TRACKING
    // ===================================================================

    function getPhaseCards(phaseNum) {
        var cards = [];
        Object.keys(STATIC_CARDS).forEach(function(id) {
            if (STATIC_CARDS[id].phase === phaseNum) {
                cards.push({ id: id, status: state.statics[id].status });
            }
        });
        if (phaseNum === 2) state.fleet.forEach(function(p) { cards.push({ id: 'fleet-' + p.id, status: p.status_led }); });
        if (phaseNum === 4) state.materials.forEach(function(m) { cards.push({ id: 'mat-' + m.id, status: m.status_led }); });
        if (phaseNum === 5 && state.labor) state.labor.forEach(function(l) { cards.push({ id: 'labor-' + l.id, status: l.status_led }); });
        if (phaseNum === 6) state.software.forEach(function(s) { cards.push({ id: 'sw-' + s.id, status: s.status_led }); });
        return cards;
    }

    function getPhaseProgress(phaseNum) {
        var cards = getPhaseCards(phaseNum);
        if (cards.length === 0) return { done: 0, total: 0, pct: 0 };
        var done = cards.filter(function(c) { return c.status === 'green'; }).length;
        return { done: done, total: cards.length, pct: Math.round((done / cards.length) * 100) };
    }

    function getOverallProgress() {
        var total = 0, done = 0;
        for (var p = 1; p <= 6; p++) {
            var prog = getPhaseProgress(p);
            total += prog.total;
            done += prog.done;
        }
        return { done: done, total: total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
    }

    function updateCompletionDisplay() {
        var prog = getOverallProgress();
        document.getElementById('completionPct').textContent = prog.pct + '%';
        document.getElementById('completionCount').textContent = prog.done + '/' + prog.total;
        var led = document.getElementById('overallLed');
        led.className = 'overall-led';
        if (prog.pct === 100) led.classList.add('led-green');
        else if (prog.pct > 0) led.classList.add('led-yellow');
        else led.classList.add('led-red');
    }

    // ===================================================================
    // RENDERING
    // ===================================================================

    function render() {
        updateAllStatuses();
        renderPipeline();
        updateCompletionDisplay();
        updateBlendedRateBanner();
        saveState();
    }

    function updateBlendedRateBanner() {
        var rate = calcBlendedRate();
        var dep = calcDepHour();
        var maint = calcMaintHour();
        var elec = calcElecHour();
        var rateNum = parseFloat(rate) || 0;
        var display = document.getElementById('blendedRateDisplay');
        var breakdown = document.getElementById('blendedRateBreakdown');
        if (rateNum > 0) {
            display.textContent = 'Blended Rate: $' + rate + '/hr';
            display.style.color = '#2ea44f';
            breakdown.textContent = 'Dep $' + dep + ' + Maint $' + maint + ' + Elec $' + elec;
        } else {
            display.textContent = 'Blended Rate: $\u2014/hr';
            display.style.color = '#8b949e';
            breakdown.textContent = 'Complete Phase 3 cards to calculate';
        }
    }

    // Track collapsed phases (persists in localStorage)
    var collapsedPhases = {};
    try {
        var savedCollapsed = localStorage.getItem('workshopCollapsedPhases');
        if (savedCollapsed) collapsedPhases = JSON.parse(savedCollapsed);
    } catch(e) { /* ignore */ }

    function togglePhaseCollapse(phaseNum) {
        if (collapsedPhases[phaseNum]) {
            delete collapsedPhases[phaseNum];
        } else {
            collapsedPhases[phaseNum] = true;
        }
        try { localStorage.setItem('workshopCollapsedPhases', JSON.stringify(collapsedPhases)); } catch(e) {}
        render();
    }

    function renderPipeline() {
        var container = document.getElementById('workshopPipeline');
        container.innerHTML = '';

        for (var p = 1; p <= 6; p++) {
            var phaseInfo = PHASES[p];
            var progress = getPhaseProgress(p);

            var col = document.createElement('div');
            col.className = 'phase-column phase-' + p;
            if (collapsedPhases[p]) col.classList.add('collapsed');

            col.innerHTML = '<div class="phase-header" data-phase="' + p + '">' +
                '<span class="phase-collapse-arrow">&#9660;</span>' +
                '<span class="phase-number">' + p + '</span>' +
                '<span class="phase-name">' + phaseInfo.name + '</span>' +
                '<span class="phase-completion">' + progress.done + '/' + progress.total + '</span>' +
                '</div>' +
                '<div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + progress.pct + '%"></div></div>';

            var content = document.createElement('div');
            content.className = 'phase-content';

            // Static cards
            Object.keys(STATIC_CARDS).forEach(function(id) {
                if (STATIC_CARDS[id].phase === p) {
                    var def = STATIC_CARDS[id];
                    var data = state.statics[id];
                    content.appendChild(createCard(id, def.number, def.title, def.description, def.output, data.status, function(cardId) {
                        return function() { openStaticCard(cardId); };
                    }(id)));
                }
            });

            // Dynamic cards
            if (p === 2) {
                state.fleet.forEach(function(printer, idx) {
                    var pfNum = 'PF.' + (idx + 1);
                    var cardDesc = ((printer.brand || '') + ' ' + (printer.model || '')).trim() || 'Unconfigured';
                    content.appendChild(createCard('fleet-' + printer.id, pfNum, printer.name || 'New Printer', cardDesc, (printer.status || 'Active') + ' \u00b7 Printer config', printer.status_led, function(pid) {
                        return function() { openFleetCard(pid); };
                    }(printer.id)));
                });
                // Fleet capacity summary
                var cap = calcFleetCapacity();
                if (cap.printers > 0) {
                    var capDiv = document.createElement('div');
                    capDiv.className = 'fleet-capacity-summary';
                    capDiv.innerHTML = 'Fleet Capacity: <span class="capacity-value">' + cap.hoursDay + ' hrs/day</span> \u00b7 <span class="capacity-value">' + cap.hoursWeek + ' hrs/week</span> across ' + cap.printers + ' active printer' + (cap.printers > 1 ? 's' : '');
                    content.appendChild(capDiv);
                }
            }
            if (p === 4) {
                state.materials.forEach(function(mat, idx) {
                    var mlNum = 'ML.' + (idx + 1);
                    var matTitle = (mat.type || 'New Material');
                    var matEffCost = parseFloat(mat.costKg) || 0;
                    var matDesc = (mat.supplier || 'No supplier') + '\n$' + (matEffCost > 0 ? matEffCost.toFixed(2) : '—') + '/kg';
                    content.appendChild(createCard('mat-' + mat.id, mlNum, matTitle, matDesc, 'Material costs', mat.status_led, function(mid) {
                        return function() { openMaterialCard(mid); };
                    }(mat.id)));
                });
            }
            if (p === 5 && state.labor) {
                state.labor.forEach(function(labor, idx) {
                    var lrNum = 'LR.' + (idx + 1);
                    var lrTitle = labor.name || 'New Labor';
                    var lrRole = labor.role || 'No role';
                    var lrPricing = labor.laborInPricing === 'Yes \u2014 Include in COGS' ? '$' + (labor.rate || '0') + '/hr' : 'Absorbed';
                    content.appendChild(createCard('labor-' + labor.id, lrNum, lrTitle, lrRole + '\n' + lrPricing, (labor.status || 'Active') + ' \u00b7 Labor config', labor.status_led, function(lid) {
                        return function() { openLaborCard(lid); };
                    }(labor.id)));
                });
                // Labor summary
                var lSum = calcLaborSummary();
                if (lSum.active > 0) {
                    var lSumDiv = document.createElement('div');
                    lSumDiv.className = 'fleet-capacity-summary';
                    var lSumParts = lSum.active + ' active';
                    if (lSum.absorbed > 0) lSumParts += ', ' + lSum.absorbed + ' absorbed';
                    if (lSum.costedRate > 0) lSumParts += ', $' + lSum.costedRate.toFixed(2) + '/hr in COGS';
                    lSumDiv.innerHTML = 'Labor Roster: ' + lSumParts;
                    content.appendChild(lSumDiv);
                }
            }
            if (p === 6) {
                state.software.forEach(function(sw, idx) {
                    var stNum = 'ST.' + (idx + 1);
                    var swTitle = sw.name || 'New Tool';
                    var swCostDesc = sw.costCycle === 'Free' ? 'Free' : '$' + (sw.cost || '0') + '/' + (sw.costCycle || 'Free');
                    content.appendChild(createCard('sw-' + sw.id, stNum, swTitle, (sw.purpose || 'Unconfigured') + '\n' + swCostDesc, 'Tool config', sw.status_led, function(sid) {
                        return function() { openSoftwareCard(sid); };
                    }(sw.id)));
                });
            }

            // Add button
            if (phaseInfo.dynamic) {
                var addBtn = document.createElement('button');
                addBtn.className = 'add-card-btn';
                addBtn.textContent = phaseInfo.dynamicLabel;
                addBtn.addEventListener('click', function(phaseNum) {
                    return function() { addDynamicCard(phaseNum); };
                }(p));
                content.appendChild(addBtn);
            }

            col.appendChild(content);
            container.appendChild(col);
        }

        // Attach collapse handlers to phase headers
        document.querySelectorAll('.phase-header[data-phase]').forEach(function(header) {
            header.addEventListener('click', function() {
                var phaseNum = parseInt(header.getAttribute('data-phase'));
                togglePhaseCollapse(phaseNum);
            });
        });
    }

    function createCard(dataId, number, title, description, output, status, onClick) {
        var card = document.createElement('div');
        card.className = 'step-card led-' + status;
        card.dataset.cardId = dataId;
        if (dataId === activeCardId) card.classList.add('active-card');

        card.innerHTML = '<div class="step-header">' +
            '<span class="step-number">' + escHtml(number) + '</span>' +
            '<div class="step-led led-' + status + '"></div>' +
            '</div>' +
            '<div class="step-title">' + escHtml(title) + '</div>' +
            '<div class="step-description">' + escHtml(description) + '</div>' +
            '<div class="step-output">' + escHtml(output) + '</div>';

        card.addEventListener('click', onClick);
        return card;
    }

    // --- Live-update grid card without full re-render ---
    function updateGridCard(dataId, title, description, status) {
        var card = document.querySelector('[data-card-id="' + dataId + '"]');
        if (!card) return;
        var titleEl = card.querySelector('.step-title');
        var descEl = card.querySelector('.step-description');

            };

                '<button class="btn-ai-apply disabled" id="btnAiApply" disabled>Apply</button>' +

        fieldsDiv.innerHTML = '<div class="detail-section-label">Data Entry</div>';

            if (isFieldHidden(field, data.values)) return;

            // Check if field should be disabled (visible but greyed out)
            var disabled = isFieldDisabled(field, data.values);

            var group = document.createElement('div');
            group.className = 'field-group' + (disabled ? ' field-group-disabled' : '');

            if (field.type === 'calculated' || field.type === 'linked') {

                    '<div class="field-calculated">' + getCalculatedValue(cardId, field.key) + '</div>';
            } else if (field.type === 'select') {
                var optHtml = (field.options || []).map(function(o) {
                    var sel = (data.values[field.key] === o) ? ' selected' : '';
                    return '<option value="' + escHtml(o) + '"' + sel + '>' + escHtml(o) + '</option>';
                }).join('');
                var disAttr = disabled ? ' disabled' : '';
                group.innerHTML = '<label class="field-label">' + escHtml(field.label) + '</label>' +
                    '<select class="field-select" data-card="' + cardId + '" data-field="' + field.key + '"' + disAttr + '>' + optHtml + '</select>';
                if (disabled && field.disabledHint) {
                    group.innerHTML += '<div class="field-hint field-hint-disabled">' + escHtml(field.disabledHint) + '</div>';
                } else if (field.hint) {
                    group.innerHTML += '<div class="field-hint">' + escHtml(field.hint) + '</div>';
                }
            } else {
                var disAttr = disabled ? ' disabled' : '';
                group.innerHTML = '<label class="field-label">' + escHtml(field.label) + '</label>' +
                    '<input class="field-input" type="text" data-card="' + cardId + '" data-field="' + field.key + '" value="' + escHtml(data.values[field.key] || '') + '" placeholder="' + escHtml(field.placeholder || '') + '"' + disAttr + '>';
                if (disabled && field.disabledHint) {
                    group.innerHTML += '<div class="field-hint field-hint-disabled">' + escHtml(field.disabledHint) + '</div>';
                } else if (field.hint) {
                    group.innerHTML += '<div class="field-hint">' + escHtml(field.hint) + '</div>';
                }
            }
            fieldsDiv.appendChild(group);

        body.appendChild(fieldsDiv);

        var actDiv = document.createElement('div');
        actDiv.className = 'detail-section';
        if (data.verified) {
            actDiv.innerHTML = '<div style="text-align:center;color:#2ea44f;font-weight:600;margin-bottom:8px;">&#10003; Verified</div>' +
                '<button class="btn-unverify" id="btnUnverify">Edit & Re-verify</button>';

        }

        setTimeout(function() {
            var verifyBtn = document.getElementById('btnVerify');
            if (verifyBtn) verifyBtn.addEventListener('click', function() { verifyStatic(cardId); });
            var unverifyBtn = document.getElementById('btnUnverify');
            if (unverifyBtn) unverifyBtn.addEventListener('click', function() { unverifyStatic(cardId); });

            // AI Assist listeners for static Machine Economics card (W3.1)
            if (cardId === '3.1' && isFleetVerified()) {
                var aiToggle = document.getElementById('btnAiToggle');
                var aiBody = document.getElementById('aiAssistBody');
                if (aiToggle && aiBody) {
                    aiToggle.addEventListener('click', function() {
                        aiToggle.classList.toggle('expanded');
                        aiBody.classList.toggle('show');
                    });
                }
                bindAiCopyBtn('static-3.1');
                bindStaticAiApplyBtn(cardId);
                bindStaticAiClearBtn(cardId);
                bindAiResponseWatcher();
            }

            // Check which fields have showWhen or disableWhen dependencies (for re-render on change)
            var conditionalTriggers = {};
            def.fields.forEach(function(f) {
                if (f.showWhen) conditionalTriggers[f.showWhen.field] = true;
                if (f.disableWhen) conditionalTriggers[f.disableWhen.field] = true;
            });

            document.querySelectorAll('.field-input[data-card="' + cardId + '"], .field-select[data-card="' + cardId + '"]').forEach(function(el) {
                // Don't override disabled state for fields that are disabled by disableWhen
                if (!isEditUnlocked() && !el.disabled) { el.disabled = true; }
                var handler = function() {
                    if (el.disabled && isEditUnlocked()) return; // disableWhen field, ignore input
                    if (!isEditUnlocked()) { showToast('Read-only mode \u2014 unlock editing to change values', 'error'); return; }
                    state.statics[cardId].values[el.dataset.field] = el.value;
                    state.statics[cardId].verified = false;
                    state.statics[cardId].status = getStaticCardStatus(cardId);
                    updateCardLed(cardId, state.statics[cardId].status);
                    setDetailLed(state.statics[cardId].status);
                    updatePhaseProgressBar(STATIC_CARDS[cardId].phase);
                    updateCompletionDisplay();
                    saveState();
                    // Re-render card if this field controls conditional visibility
                    if (conditionalTriggers[el.dataset.field]) {
                        openStaticCard(cardId);
                    }
                };
                el.addEventListener('input', handler);
                el.addEventListener('change', handler);
            });
        }, 50);
    }

    function verifyStatic(cardId) {
        if (!requireEdit('mark complete')) return;
        var def = STATIC_CARDS[cardId];
        var data = state.statics[cardId];
        if (def.optional) {
            data.verified = true;
            data.status = 'green';
            render();
            openStaticCard(cardId);
            return;
        }
        var required = def.fields.filter(function(f) {
            if (f.type === 'calculated' || f.type === 'linked') return false;
            if (isFieldHidden(f, data.values)) return false;
            if (isFieldDisabled(f, data.values)) return false;
            return true;
        });
        var allFilled = required.every(function(f) {
            var val = data.values[f.key];
            return val !== undefined && val !== null && val !== '';
        });
        if (!allFilled) {
            showToast('Please fill in all visible fields before marking complete', 'error');
            return;
        }
        data.verified = true;
        data.status = 'green';
        render();
        openStaticCard(cardId);
    }

    function unverifyStatic(cardId) {
        if (!requireEdit('edit verified cards')) return;
        state.statics[cardId].verified = false;
        render();
        openStaticCard(cardId);
    }
