    // ===================================================================
    // DYNAMIC FIELD LISTENERS
    // ===================================================================

    function attachDynListeners(dynType, itemId) {
        setTimeout(function() {
            var verifyBtn = document.getElementById('btnVerifyDyn');
            var unverifyBtn = document.getElementById('btnUnverifyDyn');
            var removeBtn = document.getElementById('btnRemoveDyn');

            if (verifyBtn) {
                verifyBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') verifyFleet(itemId);
                    else if (dynType === 'materials') verifyMaterial(itemId);
                    else if (dynType === 'software') verifySoftware(itemId);
                    else if (dynType === 'labor') verifyLabor(itemId);
                });
            }
            if (unverifyBtn) {
                unverifyBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') unverifyFleet(itemId);
                    else if (dynType === 'materials') unverifyMaterial(itemId);
                    else if (dynType === 'software') unverifySoftware(itemId);
                    else if (dynType === 'labor') unverifyLabor(itemId);
                });
            }
            if (removeBtn) {
                removeBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') removeFleet(itemId);
                    else if (dynType === 'materials') removeMaterial(itemId);
                    else if (dynType === 'software') removeSoftware(itemId);
                    else if (dynType === 'labor') removeLabor(itemId);
                });
            }

            // AI Assist handlers (fleet + materials)
            if (dynType === 'fleet' || dynType === 'materials') {
                var aiToggle = document.getElementById('btnAiToggle');
                var aiBody = document.getElementById('aiAssistBody');

                // Determine card-specific config
                var aiFieldDefs = dynType === 'fleet' ? FLEET_PROMPT_FIELDS : MATERIALS_PROMPT_FIELDS;
                var aiStateArr = dynType === 'fleet' ? state.fleet : state.materials;
                var aiGateField = dynType === 'fleet' ? 'model' : 'type';
                var aiGateField2 = dynType === 'fleet' ? 'brand' : 'supplier';

                // Gate field watcher — auto-enable and expand AI Assist
                var gateInput = document.querySelector('.field-input[data-dyn="' + dynType + '"][data-id="' + itemId + '"][data-field="' + aiGateField + '"]');
                var gateInput2 = aiGateField2 ? document.querySelector('.field-input[data-dyn="' + dynType + '"][data-id="' + itemId + '"][data-field="' + aiGateField2 + '"]') : null;
                var aiFieldWatcher = function() {
                    var gateVal = gateInput ? (gateInput.value || '').trim() : '';
                    var gateVal2 = gateInput2 ? (gateInput2.value || '').trim() : '';
                    var gateReady = gateVal && (dynType === 'fleet' || gateVal2);
                    if (gateReady && aiToggle && aiToggle.classList.contains('disabled')) {
                        // Enable and auto-expand
                        var item = aiStateArr.find(function(x) { return x.id === itemId; });
                        if (!item) return;
                        var introFn = dynType === 'fleet' ? getFleetIntro : getMaterialIntro;
                        var config = createClaudePromptConfig(aiFieldDefs, item, introFn(item));
                        aiToggle.classList.remove('disabled');
                        aiToggle.classList.add('expanded');
                        aiToggle.innerHTML = '<span>\u25BC AI ASSIST <span class="ai-badge">beta</span></span><span class="ai-chevron">\u25B2</span>';
                        aiBody.className = 'ai-assist-body show';
                        var isJsonMode = dynType === 'materials';
                        aiBody.innerHTML =
                            '<div class="ai-assist-label">Your Prompt:</div>' +
                            (isJsonMode ? '<div class="ai-assist-hint">Copy this prompt into any AI chat. Tested with Claude, ChatGPT, and Grok. Response must be JSON.</div>' : '') +
                            '<textarea class="ai-assist-prompt-textarea" id="aiPromptText">' + escHtml(config.prompt) + '</textarea>' +
                            '<button class="btn-ai-copy" id="btnAiCopy">Copy to Clipboard</button>' +
                            '<hr class="ai-assist-divider">' +
                            '<div class="ai-assist-label">Paste AI Response:</div>' +
                            (isJsonMode ? '<div class="ai-assist-hint">Paste the JSON code block from your AI. The parser will extract the data automatically.</div>' : '') +
                            '<textarea class="ai-assist-response-textarea" id="aiResponseText" placeholder="' + (isJsonMode ? 'Paste the JSON response here...' : 'Paste the AI response here...') + '"></textarea>' +
                            '<button class="btn-ai-apply disabled" id="btnAiApply" disabled>Apply</button>' +
                            '<div class="ai-results-list" id="aiResultsList"></div>';
                        bindAiCopyBtn(itemId);
                        bindAiApplyBtn(itemId, dynType);
                        bindAiResponseWatcher();
                        if (dynType === 'fleet') {
                            var brandVal = gateInput2 ? (gateInput2.value || '').trim() : '';
                            saveModelLookup(((brandVal ? brandVal + ' ' : '') + gateVal).trim());
                        }
                    } else if (gateReady && aiToggle && !aiToggle.classList.contains('disabled')) {
                        // Gate field changed — regenerate prompt
                        var item2 = aiStateArr.find(function(x) { return x.id === itemId; });
                        if (!item2) return;
                        var introFn2 = dynType === 'fleet' ? getFleetIntro : getMaterialIntro;
                        var intro2 = introFn2(item2);
                        if (intro2 !== null) {
                            var config2 = createClaudePromptConfig(aiFieldDefs, item2, intro2);
                            var promptEl = document.getElementById('aiPromptText');
                            if (promptEl) promptEl.value = config2.prompt;
                        }
                    }
                };
                if (gateInput) {
                    gateInput.addEventListener('change', aiFieldWatcher);
                    gateInput.addEventListener('blur', aiFieldWatcher);
                }
                if (gateInput2) {
                    gateInput2.addEventListener('change', aiFieldWatcher);
                    gateInput2.addEventListener('blur', aiFieldWatcher);
                }

                if (aiToggle && aiBody) {
                    aiToggle.addEventListener('click', function() {
                        if (aiToggle.classList.contains('disabled')) return;
                        aiToggle.classList.toggle('expanded');
                        aiBody.classList.toggle('show');
                    });
                }

                bindAiCopyBtn(itemId);
                bindAiApplyBtn(itemId, dynType);
                bindAiResponseWatcher();
            }

            document.querySelectorAll('.field-input[data-dyn="' + dynType + '"], .field-select[data-dyn="' + dynType + '"]').forEach(function(el) {
                if (!isEditUnlocked()) { el.disabled = true; }
                var handler = function() {
                    if (!isEditUnlocked()) { showToast('Read-only mode \u2014 unlock editing to change values', 'error'); return; }
                    var arr = dynType === 'fleet' ? state.fleet : dynType === 'materials' ? state.materials : dynType === 'labor' ? state.labor : state.software;
                    var item = arr.find(function(x) { return x.id === el.dataset.id; });
                    if (item) {
                        item[el.dataset.field] = el.value;
                        item.verified = false;
                        item.status_led = getDynamicCardStatus(item);
                        saveState();
                        // Live-update AI Assist prompt as any field changes
                        if (dynType === 'fleet' || dynType === 'materials') {
                            var promptEl = document.getElementById('aiPromptText');
                            if (promptEl) {
                                var liveFieldDefs = dynType === 'fleet' ? FLEET_PROMPT_FIELDS : MATERIALS_PROMPT_FIELDS;
                                var liveIntroFn = dynType === 'fleet' ? getFleetIntro : getMaterialIntro;
                                var liveIntro = liveIntroFn(item);
                                if (liveIntro !== null) {
                                    var liveConfig = createClaudePromptConfig(liveFieldDefs, item, liveIntro);
                                    promptEl.value = liveConfig.prompt;
                                }
                            }
                            // Auto-clear stale AI response when prompt changes
                            var responseEl = document.getElementById('aiResponseText');
                            if (responseEl && responseEl.value.trim()) {
                                responseEl.value = '';
                                var applyBtn = document.getElementById('btnAiApply');
                                if (applyBtn) { applyBtn.disabled = true; applyBtn.classList.add('disabled'); }
                            }
                            // Clear AI results list
                            var resultsList = document.getElementById('aiResultsList');
                            if (resultsList) resultsList.innerHTML = '';
                        }
                        // Identity field changed on materials — clear stale AI-filled data
                        if (dynType === 'materials' && (el.dataset.field === 'type' || el.dataset.field === 'supplier')) {
                            var matFieldDefs = MATERIALS_PROMPT_FIELDS;
                            var hadData = false;
                            matFieldDefs.forEach(function(fd) {
                                if (item[fd.key]) { hadData = true; item[fd.key] = ''; }
                            });
                            if (hadData) {
                                // Clear the visible field inputs
                                matFieldDefs.forEach(function(fd) {
                                    var inp = document.querySelector('.field-input[data-dyn="materials"][data-id="' + item.id + '"][data-field="' + fd.key + '"]');
                                    if (inp) inp.value = '';
                                });
                                renderColorTags(item);
                                // Refresh cost per gram
                                var calcEl2 = document.querySelector('.field-calculated');
                                if (calcEl2) calcEl2.innerHTML = '$\u2014/kg \u2192 $\u2014/g';
                                saveState();
                            }
                        }
                        // Live-update color tag list when color field changes via AI
                        if (dynType === 'materials' && el.dataset.field === 'color') {
                            renderColorTags(item);
                        }
                        // Live-update card title and cost per gram as fields change
                        if (dynType === 'materials' && (el.dataset.field === 'type' || el.dataset.field === 'supplier')) {
                            var titleEl = document.getElementById('detailTitle');
                            if (titleEl) titleEl.textContent = item.type && item.supplier ? item.type + ' \u2014 ' + item.supplier : 'Configure this material';
                            var stepEl = document.getElementById('detailStepInfo');
                            if (stepEl) stepEl.textContent = getMaterialNumber(item) + ' \u2014 ' + (item.type || 'New Material');
                        }
                        if (dynType === 'materials' && el.dataset.field === 'costKg') {
                            var effCost = parseFloat(item.costKg) || 0;
                            var cpgVal = effCost > 0 ? (effCost / 1000).toFixed(5) : '\u2014';
                            var calcEl = document.querySelector('.field-calculated');
                            if (calcEl) calcEl.innerHTML = '$' + (effCost > 0 ? effCost.toFixed(2) : '\u2014') + '/kg \u2192 $' + cpgVal + '/g';
                        }
                        if (dynType === 'fleet' && (el.dataset.field === 'brand' || el.dataset.field === 'model')) {
                            var titleEl2 = document.getElementById('detailTitle');
                            if (titleEl2) titleEl2.textContent = ((item.brand || '') + ' ' + (item.model || '')).trim() || 'Configure this printer';
                            var stepEl2 = document.getElementById('detailStepInfo');
                            if (stepEl2) stepEl2.textContent = getFleetNumber(item) + ' \u2014 ' + (item.name || 'New Printer');
                        }
                        // Update detail LED live
                        setDetailLed(item.status_led);
                        // Live-update the grid card behind the detail panel
                        if (dynType === 'materials') {
                            var matEffCostLive = parseFloat(item.costKg) || 0;
                            var matDescLive = (item.supplier || 'No supplier') + '\n$' + (matEffCostLive > 0 ? matEffCostLive.toFixed(2) : '\u2014') + '/kg';
                            updateGridCard('mat-' + item.id, item.type || 'New Material', matDescLive, item.status_led);
                        } else if (dynType === 'fleet') {
                            var fleetNameLive = ((item.brand || '') + ' ' + (item.model || '')).trim();
                            updateGridCard('fleet-' + item.id, item.name || fleetNameLive || 'New Printer', fleetNameLive || 'No model', item.status_led);
                        } else if (dynType === 'labor') {
                            var lrPricingLive = item.laborInPricing === 'Yes \u2014 Include in COGS' ? '$' + (item.rate || '0') + '/hr' : 'Absorbed';
                            updateGridCard('labor-' + item.id, item.name || 'New Labor', (item.role || 'No role') + '\n' + lrPricingLive, item.status_led);
                            // Update detail panel header live
                            var titleEl = document.getElementById('detailTitle');
                            if (titleEl) titleEl.textContent = item.role || 'Configure this labor entry';
                            var stepEl = document.getElementById('detailStepInfo');
                            if (stepEl) stepEl.textContent = getLaborNumber(item) + ' \u2014 ' + (item.name || 'New Labor');
                        }
                    }
                };
                el.addEventListener('input', handler);
                el.addEventListener('change', handler);
            });
        }, 50);
    }

    // ===================================================================
    // TOAST NOTIFICATIONS
    // ===================================================================

    var activeToast = null;
    var toastTimer = null;

    function showToast(message, type, undoFn) {
        if (activeToast && activeToast.parentNode) activeToast.remove();
        if (toastTimer) clearTimeout(toastTimer);

        var toast = document.createElement('div');
        toast.className = 'workshop-toast' + (type ? ' toast-' + type : '');
        toast.innerHTML = '<span>' + escHtml(message) + '</span>';

        if (undoFn) {
            var undoLink = document.createElement('span');
            undoLink.className = 'toast-undo';
            undoLink.textContent = 'Undo';
            undoLink.addEventListener('click', function() {
                undoFn();
                toast.remove();
                activeToast = null;
            });
            toast.appendChild(undoLink);
        }

        document.body.appendChild(toast);
        activeToast = toast;
        toastTimer = setTimeout(function() {
            if (toast.parentNode) toast.remove();
            activeToast = null;
        }, 5000);
    }

    // ===================================================================
    // PANEL HELPERS
    // ===================================================================

    function showPanel() {
        document.getElementById('detailPanel').classList.add('active');
        document.getElementById('panelOverlay').classList.add('active');
    }

    function closePanel() {
        document.getElementById('detailPanel').classList.remove('active');
        document.getElementById('panelOverlay').classList.remove('active');
        activeCardId = null;
        document.querySelectorAll('.step-card.active-card').forEach(function(el) { el.classList.remove('active-card'); });
    }

    function highlightCard(cardId) {
        document.querySelectorAll('.step-card.active-card').forEach(function(el) { el.classList.remove('active-card'); });
        var el = document.querySelector('[data-card-id="' + cardId + '"]');
        if (el) el.classList.add('active-card');
    }

    function setDetailLed(status) {
        document.getElementById('detailLed').className = 'detail-led-status led-' + status;
    }

    function makeSection(label, text) {
        var div = document.createElement('div');
        div.className = 'detail-section';
        div.innerHTML = '<div class="detail-section-label">' + escHtml(label) + '</div>' +
            '<div class="detail-section-text">' + escHtml(text) + '</div>';
        return div;
    }

    function updateCardLed(cardId, status) {
        var cardEl = document.querySelector('[data-card-id="' + cardId + '"]');
        if (cardEl) {
            cardEl.className = 'step-card led-' + status;
            if (cardId === activeCardId) cardEl.classList.add('active-card');
            var led = cardEl.querySelector('.step-led');
            if (led) led.className = 'step-led led-' + status;
        }
    }

    function updatePhaseProgressBar(phaseNum) {
        var progress = getPhaseProgress(phaseNum);
        var cols = document.querySelectorAll('.phase-column');
        var col = cols[phaseNum - 1];
        if (col) {
            var fill = col.querySelector('.phase-progress-fill');
            if (fill) fill.style.width = progress.pct + '%';
            var comp = col.querySelector('.phase-completion');
            if (comp) comp.textContent = progress.done + '/' + progress.total;
        }
    }

    function escHtml(str) {
        if (!str && str !== 0) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function fallbackCopy(text, btn) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
            document.execCommand('copy');
            showToast('Prompt copied to clipboard');
            if (btn) { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy to Clipboard'; }, 2000); }
        } catch(e) {
            showToast('Copy failed \u2014 select and copy manually', 'error');
        }
        document.body.removeChild(ta);
    }

    function renderAiResults(result, fieldDefs) {
        var list = document.getElementById('aiResultsList');
        if (!list) return;
        var html = '';
        var filled = 0;
        fieldDefs.forEach(function(fd) {
            if (result.fields[fd.key]) {
                html += '<div class="ai-result-item filled">\u2713 ' + escHtml(fd.promptLabel) + ': ' + escHtml(result.fields[fd.key]) + '</div>';
                filled++;
            } else {
                html += '<div class="ai-result-item unfilled">\u25CB ' + escHtml(fd.promptLabel) + ' not found</div>';
            }
        });
        html += '<div class="ai-results-summary">Fields auto-filled: ' + filled + ' / ' + fieldDefs.length + '</div>';
        list.innerHTML = html;
    }

    // ===================================================================
    // AI ASSIST — REUSABLE BUTTON BINDERS
    // ===================================================================

    function bindAiCopyBtn(itemId) {
        var btn = document.getElementById('btnAiCopy');
        if (!btn) return;
        btn.addEventListener('click', function() {
            var promptText = document.getElementById('aiPromptText');
            if (!promptText) return;
            var text = promptText.value;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showToast('Prompt copied to clipboard');
                    btn.textContent = 'Copied!';
                    setTimeout(function() { btn.textContent = 'Copy to Clipboard'; }, 2000);
                }).catch(function() { fallbackCopy(text, btn); });
            } else { fallbackCopy(text, btn); }
        });
    }

    function bindAiApplyBtn(itemId, dynType) {
        dynType = dynType || 'fleet';
        var btn = document.getElementById('btnAiApply');
        if (!btn) return;
        btn.addEventListener('click', function() {
            if (!isEditUnlocked()) { showToast('Read-only mode \u2014 unlock editing first', 'error'); return; }
            var responseText = document.getElementById('aiResponseText');
            if (!responseText || !responseText.value.trim()) { showToast('Paste the AI response first', 'error'); return; }
            var stateArr = dynType === 'fleet' ? state.fleet : dynType === 'materials' ? state.materials : state.software;
            var fieldDefs = dynType === 'fleet' ? FLEET_PROMPT_FIELDS : MATERIALS_PROMPT_FIELDS;
            var item = stateArr.find(function(x) { return x.id === itemId; });
            if (!item) return;
            var introFn = dynType === 'fleet' ? getFleetIntro : getMaterialIntro;
            var config = createClaudePromptConfig(fieldDefs, item, introFn(item));
            var result = config.parseResponse(responseText.value);
            if (result.count === 0) { showToast('Could not parse any fields from the response', 'error'); return; }
            Object.keys(result.fields).forEach(function(key) {
                item[key] = result.fields[key];
                var input = document.querySelector('.field-input[data-dyn="' + dynType + '"][data-id="' + itemId + '"][data-field="' + key + '"]');
                if (input) input.value = result.fields[key];
            });
            item.verified = false;
            item.status_led = getDynamicCardStatus(item);
            saveState();
            // Re-render color tags if materials
            if (dynType === 'materials') renderColorTags(item);
            renderAiResults(result, fieldDefs);
            showToast('Applied ' + result.count + ' field(s) from AI response');
            var newIntro = introFn(item);
            if (newIntro !== null) {
                var newConfig = createClaudePromptConfig(fieldDefs, item, newIntro);
                var promptEl = document.getElementById('aiPromptText');
                if (promptEl) promptEl.value = newConfig.prompt;
            }

            // --- Live UI updates after Apply ---
            // Live-update card title and cost per gram
            if (dynType === 'materials') {
                var titleEl = document.getElementById('detailTitle');
                if (titleEl) titleEl.textContent = item.type && item.supplier ? item.type + ' \u2014 ' + item.supplier : 'Configure this material';
                var stepEl = document.getElementById('detailStepInfo');
                if (stepEl) stepEl.textContent = getMaterialNumber(item) + ' \u2014 ' + (item.type || 'New Material');
                // Refresh cost per gram display
                var effCost = parseFloat(item.costKg) || 0;
                var cpgVal = effCost > 0 ? (effCost / 1000).toFixed(5) : '\u2014';
                var calcEl = document.querySelector('.field-calculated');
                if (calcEl) calcEl.innerHTML = '$' + (effCost > 0 ? effCost.toFixed(2) : '\u2014') + '/kg \u2192 $' + cpgVal + '/g';
                // Update detail LED
                setDetailLed(item.status_led);
                // Update grid card behind the panel
                var matEffCostApply = parseFloat(item.costKg) || 0;
                var matDescApply = (item.supplier || 'No supplier') + '\n$' + (matEffCostApply > 0 ? matEffCostApply.toFixed(2) : '\u2014') + '/kg';
                updateGridCard('mat-' + item.id, item.type || 'New Material', matDescApply, item.status_led);
            } else if (dynType === 'fleet') {
                var titleEl2 = document.getElementById('detailTitle');
                if (titleEl2) titleEl2.textContent = ((item.brand || '') + ' ' + (item.model || '')).trim() || 'Configure this printer';
                var stepEl2 = document.getElementById('detailStepInfo');
                if (stepEl2) stepEl2.textContent = getFleetNumber(item) + ' \u2014 ' + (item.name || 'New Printer');
                setDetailLed(item.status_led);
                // Update grid card behind the panel
                var fleetNameApply = ((item.brand || '') + ' ' + (item.model || '')).trim();
                updateGridCard('fleet-' + item.id, item.name || fleetNameApply || 'New Printer', fleetNameApply || 'No model', item.status_led);
            }
        });
    }

    function bindAiResponseWatcher() {
        var textarea = document.getElementById('aiResponseText');
        var btn = document.getElementById('btnAiApply');
        if (!textarea || !btn) return;
        var check = function() {
            if (textarea.value.trim()) {
                btn.disabled = false;
                btn.classList.remove('disabled');
            } else {
                btn.disabled = true;
                btn.classList.add('disabled');
            }
        };
        textarea.addEventListener('input', check);
        textarea.addEventListener('change', check);
    }


    // ===================================================================
    // AI ASSIST — STATIC CARD HANDLERS (Machine Economics)
    // ===================================================================

    function bindStaticAiApplyBtn(cardId) {
        var btn = document.getElementById('btnAiApply');
        if (!btn) return;
        btn.addEventListener('click', function() {
            if (!isEditUnlocked()) { showToast('Read-only mode — unlock editing first', 'error'); return; }
            var responseText = document.getElementById('aiResponseText');
            if (!responseText || !responseText.value.trim()) { showToast('Paste the AI response first', 'error'); return; }

            // Build current values from W3.1 + W3.2
            var meCurrentValues = {
                lifespan: (state.statics['3.1'].values.lifespan || ''),
                annualBudget: (state.statics['3.2'].values.annualBudget || ''),
                hrsPerMachinePerYear: (state.statics['3.2'].values.hrsPerMachinePerYear || '')
            };
            var config = createClaudePromptConfig(MACHINE_ECON_PROMPT_FIELDS, meCurrentValues, getMachineEconIntro());
            var result = config.parseResponse(responseText.value);
            if (result.count === 0) { showToast('Could not parse any fields from the response', 'error'); return; }

            // Apply parsed values to the correct static cards
            var filledW31 = 0, filledW32 = 0;
            MACHINE_ECON_PROMPT_FIELDS.forEach(function(fd) {
                if (!result.fields[fd.key]) return;
                var targetCard = fd.target;
                state.statics[targetCard].values[fd.key] = result.fields[fd.key];
                state.statics[targetCard].verified = false;
                state.statics[targetCard].status = getStaticCardStatus(targetCard);
                if (targetCard === '3.1') filledW31++;
                else filledW32++;
                // Update visible input if on current card
                var input = document.querySelector('.field-input[data-card="' + targetCard + '"][data-field="' + fd.key + '"]');
                if (input) input.value = result.fields[fd.key];
            });
            saveState();

            // Update LEDs
            ['3.1', '3.2'].forEach(function(cid) {
                updateCardLed(cid, state.statics[cid].status);
                updatePhaseProgressBar(STATIC_CARDS[cid].phase);
            });
            setDetailLed(state.statics[cardId].status);
            updateCompletionDisplay();

            // Render results
            renderAiResults(result, MACHINE_ECON_PROMPT_FIELDS);
            var summary = 'Applied ' + result.count + ' field(s)';
            if (filledW31 > 0 && filledW32 > 0) summary += ' across W3.1 + W3.2';
            else if (filledW32 > 0) summary += ' to W3.2';
            showToast(summary);

            // Regenerate prompt
            var newMeVals = {
                lifespan: (state.statics['3.1'].values.lifespan || ''),
                annualBudget: (state.statics['3.2'].values.annualBudget || ''),
                hrsPerMachinePerYear: (state.statics['3.2'].values.hrsPerMachinePerYear || '')
            };
            var newConfig = createClaudePromptConfig(MACHINE_ECON_PROMPT_FIELDS, newMeVals, getMachineEconIntro());
            var promptEl = document.getElementById('aiPromptText');
            if (promptEl) promptEl.value = newConfig.prompt;
        });
    }

    function bindStaticAiClearBtn(cardId) {
        var btn = document.getElementById('btnAiClear');
        if (!btn) return;
        btn.addEventListener('click', function() {
            if (!isEditUnlocked()) { showToast('Read-only mode — unlock editing first', 'error'); return; }
            // Clear AI-fillable fields from W3.1 and W3.2
            state.statics['3.1'].values.lifespan = '';
            state.statics['3.1'].verified = false;
            state.statics['3.1'].status = getStaticCardStatus('3.1');
            state.statics['3.2'].values.annualBudget = '';
            state.statics['3.2'].values.hrsPerMachinePerYear = '';
            state.statics['3.2'].verified = false;
            state.statics['3.2'].status = getStaticCardStatus('3.2');
            saveState();
            ['3.1', '3.2'].forEach(function(cid) {
                updateCardLed(cid, state.statics[cid].status);
                updatePhaseProgressBar(STATIC_CARDS[cid].phase);
            });
            updateCompletionDisplay();
            openStaticCard(cardId);
            showToast('AI fields cleared from W3.1 + W3.2 — prompt regenerated');
        });
    }

    // ===================================================================
    // MODEL LOOKUP LIST (localStorage)
    // ===================================================================

    var MODEL_LOOKUP_KEY = 'opsflow_printer_models';

    function getModelLookup() {
        var data = OpsFlow.getLocal(MODEL_LOOKUP_KEY);
        return Array.isArray(data) ? data : [];
    }

    function saveModelLookup(modelName) {
        if (!modelName || !modelName.trim()) return;
        var models = getModelLookup();
        var normalized = modelName.trim();
        var exists = false;
        for (var i = 0; i < models.length; i++) {
            if (models[i].toLowerCase() === normalized.toLowerCase()) { exists = true; break; }
        }
        if (!exists) {
            models.push(normalized);
            OpsFlow.set(MODEL_LOOKUP_KEY, models);
        }
    }

    // ===================================================================
    // EVENT LISTENERS
    // ===================================================================

    document.getElementById('detailBackBtn').addEventListener('click', closePanel);
    document.getElementById('panelOverlay').addEventListener('click', closePanel);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePanel();
    });

    document.getElementById('resetStateBtn').addEventListener('click', function() {
        if (!requireEdit('reset')) return;
        var snapshot = JSON.parse(JSON.stringify(state));
        state = createDefaultState();
        saveState();
        closePanel();
        render();
        showToast('Workshop reset to defaults', null, function() {
            state = snapshot;
            saveState();
            render();
        });
    });

    // ===================================================================
    // INIT
    // ===================================================================

    updateLockIcon();
    render();

    // Seed model lookup from existing fleet data
    state.fleet.forEach(function(p) {
        if (p.model) {
            var fullName = ((p.brand || '') + ' ' + p.model).trim();
            saveModelLookup(fullName);
        }
    });

    </script>
