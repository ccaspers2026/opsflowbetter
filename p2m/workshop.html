<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Workshop Setup — P2M Pipeline</title>
    <style>
        /* ===== BASE THEME (matches Pipeline) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            overflow-x: hidden;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ═══ P2M SHARED COMPONENTS — identical on all P2M pages ═══ */
        .suite-nav {
            display: flex;
            align-items: center;
            font-size: 12px;
            background: #0d1117;
            border-bottom: 1px solid #21262d;
            padding: 8px 20px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 9999;
        }
        .suite-nav .suite-home {
            display: flex;
            align-items: center;
            margin-right: 16px;
            text-decoration: none;
            flex-shrink: 0;
            font-size: 14px;
            font-weight: 800;
        }
        .suite-nav .suite-home:hover { opacity: 0.8; text-decoration: none; }
        .suite-nav .brand-ops { color: #e6edf3; }
        .suite-nav .brand-flow { color: #3b82f6; }
        .suite-nav .brand-better { color: #8b5cf6; }
        .suite-nav .p2m-links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }
        .suite-nav a { color: #58a6ff; text-decoration: none; }
        .suite-nav a:hover { text-decoration: underline; color: #79c0ff; }
        .suite-nav .current { color: #e0e0e0; font-weight: 600; }
        .suite-nav .sep { color: #30363d; }

        .p2m-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 20px 16px;
            border-bottom: 1px solid #21262d;
        }
        .p2m-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin: 0 0 2px 0;
            line-height: 1.2;
        }
        .p2m-header .version {
            font-size: 13px;
            color: #58a6ff;
            margin: 0 0 2px 0;
        }
        .p2m-header .tagline {
            font-size: 12px;
            color: #8b949e;
            margin: 0;
        }
        /* ═══ END P2M SHARED COMPONENTS ═══ */

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ===== SUMMARY BAR ===== */
        .summary-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-radius: 6px;
            font-size: 12px;
            color: #8b949e;
        }
        .summary-bar strong { color: #e0e0e0; }
        .overall-led {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        .overall-led.led-red { background-color: #6b2020; border-color: #9b3333; }
        .overall-led.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 6px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .overall-led.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 6px rgba(201,154,29,0.4); }
            50% { box-shadow: 0 0 12px rgba(201,154,29,0.7); }
        }

        /* ===== PIPELINE WRAPPER ===== */
        .workshop-wrapper {
            padding: 20px;
            overflow-x: auto;
        }
        .workshop-pipeline {
            display: flex;
            gap: 16px;
            min-width: max-content;
            padding-bottom: 20px;
        }

        /* ===== PHASE COLUMNS ===== */
        .phase-column {
            flex: 0 0 240px;
            background-color: #0d1117;
            border: 1px solid #21262d;
            border-top: 3px solid;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }
        .phase-column.phase-1 { border-top-color: #2563eb; }
        .phase-column.phase-2 { border-top-color: #7c3aed; }
        .phase-column.phase-3 { border-top-color: #059669; }
        .phase-column.phase-4 { border-top-color: #d97706; }
        .phase-column.phase-5 { border-top-color: #dc2626; }
        .phase-column.phase-6 { border-top-color: #db2777; }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .phase-header:hover { opacity: 0.85; }
        .phase-collapse-arrow {
            font-size: 10px;
            color: #6e7681;
            transition: transform 0.25s ease;
            flex-shrink: 0;
            margin-left: 2px;
        }
        .phase-column.collapsed .phase-collapse-arrow { transform: rotate(-90deg); }
        .phase-column.collapsed .phase-progress-bar { margin-bottom: 0; }
        .phase-column.collapsed .phase-content { display: none; }
        .phase-column.collapsed .add-card-btn { display: none; }
        .phase-number {
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .phase-1 .phase-number { background-color: #2563eb; }
        .phase-2 .phase-number { background-color: #7c3aed; }
        .phase-3 .phase-number { background-color: #059669; }
        .phase-4 .phase-number { background-color: #d97706; }
        .phase-5 .phase-number { background-color: #dc2626; }
        .phase-6 .phase-number { background-color: #db2777; }

        .phase-name {
            font-size: 13px;
            font-weight: 600;
            color: #e0e0e0;
            flex: 1;
        }
        .phase-completion {
            font-size: 11px;
            color: #8b949e;
            white-space: nowrap;
        }

        /* ===== PROGRESS BAR ===== */
        .phase-progress-bar {
            height: 3px;
            background-color: #21262d;
            border-radius: 2px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .phase-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .phase-1 .phase-progress-fill { background-color: #2563eb; }
        .phase-2 .phase-progress-fill { background-color: #7c3aed; }
        .phase-3 .phase-progress-fill { background-color: #059669; }
        .phase-4 .phase-progress-fill { background-color: #d97706; }
        .phase-5 .phase-progress-fill { background-color: #dc2626; }
        .phase-6 .phase-progress-fill { background-color: #db2777; }

        .phase-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        /* ===== STEP CARDS ===== */
        .step-card {
            background-color: #161b22;
            border: 1px solid #21262d;
            border-left: 3px solid #6e7681;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .step-card:hover {
            border-color: #58a6ff;
            box-shadow: 0 4px 12px rgba(88,166,255,0.15);
            transform: translateY(-2px);
        }
        .step-card.active-card {
            background-color: #1e2a3a;
            border-color: #58a6ff;
            box-shadow: inset 0 0 12px rgba(88,166,255,0.15);
        }
        .step-card.led-red { border-left-color: #f85149; }
        .step-card.led-yellow { border-left-color: #c99a1d; }
        .step-card.led-green { border-left-color: #2ea44f; }

        .step-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .step-number {
            font-size: 12px;
            font-weight: bold;
            color: #8b949e;
        }
        .step-led {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 2px solid;
            position: relative;
            flex-shrink: 0;
        }
        .step-led::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 60%; height: 60%;
            border-radius: 50%;
            background-color: inherit;
            opacity: 0.5;
        }
        .step-led.led-red { background-color: #6b2020; border-color: #9b3333; }
        .step-led.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 8px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .step-led.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        .step-title {
            font-size: 12px;
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 4px;
        }
        .step-description {
            font-size: 11px;
            color: #8b949e;
            line-height: 1.3;
        }
        .step-output {
            font-size: 11px;
            color: #58a6ff;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #21262d;
        }
        .step-output::before { content: '\2192 '; color: #8b949e; }

        /* ===== ADD CARD BUTTON ===== */
        .add-card-btn {
            padding: 8px;
            margin-top: 4px;
            border: 1px dashed #30363d;
            border-radius: 6px;
            background: transparent;
            color: #8b949e;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .add-card-btn:hover {
            border-color: #58a6ff;
            color: #58a6ff;
        }

        /* ===== DETAIL PANEL ===== */
        .detail-panel {
            position: fixed;
            top: 0; right: -480px;
            width: 460px;
            height: 100vh;
            background-color: #0d1117;
            border-left: 1px solid #21262d;
            z-index: 100;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 20px rgba(0,0,0,0.4);
        }
        .detail-panel.active { right: 0; }

        .detail-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #21262d;
            background-color: #161b22;
            gap: 12px;
            flex-shrink: 0;
        }
        .detail-back-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            width: 32px; height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .detail-back-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .detail-title-section { flex: 1; }
        .detail-step-info { font-size: 12px; color: #8b949e; margin-bottom: 2px; }
        .detail-title { font-size: 16px; font-weight: 600; color: #e0e0e0; }
        .detail-phase-info { font-size: 11px; color: #6e7681; margin-top: 2px; }

        .detail-led-status {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        .detail-led-status.led-red { background-color: #6b2020; border-color: #9b3333; }
        .detail-led-status.led-yellow { background-color: #8b6914; border-color: #c99a1d; box-shadow: 0 0 8px rgba(201,154,29,0.4); animation: pulse-yellow 2s infinite; }
        .detail-led-status.led-green { background-color: #1a7a33; border-color: #2ea44f; }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        /* ===== DETAIL SECTIONS ===== */
        .detail-section {
            padding: 16px;
            border-bottom: 1px solid #21262d;
        }
        .detail-section-label {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .detail-section-text {
            font-size: 13px;
            color: #c9d1d9;
            line-height: 1.5;
        }

        /* ===== FORM FIELDS ===== */
        .field-group {
            margin-bottom: 12px;
        }
        .field-label {
            font-size: 11px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 4px;
            display: block;
        }
        .field-input {
            width: 100%;
            padding: 8px 10px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .field-input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
        }
        .field-input::placeholder { color: #6e7681; }
        .field-select {
            width: 100%;
            padding: 8px 10px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }
        .field-select:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .field-hint {
            font-size: 10px;
            color: #6e7681;
            margin-top: 3px;
        }
        .field-calculated {
            padding: 8px 10px;
            background-color: #0d1117;
            border: 1px dashed #30363d;
            border-radius: 4px;
            color: #58a6ff;
            font-size: 13px;
            font-weight: 600;
            position: relative;
        }
        .field-label-calc {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .calc-badge {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #58a6ff;
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.25);
            border-radius: 3px;
            padding: 1px 5px;
        }
        .field-row {
            display: flex;
            gap: 8px;
        }
        .field-row .field-input { flex: 1; }
        .field-row .field-select { flex: 0 0 120px; }

        /* ===== ACTION BUTTONS ===== */
        .btn-verify {
            width: 100%;
            padding: 10px;
            background-color: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-verify:hover { background-color: #2ea44f; }

        .btn-unverify {
            width: 100%;
            padding: 8px;
            background-color: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-unverify:hover { border-color: #f85149; color: #f85149; }

        .btn-remove-card {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #8b949e;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-remove-card:hover { border-color: #f85149; color: #f85149; }

        /* ===== OVERLAY ===== */
        .panel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 99;
        }
        .panel-overlay.active { display: block; }

        /* ===== MOBILE ===== */
        @media (max-width: 900px) {
            .workshop-pipeline {
                flex-direction: column;
                min-width: unset;
            }
            .phase-column {
                flex: none;
                width: 100%;
            }
            .detail-panel {
                width: 100%;
                right: -100%;
            }
            .workshop-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6e7681; }

        /* ===== TOAST ===== */
        .workshop-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 20px;
            color: #c9d1d9;
            font-size: 13px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            animation: toast-in 0.3s ease;
        }
        .workshop-toast.toast-error { border-color: #f85149; }
        .workshop-toast.toast-success { border-color: #2ea44f; }
        .workshop-toast .toast-undo {
            color: #58a6ff;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .workshop-toast .toast-undo:hover { text-decoration: underline; }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== FIELD VALIDATION ===== */
        .field-validation-msg {
            font-size: 11px;
            color: #f85149;
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(248,81,73,0.1);
            border-radius: 4px;
        }
    </style>
</head>

    <!-- ── P2M Suite Nav ─────────────────────────────────────── -->
    <div class="suite-nav">
        <a href="/launchpad.html" class="suite-home" title="OpsFlowBetter Suite Home"><span class="brand-ops">Ops</span><span class="brand-flow">Flow</span><span class="brand-better">Better</span></a>
        <div class="p2m-links">
            <a href="index.html">Pipeline</a> <span class="sep">|</span>
            <a href="media-center.html">Media Pipeline</a> <span class="sep">|</span>
            <span class="current">Workshop</span> <span class="sep">|</span>
            <a href="services.html">Services</a> <span class="sep">|</span>
            <a href="changelog.html">Changelog</a> <span class="sep">|</span>
            <a href="tasks.html">Tasks</a> <span class="sep">|</span>
            <a href="tester.html">Tester</a>
        </div>
    </div>

    <!-- ── P2M Page Header ───────────────────────────────── -->
    <div class="p2m-header">
        <div>
            <h1>Workshop Setup</h1>
            <p class="version">Workshop v0.64.1</p>
            <p class="tagline">Configure your production capabilities &mdash; every card feeds your product pipeline</p>
        </div>
        <div class="header-right">
            <div class="summary-bar" id="blendedRateBanner" style="border-color:#059669;">
                <span style="color:#2ea44f;font-weight:700;font-size:14px;" id="blendedRateDisplay">Blended Rate: $—/hr</span>
                <span style="font-size:11px;color:#6e7681;" id="blendedRateBreakdown"></span>
            </div>
            <div class="summary-bar">
                <span>Completion: <strong id="completionPct">0%</strong></span>
                <span>(<strong id="completionCount">0/0</strong> cards)</span>
                <div class="overall-led led-red" id="overallLed"></div>
                <button id="resetStateBtn" style="background:none;border:1px solid #30363d;color:#8b949e;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;" title="Reset all Workshop data to defaults">Reset</button>
                <span id="editLockIcon" onclick="toggleEditLock()" style="font-size:18px;cursor:pointer;margin-left:8px;transition:opacity 0.2s;">&#128274;</span>
            </div>
        </div>
    </div>

    <!-- PIPELINE -->
    <div class="workshop-wrapper">
        <div class="workshop-pipeline" id="workshopPipeline"></div>
    </div>

    <!-- DETAIL PANEL OVERLAY -->
    <div class="panel-overlay" id="panelOverlay"></div>

    <!-- DETAIL PANEL -->
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <button class="detail-back-btn" id="detailBackBtn">&larr;</button>
            <div class="detail-title-section">
                <div class="detail-step-info" id="detailStepInfo"></div>
                <div class="detail-title" id="detailTitle"></div>
                <div class="detail-phase-info" id="detailPhaseInfo"></div>
            </div>
            <div class="detail-led-status led-red" id="detailLed"></div>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>

    <script>
    // ===================================================================
    // WORKSHOP STATE & CARD DEFINITIONS
    // ===================================================================

    var PHASES = {
        1: { name: 'Facility & Utilities', color: '#2563eb' },
        2: { name: 'Printer Fleet', color: '#7c3aed', dynamic: true, dynamicLabel: '+ Add Printer' },
        3: { name: 'Machine Economics', color: '#059669' },
        4: { name: 'Materials Library', color: '#d97706', dynamic: true, dynamicLabel: '+ Add Material' },
        5: { name: 'Labor', color: '#dc2626' },
        6: { name: 'Software & Tools', color: '#db2777', dynamic: true, dynamicLabel: '+ Add Tool' }
    };

    var STATIC_CARDS = {
        '1.1': {
            phase: 1, number: 'W1.1', title: 'Electricity Rate',
            description: 'Your per-kWh electricity cost',
            output: 'Feeds machine economics',
            purpose: 'Your electricity rate determines the energy cost per print hour. This flows into Machine Economics (Phase 3) to calculate the blended hourly rate that every product uses for COGS.',
            fields: [
                { key: 'rate', label: '$ per kWh', type: 'text', placeholder: '0.107', hint: 'Confirmed from Duke Energy bill — $0.107/kWh' }
            ]
        },
        '1.2': {
            phase: 1, number: 'W1.2', title: 'Workspace Details',
            description: 'Physical workspace and overhead',
            output: 'Overhead allocation baseline',

    var state = loadState();

    function createDefaultState() {
        var s = {
            statics: {},
            fleet: DEFAULT_FLEET.map(function(p) { return Object.assign({}, p, { status_led: 'red', verified: false }); }),
            materials: DEFAULT_MATERIALS.map(function(m) { return Object.assign({}, m, { status_led: 'red', verified: false }); }),
            software: DEFAULT_SOFTWARE.map(function(sw) { return Object.assign({}, sw, { status_led: 'red', verified: false }); }),
            nextDynId: { fleet: 8, materials: 3, software: 4 }
        };
        Object.keys(STATIC_CARDS).forEach(function(id) {
            s.statics[id] = { status: 'red', verified: false, values: {} };
            STATIC_CARDS[id].fields.forEach(function(f) {
                if (f.type !== 'calculated' && f.type !== 'linked') {
                    s.statics[id].values[f.key] = f.placeholder || '';
                }
            });
        });
        return s;
    }

    function loadState() {
        try {
            var saved = localStorage.getItem('workshopState_v2');
            if (saved) return JSON.parse(saved);
        } catch (e) { /* ignore */ }
        return createDefaultState();
    }

    function saveState() {
        try {
            localStorage.setItem('workshopState_v2', JSON.stringify(state));
        } catch (e) { /* ignore */ }
    }

    // ===================================================================
    // EDIT LOCK (shared with Pipeline via same localStorage key)
    // ===================================================================

    var EDIT_LOCK_KEY = 'opsflow_edit_unlocked';
    var EDIT_PASSWORD = 'BlowMeAway!';

    function isEditUnlocked() {
        try { return localStorage.getItem(EDIT_LOCK_KEY) === 'true'; } catch(e) { return false; }
    }

    function promptEditUnlock() {
        var pw = prompt('Enter edit password:');
        if (pw === EDIT_PASSWORD) {
            try { localStorage.setItem(EDIT_LOCK_KEY, 'true'); } catch(e) {}
            updateLockIcon();
            showToast('Edit mode unlocked');
            return true;
        } else if (pw !== null) {
            showToast('Incorrect password', 'error');
        }
        return false;
    }

    function lockEditing() {
        try { localStorage.removeItem(EDIT_LOCK_KEY); } catch(e) {}
        updateLockIcon();
        showToast('Edit mode locked');
    }

    function toggleEditLock() {
        if (isEditUnlocked()) { lockEditing(); }
        else { promptEditUnlock(); }
    }

    function updateLockIcon() {
        var icon = document.getElementById('editLockIcon');
        if (!icon) return;
        if (isEditUnlocked()) {
            icon.textContent = '\uD83D\uDD13';
            icon.title = 'Edit mode ON \u2014 click to lock';
            icon.style.opacity = '1';
        } else {
            icon.textContent = '\uD83D\uDD12';
            icon.title = 'Read-only mode \u2014 click to unlock editing';
            icon.style.opacity = '0.6';
        }
    }

    function requireEdit(actionName) {
        if (isEditUnlocked()) return true;
        showToast('Read-only mode \u2014 unlock editing to ' + (actionName || 'make changes'), 'error');
        return false;
    }

    // ===================================================================
    // LED STATUS LOGIC
    // ===================================================================

    function getStaticCardStatus(cardId) {
        var def = STATIC_CARDS[cardId];
        var data = state.statics[cardId];
        if (!def || !data) return 'red';
        if (data.verified) return 'green';

        if (def.allLinked) return 'yellow';

        var requiredFields = def.fields.filter(function(f) { return f.type !== 'calculated' && f.type !== 'linked'; });
        if (requiredFields.length === 0) return 'yellow';

        var filled = requiredFields.filter(function(f) {
            var val = data.values[f.key];
            return val !== undefined && val !== null && val !== '';
        }).length;

        if (def.optional && filled === 0) return 'red';
        if (filled === 0) return 'red';
        if (filled < requiredFields.length) return 'yellow';
        return 'yellow';
    }

    function getDynamicCardStatus(item) {
        if (item.verified) return 'green';
        var filled = 0;
        var total = 0;
        Object.keys(item).forEach(function(key) {
            if (key !== 'id' && key !== 'status_led' && key !== 'verified' && key !== 'costGram') {
                total++;
                if (item[key] !== '' && item[key] !== null && item[key] !== undefined) filled++;
            }
        });
        if (filled === 0) return 'red';
        return 'yellow';
    }

    function updateAllStatuses() {
        Object.keys(STATIC_CARDS).forEach(function(id) {
            state.statics[id].status = getStaticCardStatus(id);
        });
        state.fleet.forEach(function(p) { p.status_led = getDynamicCardStatus(p); });
        state.materials.forEach(function(m) { m.status_led = getDynamicCardStatus(m); });
        state.software.forEach(function(s) { s.status_led = getDynamicCardStatus(s); });
    }

    // ===================================================================
    // CALCULATED FIELDS
    // ===================================================================

    function getFieldValue(cardId, fieldKey) {
        if (state.statics[cardId]) {
            return state.statics[cardId].values[fieldKey] || '';
        }
        return '';
    }

    function calcAvgHoursPerDay() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 24;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.hours) || 0); }, 0);
        return total / active.length;
    }

    function getFleetAvgPrice() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 0;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.price) || 0); }, 0);
        return Math.round(total / active.length);
    }

    function getFleetAvgWatts() {
        var active = state.fleet.filter(function(p) { return p.status === 'Active'; });
        if (active.length === 0) return 0;
        var total = active.reduce(function(s, p) { return s + (parseFloat(p.watts) || 0); }, 0);
        return Math.round(total / active.length * 10) / 10;
    }

    function calcDepHour() {
        var price = getFleetAvgPrice();
        var lifespanHrs = parseFloat(getFieldValue('3.1', 'lifespan')) || 5000;
        if (price === 0) return '0.0000';
        return (price / lifespanHrs).toFixed(4);
    }

    function getActiveFleetCount() {
        return state.fleet.filter(function(p) { return p.status === 'Active'; }).length;
    }

    function calcMaintHour() {
        var fleetBudget = parseFloat(getFieldValue('3.2', 'annualBudget')) || 0;
        var machines = getActiveFleetCount() || 1;
        var hrsPerMachinePerYear = parseFloat(getFieldValue('3.2', 'hrsPerMachinePerYear')) || 800;
        var totalFleetHrs = machines * hrsPerMachinePerYear;
        if (totalFleetHrs === 0) return '0.0000';
        return (fleetBudget / totalFleetHrs).toFixed(4);
    }

    function calcElecHour() {
        var rate = parseFloat(getFieldValue('1.1', 'rate')) || 0;
        var watts = getFleetAvgWatts();
        return (rate * (watts / 1000)).toFixed(4);
    }

    function calcBlendedRate() {
        var dep = parseFloat(calcDepHour()) || 0;
        var maint = parseFloat(calcMaintHour()) || 0;
        var elec = parseFloat(calcElecHour()) || 0;
        return (dep + maint + elec).toFixed(2);
    }

    function getCalculatedValue(cardId, fieldKey) {
        if (cardId === '3.1' && fieldKey === 'fleetAvgPrice') return '$' + getFleetAvgPrice() + ' (from ' + getActiveFleetCount() + ' active printers)';
        if (cardId === '3.1' && fieldKey === 'depHour') return '$' + calcDepHour();
        if (cardId === '3.2' && fieldKey === 'fleetMachines') return getActiveFleetCount() + ' (from Fleet)';
        if (cardId === '3.2' && fieldKey === 'maintHour') return '$' + calcMaintHour();
        if (cardId === '3.3' && fieldKey === 'electricityRate') return '$' + (getFieldValue('1.1', 'rate') || '—');
        if (cardId === '3.3' && fieldKey === 'fleetAvgWatts') return getFleetAvgWatts() + 'W (from ' + getActiveFleetCount() + ' active printers)';
        if (cardId === '3.3' && fieldKey === 'elecHour') return '$' + calcElecHour();
        if (cardId === '3.4' && fieldKey === 'depComponent') return '$' + calcDepHour();
        if (cardId === '3.4' && fieldKey === 'maintComponent') return '$' + calcMaintHour();
        if (cardId === '3.4' && fieldKey === 'elecComponent') return '$' + calcElecHour();
        if (cardId === '3.4' && fieldKey === 'blendedRate') return '$' + calcBlendedRate();
        if (cardId === '3.5' && fieldKey === 'packagingTotal') {
            var poly = parseFloat(getFieldValue('3.5', 'polyBag')) || 0;
            var fnsku = parseFloat(getFieldValue('3.5', 'fnskuLabel')) || 0;
            var insert = parseFloat(getFieldValue('3.5', 'insertCard')) || 0;
            return '$' + (poly + fnsku + insert).toFixed(2);
        }
        return '—';
    }

    // ===================================================================
    // COMPLETION TRACKING
    // ===================================================================

    function getPhaseCards(phaseNum) {
        var cards = [];
        Object.keys(STATIC_CARDS).forEach(function(id) {
            if (STATIC_CARDS[id].phase === phaseNum) {
                cards.push({ id: id, status: state.statics[id].status });
            }
        });
        if (phaseNum === 2) state.fleet.forEach(function(p) { cards.push({ id: 'fleet-' + p.id, status: p.status_led }); });
        if (phaseNum === 4) state.materials.forEach(function(m) { cards.push({ id: 'mat-' + m.id, status: m.status_led }); });
        if (phaseNum === 6) state.software.forEach(function(s) { cards.push({ id: 'sw-' + s.id, status: s.status_led }); });
        return cards;
    }

    function getPhaseProgress(phaseNum) {
        var cards = getPhaseCards(phaseNum);
        if (cards.length === 0) return { done: 0, total: 0, pct: 0 };
        var done = cards.filter(function(c) { return c.status === 'green'; }).length;
        return { done: done, total: cards.length, pct: Math.round((done / cards.length) * 100) };
    }

    function getOverallProgress() {
        var total = 0, done = 0;
        for (var p = 1; p <= 6; p++) {
            var prog = getPhaseProgress(p);
            total += prog.total;
            done += prog.done;
        }
        return { done: done, total: total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
    }

    function updateCompletionDisplay() {
        var prog = getOverallProgress();
        document.getElementById('completionPct').textContent = prog.pct + '%';
        document.getElementById('completionCount').textContent = prog.done + '/' + prog.total;
        var led = document.getElementById('overallLed');
        led.className = 'overall-led';
        if (prog.pct === 100) led.classList.add('led-green');
        else if (prog.pct > 0) led.classList.add('led-yellow');
        else led.classList.add('led-red');
    }

    function render() {
        updateAllStatuses();
        renderPipeline();
        updateCompletionDisplay();
        updateBlendedRateBanner();
        saveState();
    }

    function updateBlendedRateBanner() {
        var rate = calcBlendedRate();
        var dep = calcDepHour();
        var maint = calcMaintHour();
        var elec = calcElecHour();
        var rateNum = parseFloat(rate) || 0;
        var display = document.getElementById('blendedRateDisplay');
        var breakdown = document.getElementById('blendedRateBreakdown');
        if (rateNum > 0) {
            display.textContent = 'Blended Rate: $' + rate + '/hr';
            display.style.color = '#2ea44f';
            breakdown.textContent = 'Dep $' + dep + ' + Maint $' + maint + ' + Elec $' + elec;
        } else {
            display.textContent = 'Blended Rate: $\u2014/hr';
            display.style.color = '#8b949e';
            breakdown.textContent = 'Complete Phase 3 cards to calculate';
        }
    }

    // Track collapsed phases (persists in localStorage)
    var collapsedPhases = {};
    try {
        var savedCollapsed = localStorage.getItem('workshopCollapsedPhases');
        if (savedCollapsed) collapsedPhases = JSON.parse(savedCollapsed);
    } catch(e) { /* ignore */ }

    function togglePhaseCollapse(phaseNum) {
        if (collapsedPhases[phaseNum]) {
            delete collapsedPhases[phaseNum];
        } else {
            collapsedPhases[phaseNum] = true;
        }
        try { localStorage.setItem('workshopCollapsedPhases', JSON.stringify(collapsedPhases)); } catch(e) {}
        render();
    }

    function renderPipeline() {
        var container = document.getElementById('workshopPipeline');
        container.innerHTML = '';

        for (var p = 1; p <= 6; p++) {
            var phaseInfo = PHASES[p];
            var progress = getPhaseProgress(p);

            var col = document.createElement('div');
            col.className = 'phase-column phase-' + p;
            if (collapsedPhases[p]) col.classList.add('collapsed');

            col.innerHTML = '<div class="phase-header" data-phase="' + p + '">' +
                '<span class="phase-collapse-arrow">&#9660;</span>' +
                '<span class="phase-number">' + p + '</span>' +
                '<span class="phase-name">' + phaseInfo.name + '</span>' +
                '<span class="phase-completion">' + progress.done + '/' + progress.total + '</span>' +
                '</div>' +
                '<div class="phase-progress-bar"><div class="phase-progress-fill" style="width:' + progress.pct + '%"></div></div>';

            var content = document.createElement('div');
            content.className = 'phase-content';

            // Static cards
            Object.keys(STATIC_CARDS).forEach(function(id) {
                if (STATIC_CARDS[id].phase === p) {
                    var def = STATIC_CARDS[id];
                    var data = state.statics[id];
                    content.appendChild(createCard(id, def.number, def.title, def.description, def.output, data.status, function(cardId) {
                        return function() { openStaticCard(cardId); };
                    }(id)));
                }
            });

            // Dynamic cards
            if (p === 2) {
                state.fleet.forEach(function(printer) {
                    content.appendChild(createCard('fleet-' + printer.id, printer.name || 'New Printer', printer.model || 'Unconfigured', printer.status, 'Printer config', printer.status_led, function(pid) {
                        return function() { openFleetCard(pid); };
                    }(printer.id)));
                });
            }
            if (p === 4) {
                state.materials.forEach(function(mat) {
                    content.appendChild(createCard('mat-' + mat.id, mat.name || 'New Material', mat.type || 'Unconfigured', '$' + (mat.costKg || '—') + '/kg', 'Material costs', mat.status_led, function(mid) {
                        return function() { openMaterialCard(mid); };
                    }(mat.id)));
                });
            }
            if (p === 6) {
                state.software.forEach(function(sw) {
                    var swCostDesc = sw.costCycle === 'Free' ? 'Free' : '$' + (sw.cost || '0') + '/' + (sw.costCycle || 'Free');

        var required = def.fields.filter(function(f) { return f.type !== 'calculated' && f.type !== 'linked'; });

    function attachDynListeners(dynType, itemId) {
        setTimeout(function() {
            var verifyBtn = document.getElementById('btnVerifyDyn');
            var unverifyBtn = document.getElementById('btnUnverifyDyn');
            var removeBtn = document.getElementById('btnRemoveDyn');

            if (verifyBtn) {
                verifyBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') verifyFleet(itemId);
                    else if (dynType === 'materials') verifyMaterial(itemId);
                    else if (dynType === 'software') verifySoftware(itemId);
                });
            }
            if (unverifyBtn) {
                unverifyBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') unverifyFleet(itemId);
                    else if (dynType === 'materials') unverifyMaterial(itemId);
                    else if (dynType === 'software') unverifySoftware(itemId);
                });
            }
            if (removeBtn) {
                removeBtn.addEventListener('click', function() {
                    if (dynType === 'fleet') removeFleet(itemId);
                    else if (dynType === 'materials') removeMaterial(itemId);
                    else if (dynType === 'software') removeSoftware(itemId);
                });
            }

            document.querySelectorAll('.field-input[data-dyn="' + dynType + '"], .field-select[data-dyn="' + dynType + '"]').forEach(function(el) {
                if (!isEditUnlocked()) { el.disabled = true; }
                var handler = function() {
                    if (!isEditUnlocked()) { showToast('Read-only mode \u2014 unlock editing to change values', 'error'); return; }
                    var arr = dynType === 'fleet' ? state.fleet : dynType === 'materials' ? state.materials : state.software;
                    var item = arr.find(function(x) { return x.id === el.dataset.id; });
                    if (item) {
                        item[el.dataset.field] = el.value;
                        item.verified = false;
                        item.status_led = getDynamicCardStatus(item);
                        saveState();
                    }
                };
                el.addEventListener('input', handler);
                el.addEventListener('change', handler);
            });
        }, 50);
    }

        } else if (phaseNum === 6) {
            var id = 's' + state.nextDynId.software++;
            state.software.push({ id: id, name: '', purpose: '', version: '', license: 'Free', cost: '0', costCycle: 'Free', notes: '', status_led: 'red', verified: false });
            render();
            openSoftwareCard(id);
        }
    }

    // ===================================================================

    // ===================================================================

    var activeToast = null;
    var toastTimer = null;

    function showToast(message, type, undoFn) {
        if (activeToast && activeToast.parentNode) activeToast.remove();
        if (toastTimer) clearTimeout(toastTimer);

        var toast = document.createElement('div');
        toast.className = 'workshop-toast' + (type ? ' toast-' + type : '');
        toast.innerHTML = '<span>' + escHtml(message) + '</span>';

        if (undoFn) {
            var undoLink = document.createElement('span');
            undoLink.className = 'toast-undo';
            undoLink.textContent = 'Undo';
            undoLink.addEventListener('click', function() {
                undoFn();
                toast.remove();
                activeToast = null;
            });
            toast.appendChild(undoLink);
        }

        document.body.appendChild(toast);
        activeToast = toast;
        toastTimer = setTimeout(function() {
            if (toast.parentNode) toast.remove();
            activeToast = null;
        }, 5000);
    }

        document.querySelectorAll('.step-card.active-card').forEach(function(el) { el.classList.remove('active-card'); });
    }

    function highlightCard(cardId) {
        document.querySelectorAll('.step-card.active-card').forEach(function(el) { el.classList.remove('active-card'); });
        var el = document.querySelector('[data-card-id="' + cardId + '"]');
        if (el) el.classList.add('active-card');
    }

    function setDetailLed(status) {
        document.getElementById('detailLed').className = 'detail-led-status led-' + status;
    }

    function makeSection(label, text) {
        var div = document.createElement('div');
        div.className = 'detail-section';
        div.innerHTML = '<div class="detail-section-label">' + escHtml(label) + '</div>' +
            '<div class="detail-section-text">' + escHtml(text) + '</div>';
        return div;
    }

    function updateCardLed(cardId, status) {
        var cardEl = document.querySelector('[data-card-id="' + cardId + '"]');
        if (cardEl) {
            cardEl.className = 'step-card led-' + status;
            if (cardId === activeCardId) cardEl.classList.add('active-card');
            var led = cardEl.querySelector('.step-led');
            if (led) led.className = 'step-led led-' + status;
        }
    }

    function updatePhaseProgressBar(phaseNum) {
        var progress = getPhaseProgress(phaseNum);
        var cols = document.querySelectorAll('.phase-column');
        var col = cols[phaseNum - 1];
        if (col) {
            var fill = col.querySelector('.phase-progress-fill');
            if (fill) fill.style.width = progress.pct + '%';
            var comp = col.querySelector('.phase-completion');
            if (comp) comp.textContent = progress.done + '/' + progress.total;
        }
    }

    function escHtml(str) {
        if (!str && str !== 0) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ===================================================================
    // EVENT LISTENERS
    // ===================================================================

    document.getElementById('detailBackBtn').addEventListener('click', closePanel);
    document.getElementById('panelOverlay').addEventListener('click', closePanel);
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closePanel();
    });

    document.getElementById('resetStateBtn').addEventListener('click', function() {
        if (!requireEdit('reset')) return;
        var snapshot = JSON.parse(JSON.stringify(state));
        state = createDefaultState();
        saveState();
        closePanel();
        render();
        showToast('Workshop reset to defaults', null, function() {
            state = snapshot;
            saveState();
            render();
        });
    });

    // ===================================================================
    // INIT
    // ===================================================================

    updateLockIcon();
    render();

    </script>
</body>
</html>
