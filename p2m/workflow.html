<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Workflow Dashboard - OpsFlowBetter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #0d1117; color: #e0e0e0; line-height: 1.6;
        }

        /* ═══ Nav (shared) ═══ */
        .suite-nav { display: flex; align-items: center; font-size: 12px; background: #0d1117; border-bottom: 1px solid #21262d; padding: 8px 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; }
        .suite-nav .suite-home { display: flex; align-items: center; margin-right: 16px; text-decoration: none; flex-shrink: 0; font-size: 14px; font-weight: 800; }
        .suite-nav .suite-home:hover { opacity: 0.8; text-decoration: none; }
        .suite-nav .brand-ops { color: #e6edf3; }
        .suite-nav .brand-flow { color: #3b82f6; }
        .suite-nav .brand-better { color: #8b5cf6; }
        .suite-nav .p2m-links { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center; }
        .p2m-link { color: #8b949e; text-decoration: none; padding: 2px 6px; }
        .p2m-link:hover { color: #e6edf3; }
        .p2m-link.current { color: #e6edf3; font-weight: 600; }
        .nav-sep { color: #30363d; }
        .suite-nav .admin-sep { margin: 0 4px; font-size: 10px; border-left: 1px solid #f0883e40; padding-left: 10px; margin-left: 6px; color: #f0883e80; font-weight: 600; letter-spacing: 0.5px; text-decoration: none; }
        .suite-nav .admin-sep:hover { color: #f0883e; text-decoration: none; }
        .suite-nav .admin-sep.current { color: #f0883e; }

        /* ═══ Layout ═══ */
        main { margin-top: 45px; padding: 24px 20px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .breadcrumb { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
        .breadcrumb a { color: #58a6ff; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 28px; font-weight: 600; }
        .page-header .version { font-size: 11px; color: #8b949e; background: #161b22; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-left: 8px; }
        .page-header .tagline { font-size: 13px; color: #8b949e; margin-top: 4px; }

        .section { margin-bottom: 32px; }
        .section-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #e6edf3; }

        /* ═══ Controls ═══ */
        .controls-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #30363d; transition: all 0.15s; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .btn-primary { background: #238636; color: #fff; border-color: #238636; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border-color: #30363d; }
        .btn-secondary:hover { background: #30363d; color: #e6edf3; }
        .btn-danger { background: #da3633; color: #fff; border-color: #da3633; }
        .btn-danger:hover { background: #f85149; }
        .btn-completion { background: #1f6feb; color: #fff; border-color: #1f6feb; }
        .btn-completion:hover { background: #388bfd; }
        .btn-discussion { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
        .btn-discussion:hover { background: #a78bfa; }
        .controls-sep { width: 1px; height: 24px; background: #21262d; }
        .cycle-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ═══ SVG Canvas ═══ */
        .svg-container { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; overflow-x: auto; overflow-y: auto; }
        .svg-container svg { display: block; }
        /* SVG node hover */
        .svg-container svg .node-circle { cursor: pointer; transition: filter 0.15s; }
        .svg-container svg .node-circle:hover { filter: brightness(1.3); }
        .svg-container svg .node-label { pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .svg-container svg .who-label { pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .svg-container svg .branch-label { pointer-events: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

        /* ═══ Legend ═══ */
        .legend { display: flex; gap: 16px; margin-top: 12px; font-size: 11px; color: #8b949e; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.red { background: #f85149; }
        .legend-dot.yellow { background: #d29922; }
        .legend-dot.green { background: #2ea44f; }

        /* ═══ PQ & History ═══ */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
        .cycle-history { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }

        /* ═══ Full PQ (from Tasks page) ═══ */
        .pq-list { display: flex; flex-direction: column; gap: 8px; }
        .pq-task { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; }
        .pq-task:hover { border-color: #30363d; }
        .pq-task .order-num { font-size: 18px; font-weight: 700; color: #484f58; min-width: 24px; text-align: center; margin-top: 2px; flex-shrink: 0; }
        .pq-order-select { background: #0d1117; border: 1px solid #30363d; color: #8b949e; padding: 2px 4px; border-radius: 4px; font-size: 11px; cursor: pointer; width: 38px; text-align: center; }
        .pq-order-select:hover { border-color: #58a6ff; }
        .pq-task .priority { display: inline-flex; align-items: center; gap: 5px; margin-top: 4px; flex-shrink: 0; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .pq-task .priority::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .priority.high { color: #f85149; } .priority.high::before { background: #f85149; } .priority.high::after { content: 'Now'; }
        .priority.medium { color: #f0883e; } .priority.medium::before { background: #f0883e; } .priority.medium::after { content: 'Soon'; }
        .priority.low { color: #58a6ff; } .priority.low::before { background: #58a6ff; } .priority.low::after { content: 'Later'; }
        .pq-task .content { flex: 1; }
        .pq-task .title { font-size: 13px; color: #e0e0e0; font-weight: 500; }
        .pq-task .desc { font-size: 11px; color: #8b949e; margin-top: 3px; }
        .pq-task .meta { font-size: 10px; color: #484f58; margin-top: 4px; }
        .pq-task .tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600; margin-right: 4px; }
        .pq-task .task-id { font-size: 11px; color: #58a6ff; font-weight: 600; margin-right: 6px; }
        .task-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; margin-left: auto; }
        .btn-demote { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 4px; border: 1px solid #30363d; background: transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; color: #f0883e; }
        .btn-demote:hover { background: rgba(240, 136, 62, 0.15); border-color: #f0883e; }

        /* Status badges (full featured) */
        .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-left: 6px; vertical-align: middle; }
        .status-badge.new { color: #c9d1d9; border: 1px dashed #6e7681; }
        .status-badge.new:hover { border-color: #c9d1d9; color: #e6edf3; }
        .status-badge.new::after { content: 'New'; }
        .status-badge.discussing { color: #f0883e; border: 1px solid #f0883e; background: rgba(240, 136, 62, 0.15); }
        .status-badge.discussing::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #f0883e; }
        .status-badge.discussing::after { content: 'Discussing'; }
        .status-badge.in-progress { color: #58a6ff; border: 1px solid #58a6ff; background: rgba(88, 166, 255, 0.15); }
        .status-badge.in-progress::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #58a6ff; animation: statusPulse 1.5s ease-in-out infinite; }
        .status-badge.in-progress::after { content: 'In Progress'; }
        .status-badge.deployed { color: #d2a8ff; border: 1px solid #8b5cf6; background: rgba(139, 92, 246, 0.15); }
        .status-badge.deployed::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #d2a8ff; }
        .status-badge.deployed::after { content: 'Deployed'; }
        .status-badge.testing { color: #f0c000; border: 1px solid #f0c000; background: rgba(240, 192, 0, 0.15); }
        .status-badge.testing::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #f0c000; animation: statusPulse 1.5s ease-in-out infinite; }
        .status-badge.testing::after { content: 'Testing'; }
        .status-badge.rework { color: #f85149; border: 1px solid #f85149; background: rgba(248, 81, 73, 0.15); }
        .status-badge.rework::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #f85149; animation: statusPulse 1.5s ease-in-out infinite; }
        .status-badge.rework::after { content: 'Rework'; }
        .status-badge.done { color: #3fb950; border: 1px solid #238636; background: rgba(35, 134, 54, 0.15); }
        .status-badge.done::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #3fb950; }
        .status-badge.done::after { content: 'Done'; }
        .status-reset { display: none; font-size: 9px; color: #6e7681; cursor: pointer; margin-left: 4px; padding: 1px 5px; border: 1px dashed #6e7681; border-radius: 8px; vertical-align: middle; transition: all 0.2s; }
        .status-reset:hover { color: #f85149; border-color: #f85149; }
        .pq-task:hover .status-reset.visible { display: inline; }
        @keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .group-tag { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600; margin-left: 4px; border: 1px solid #30363d; color: #8b949e; }
        .history-entry { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #0d1117; border: 1px solid #21262d; border-radius: 4px; font-size: 11px; }
        .history-version { font-weight: 600; color: #58a6ff; min-width: 55px; }
        .history-type { background: #3b434b; color: #8b949e; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        .history-type.completion { background: rgba(31,111,235,0.2); color: #58a6ff; }
        .history-time { color: #484f58; margin-left: auto; }
        .empty-state { padding: 24px; text-align: center; color: #484f58; font-size: 12px; }

        /* ═══ Backlog (collapsible) ═══ */
        .section-title.collapsible { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px; }
        .section-title.collapsible:hover { color: #58a6ff; }
        .collapse-arrow { font-size: 10px; color: #484f58; transition: transform 0.2s; display: inline-block; }
        .collapse-arrow.open { transform: rotate(90deg); }
        .backlog-count { font-size: 11px; color: #484f58; font-weight: 400; }
        .backlog-panel { margin-top: 8px; }
        .backlog-group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 0 4px; color: #8b949e; }
        .backlog-group-label.now { color: #d29922; }
        .backlog-group-label.soon { color: #58a6ff; }
        .backlog-group-label.later { color: #484f58; }
        .backlog-item { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: #0d1117; border: 1px solid #21262d; border-radius: 4px; font-size: 12px; margin-bottom: 4px; }
        .backlog-item-title { flex: 1; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .backlog-item-group { font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: 600; white-space: nowrap; }
        .backlog-item-group.now { background: rgba(210,153,34,0.2); color: #d29922; }
        .backlog-item-group.soon { background: rgba(88,166,255,0.2); color: #58a6ff; }
        .backlog-item-group.later { background: rgba(72,79,88,0.2); color: #484f58; }

        /* ═══ Undo Toast ═══ */
        .undo-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #21262d; border: 1px solid #30363d; border-radius: 8px; padding: 10px 20px; display: flex; align-items: center; gap: 14px; font-size: 13px; color: #c9d1d9; z-index: 10000; box-shadow: 0 4px 16px rgba(0,0,0,0.4); animation: toastIn 0.2s ease-out; }
        .undo-toast .undo-btn { background: #1f6feb; color: #fff; border: none; border-radius: 4px; padding: 4px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
        .undo-toast .undo-btn:hover { background: #388bfd; }
        .undo-toast .undo-timer { width: 60px; height: 3px; background: #30363d; border-radius: 2px; overflow: hidden; }
        .undo-toast .undo-timer-bar { height: 100%; background: #f0883e; transition: width linear; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* ═══ Action Queue Banner ═══ */
        .action-banner { display: none; background: #161b22; border: 1px solid #1f6feb; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; animation: bannerIn 0.25s ease-out; }
        .action-banner.visible { display: block; }
        .action-banner-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .action-banner-icon { width: 8px; height: 8px; border-radius: 50%; background: #1f6feb; animation: pulse 1.5s ease-in-out infinite; }
        .action-banner-label { font-size: 11px; font-weight: 600; color: #1f6feb; text-transform: uppercase; letter-spacing: 0.5px; }
        .action-banner-time { font-size: 10px; color: #484f58; margin-left: auto; }
        .action-banner-message { font-size: 13px; color: #e6edf3; margin-bottom: 10px; line-height: 1.5; }
        .action-banner-detail { font-size: 12px; color: #8b949e; background: #0d1117; border: 1px solid #21262d; border-radius: 4px; padding: 8px 12px; margin-bottom: 10px; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto; }
        .action-banner-actions { display: flex; align-items: center; gap: 10px; }
        .action-btn { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #30363d; transition: all 0.15s; }
        .action-btn-primary { background: #238636; color: #fff; border-color: #238636; }
        .action-btn-primary:hover { background: #2ea043; }
        .action-btn-copy { background: #21262d; color: #c9d1d9; }
        .action-btn-copy:hover { background: #30363d; }
        .action-btn-fail { background: #da3633; color: #fff; border-color: #da3633; }
        .action-btn-fail:hover { background: #f85149; }
        .action-btn-issue { background: rgba(210,153,34,0.15); color: #d29922; border-color: #d29922; }
        .action-btn-issue:hover { background: rgba(210,153,34,0.3); }
        .action-btn-dismiss { background: transparent; color: #484f58; border: none; font-size: 11px; margin-left: auto; cursor: pointer; }
        .action-btn-dismiss:hover { color: #8b949e; }
        @keyframes bannerIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ═══ Discussion Prompt ═══ */
        .discussion-prompt { display: none; gap: 8px; margin-top: 8px; animation: bannerIn 0.2s ease-out; }
        .discussion-prompt.visible { display: flex; align-items: flex-end; }
        .discussion-prompt textarea { flex: 1; background: #0d1117; border: 1px solid #8b5cf6; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #e6edf3; outline: none; max-width: 500px; min-height: 36px; max-height: 100px; resize: vertical; font-family: inherit; line-height: 1.4; }
        .discussion-prompt textarea:focus { border-color: #a78bfa; box-shadow: 0 0 0 2px rgba(139,92,246,0.2); }
        .discussion-prompt .btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 5px; height: fit-content; }

        /* ═══ Active Discussions List ═══ */
        .discussions-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .discussion-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.3); border-radius: 8px; animation: bannerIn 0.2s ease-out; }
        .discussion-item-dot { width: 8px; height: 8px; border-radius: 50%; background: #8b5cf6; animation: pulse 1.5s ease-in-out infinite; flex-shrink: 0; }
        .discussion-item-label { font-size: 11px; color: #a78bfa; font-weight: 600; flex-shrink: 0; }
        .discussion-item-topic { font-size: 12px; color: #c9d1d9; flex: 1; line-height: 1.4; }
        .discussion-item .btn-close-disc { padding: 3px 10px; font-size: 10px; background: #8b5cf6; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; flex-shrink: 0; }
        .discussion-item .btn-close-disc:hover { background: #a78bfa; }
    </style>
</head>
<body>
    <nav class="suite-nav">
        <a class="suite-home" href="../launchpad.html">
            <span class="brand-ops">Ops</span><span class="brand-flow">Flow</span><span class="brand-better">Better</span>
        </a>
        <div class="p2m-links">
            <a href="index.html" class="p2m-link">Pipeline</a>
            <span class="nav-sep">|</span>
            <a href="media-center.html" class="p2m-link">Media Pipeline</a>
            <span class="nav-sep">|</span>
            <a href="workshop.html" class="p2m-link">Workshop</a>
            <span class="nav-sep">|</span>
            <a href="services.html" class="p2m-link">Services</a>
            <a href="admin.html" class="admin-sep current">ADMIN</a>
        </div>
    </nav>

    <main>
        <div class="breadcrumb">
            <a href="admin.html">Admin</a> <span style="margin:0 4px;">&rsaquo;</span> Workflow
        </div>

        <div class="page-header">
            <h1>Workflow Dashboard <span class="version suite-ver"></span></h1>
            <p class="tagline">Dev cycle tracking &mdash; coding to production</p>
        </div>

        <!-- Controls -->
        <div class="section">
            <div class="controls-bar">
                <button class="btn btn-primary" id="btn-checkpoint" title="Add a checkpoint branch (commit/push/deploy/verify cycle)">+ Checkpoint</button>
                <button class="btn btn-completion" id="btn-completion" title="Add a completion branch (full cycle with testing and done)">+ Completion</button>
                <button class="btn btn-discussion" id="btn-discussion" title="Start a discussion chain — pauses workflow while we talk through something">+ Discussion</button>
                <div class="controls-sep"></div>
                <button class="btn btn-secondary" id="btn-new-story" title="Archive current story to history and start fresh">New Story</button>
                <button class="btn btn-danger" id="btn-reset" title="Clear everything \u2014 active story and all history">Reset All</button>
            </div>
            <div class="discussion-prompt" id="disc-prompt">
                <textarea id="disc-topic" placeholder="What are we discussing?" maxlength="500" rows="2"></textarea>
                <button class="btn btn-discussion btn-sm" id="disc-start">Start</button>
                <button class="btn btn-secondary btn-sm" id="disc-cancel">Cancel</button>
            </div>
        </div>

        <!-- Active Discussions List -->
        <div class="discussions-list" id="disc-list"></div>

        <!-- Action Queue Banner -->
        <div class="action-banner" id="action-banner"></div>

        <!-- SVG Visualization -->
        <div class="section">
            <h2 class="section-title">Active Story</h2>
            <div class="svg-container" id="svg-container">
                <svg id="workflow-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot red"></div> Not started</div>
                <div class="legend-item"><div class="legend-dot yellow"></div> In progress</div>
                <div class="legend-item"><div class="legend-dot green"></div> Complete</div>
                <div class="legend-item" style="margin-left:12px;color:#484f58;">Click any node to cycle its LED</div>
            </div>
        </div>

        <!-- Priority Queue (full featured, collapsible) -->
        <div class="section">
            <h2 class="section-title collapsible" id="pq-toggle" title="Click to expand/collapse PQ">
                <span class="collapse-arrow" id="pq-arrow">&#9660;</span> &#127919; Priority Queue &mdash; Up Next <span id="pq-count" style="color:#484f58;font-size:12px;"></span>
            </h2>
            <div class="pq-list" id="pq-list"></div>
        </div>

        <!-- Cycle History -->
        <div class="section">
            <h2 class="section-title">Cycle History</h2>
            <div class="cycle-history" id="cycle-history"></div>
        </div>

        <!-- Backlog (collapsible) -->
        <div class="section">
            <h2 class="section-title collapsible" id="backlog-toggle" title="Click to expand/collapse backlog">
                <span class="collapse-arrow" id="backlog-arrow">&#9654;</span> Backlog <span class="backlog-count" id="backlog-count"></span>
            </h2>
            <div class="backlog-panel" id="backlog-panel" style="display:none;">
                <div class="backlog-groups" id="backlog-groups"></div>
            </div>
        </div>
    </main>

    <script src="../shared/opsflow-sync.js"></script>
    <script>
    OpsFlow.init();

    // ═══ Constants ═══
    var STATE_KEY = 'opsflow_workflow_state';
    var HISTORY_KEY = 'opsflow_workflow_cycles';
    var PQ_KEY = 'opsflow_tasks_v2';

    // SVG layout constants
    var NODE_R = 14;
    var NODE_SPACING = 100;
    var LEVEL_1_Y = 50;
    var LEVEL_2_Y = 150;
    var LEFT_PAD = 60;
    var MAX_ROW_WIDTH = 1080;
    var ROW_HEIGHT = 180;
    var COLLAPSED_WIDTH = 90;
    var MINI_BRANCH_DROP = 50; // how far below trunk collapsed/discussion branches drop

    var COLORS = { red: '#f85149', yellow: '#d29922', green: '#2ea44f', trunk: '#6e7681', branch: '#6e7681' };

    // Main trunk nodes
    var TRUNK_NODES = [
        { id: 'start',  label: 'Start',  who: 'Claude', tip: 'Claude picks up the task, reads context, and plans the work' },
        { id: 'scan',   label: 'Scan',   who: 'Claude', tip: 'Claude reads all relevant files, checks current state, identifies what needs to change' },
        { id: 'coding', label: 'Coding', who: 'Claude', tip: 'Claude is actively writing code — edits, new features, bug fixes' }
    ];

    // Checkpoint branch template
    var CHECKPOINT_NODES = [
        { id: 'commit',  label: 'Commit Ready', who: 'Claude', tip: 'Claude finished code changes and prepared a commit message for you' },
        { id: 'committed', label: 'Committed',  who: 'Christian', tip: 'Christian copied the commit message into VS Code and committed' },
        { id: 'pushed',  label: 'Pushed',       who: 'Christian', tip: 'Christian pushed the commit to GitHub' },
        { id: 'deployed', label: 'Deployed',    who: 'Auto', tip: 'GitHub Pages automatically deployed the push to the live site' },
        { id: 'verify',  label: 'Verify',       who: 'Claude', tip: 'Claude checks the live site to confirm the deploy looks correct' }
    ];

    // Completion branch template (extends checkpoint + adds testing)
    var COMPLETION_EXTRA = [
        { id: 'testing', label: 'Testing', who: 'Claude', tip: 'Claude runs full self-test suite on the live site — all pages, all features' },
        { id: 'done',    label: 'Done',    who: 'Auto', tip: 'All tests passed — story is complete and archived to history' }
    ];

    // ═══ State Seed (one-time, sets correct position after reset) ═══
    (function seedState() {
        var SEED_KEY = 'opsflow_wf_seed_v0943';
        if (localStorage.getItem(SEED_KEY)) return; // already seeded
        var existing = OpsFlow.getLocal(STATE_KEY);
        if (existing && existing.trunk && existing.branches && existing.branches.length > 0) return; // has real data

        // Set actual current position: mid-story T-119, trunk Start+Scan done, Coding active
        // 4 completed checkpoint deploys: v0.93.1, v0.94.0, v0.94.1, v0.94.2
        function greenNodes() { return { commit: 'green', committed: 'green', pushed: 'green', deployed: 'green', verify: 'green' }; }
        var seed = {
            version: OpsFlow.getLocal('opsflow_version') || '0.94.2',
            trunk: { start: 'green', scan: 'green', coding: 'yellow' },
            branches: [
                { type: 'checkpoint', nodes: greenNodes(), version: 'v0.93.1' },
                { type: 'checkpoint', nodes: greenNodes(), version: 'v0.94.0' },
                { type: 'checkpoint', nodes: greenNodes(), version: 'v0.94.1' },
                { type: 'checkpoint', nodes: greenNodes(), version: 'v0.94.2' }
            ],
            completionMerged: false
        };
        OpsFlow.set(STATE_KEY, seed);
        localStorage.setItem(SEED_KEY, '1');
    })();

    // ═══ State ═══
    var story = loadStory();

    function defaultStory() {
        return {
            version: OpsFlow.getLocal('opsflow_version') || '0.93.0',
            trunk: { start: 'red', scan: 'red', coding: 'red' },
            branches: [],  // { type: 'checkpoint'|'completion', nodes: { commit:'red', ... }, version: '' }
            completionMerged: false
        };
    }

    function loadStory() {
        var s = OpsFlow.getLocal(STATE_KEY);
        if (s && s.trunk) return s;
        return defaultStory();
    }

    function saveStory() {
        OpsFlow.set(STATE_KEY, story);
    }

    // ═══ Actions ═══
    function cycleTrunkNode(nodeId) {
        var c = story.trunk[nodeId] || 'red';
        story.trunk[nodeId] = c === 'red' ? 'yellow' : c === 'yellow' ? 'green' : 'red';
        saveStory();
        render();
    }

    function cycleBranchNode(branchIdx, nodeId) {
        var b = story.branches[branchIdx];
        if (!b) return;
        var c = b.nodes[nodeId] || 'red';
        b.nodes[nodeId] = c === 'red' ? 'yellow' : c === 'yellow' ? 'green' : 'red';
        saveStory();
        render();
    }

    function addCheckpoint() {
        var nodes = {};
        CHECKPOINT_NODES.forEach(function(n) { nodes[n.id] = 'red'; });
        story.branches.push({
            type: 'checkpoint',
            nodes: nodes,
            version: 'v' + (OpsFlow.getLocal('opsflow_version') || '?')
        });
        saveStory();
        render();
    }

    function addCompletion() {
        // Check if completion already exists
        for (var i = 0; i < story.branches.length; i++) {
            if (story.branches[i].type === 'completion') return;
        }
        var nodes = {};
        CHECKPOINT_NODES.forEach(function(n) { nodes[n.id] = 'red'; });
        COMPLETION_EXTRA.forEach(function(n) { nodes[n.id] = 'red'; });
        story.branches.push({
            type: 'completion',
            nodes: nodes,
            version: 'v' + (OpsFlow.getLocal('opsflow_version') || '?')
        });
        saveStory();
        render();
    }

    function newStory() {
        // Log current story to history
        var hist = OpsFlow.getLocal(HISTORY_KEY) || [];
        if (story.branches.length > 0) {
            hist.push({
                version: 'v' + story.version,
                type: story.branches.length > 0 && story.branches[story.branches.length - 1].type === 'completion' ? 'completion' : 'checkpoint',
                checkpoints: story.branches.filter(function(b) { return b.type === 'checkpoint'; }).length,
                timestamp: new Date().toISOString()
            });
            OpsFlow.set(HISTORY_KEY, hist);
        }
        story = defaultStory();
        saveStory();
        render();
    }

    function resetAll() {
        if (!confirm('Reset the entire workflow dashboard? This clears the active story and all history.')) return;
        story = defaultStory();
        saveStory();
        OpsFlow.set(HISTORY_KEY, []);
        render();
    }

    // ═══ Discussion Chains (multiple) ═══
    var DISC_KEY = 'opsflow_discussions';

    // Migrate old single discussion to new array format
    (function migrateDisc() {
        var old = OpsFlow.getLocal('opsflow_discussion');
        if (old && old.topic) {
            var existing = OpsFlow.getLocal(DISC_KEY) || [];
            existing.push({ id: 'disc_migrated_' + (old.started || Date.now()), topic: old.topic, started: old.started || Date.now(), status: old.status || 'closed', ended: old.ended });
            OpsFlow.set(DISC_KEY, existing);
            OpsFlow.set('opsflow_discussion', null); // clear old key
        }
    })();

    function getDiscussions() {
        return OpsFlow.getLocal(DISC_KEY) || [];
    }

    function getOpenDiscussions() {
        return getDiscussions().filter(function(d) { return d.status === 'open'; });
    }

    function showDiscPrompt() {
        document.getElementById('disc-prompt').classList.add('visible');
        document.getElementById('disc-topic').value = '';
        document.getElementById('disc-topic').focus();
    }
    function hideDiscPrompt() {
        document.getElementById('disc-prompt').classList.remove('visible');
    }

    function startDiscussion() {
        var topic = document.getElementById('disc-topic').value.trim();
        if (!topic) { document.getElementById('disc-topic').focus(); return; }

        var discs = getDiscussions();
        var disc = {
            id: 'disc_' + Date.now(),
            topic: topic,
            started: Date.now(),
            status: 'open'
        };
        discs.push(disc);
        OpsFlow.set(DISC_KEY, discs);

        // Add a discussion branch to the story for visual tracking
        story.branches.push({
            type: 'discussion',
            discId: disc.id,
            topic: topic,
            nodes: {},
            version: '',
            started: Date.now()
        });
        saveStory();
        hideDiscPrompt();
        render();
    }

    function closeDiscussionById(discId) {
        var discs = getDiscussions();
        var prevDiscs = JSON.parse(JSON.stringify(discs));
        var prevStory = JSON.parse(JSON.stringify(story));
        var topic = '';

        for (var i = 0; i < discs.length; i++) {
            if (discs[i].id === discId && discs[i].status === 'open') {
                topic = discs[i].topic || 'discussion';
                discs[i].status = 'closed';
                discs[i].ended = Date.now();
                break;
            }
        }
        OpsFlow.set(DISC_KEY, discs);

        // Mark the matching discussion branch as closed
        for (var j = 0; j < story.branches.length; j++) {
            if (story.branches[j].type === 'discussion' && story.branches[j].discId === discId && !story.branches[j].closed) {
                story.branches[j].closed = true;
                story.branches[j].ended = Date.now();
                break;
            }
        }
        saveStory();
        render();

        showUndoToast('Discussion closed: ' + topic, function() {
            OpsFlow.set(DISC_KEY, prevDiscs);
            story = prevStory;
            saveStory();
            render();
        });
    }

    function renderDiscussionState() {
        var listEl = document.getElementById('disc-list');
        var open = getOpenDiscussions();
        if (open.length === 0) { listEl.innerHTML = ''; return; }

        var html = '';
        var allDiscs = getDiscussions();
        open.forEach(function(disc) {
            var num = allDiscs.indexOf(disc) + 1;
            if (num === 0) { for (var d = 0; d < allDiscs.length; d++) { if (allDiscs[d].id === disc.id) { num = d + 1; break; } } }
            html += '<div class="discussion-item">'
                + '<div class="discussion-item-dot"></div>'
                + '<span class="discussion-item-label">Discussion #' + num + ':</span>'
                + '<span class="discussion-item-topic">' + escHtml(disc.topic) + '</span>'
                + '<button class="btn-close-disc" data-disc-id="' + disc.id + '" title="Close this discussion">Close</button>'
                + '</div>';
        });
        listEl.innerHTML = html;

        // Wire close buttons
        listEl.querySelectorAll('[data-disc-id]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                closeDiscussionById(btn.getAttribute('data-disc-id'));
            });
        });
    }

    // ═══ Undo Toast System ═══
    var undoTimer = null;
    var undoToastEl = null;

    function deleteBranchWithUndo(branchIdx) {
        // Save the branch for undo
        var deleted = story.branches[branchIdx];
        var deletedIdx = branchIdx;
        var label = deleted.version || '';

        // Delete immediately
        story.branches.splice(branchIdx, 1);
        saveStory();
        render();

        // Show undo toast
        showUndoToast('Branch ' + label + ' deleted', function() {
            // Undo: re-insert at original position
            story.branches.splice(deletedIdx, 0, deleted);
            saveStory();
            render();
        });
    }

    function showUndoToast(message, undoCallback) {
        // Remove existing toast
        if (undoToastEl) { undoToastEl.remove(); undoToastEl = null; }
        if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }

        var toast = document.createElement('div');
        toast.className = 'undo-toast';
        toast.innerHTML = '<span>' + message + '</span>'
            + '<button class="undo-btn">Undo</button>'
            + '<div class="undo-timer"><div class="undo-timer-bar" style="width:100%"></div></div>';
        document.body.appendChild(toast);
        undoToastEl = toast;

        // Animate timer bar
        var bar = toast.querySelector('.undo-timer-bar');
        requestAnimationFrame(function() {
            bar.style.width = '0%';
            bar.style.transitionDuration = '5s';
        });

        // Undo button
        toast.querySelector('.undo-btn').addEventListener('click', function() {
            if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
            toast.remove();
            undoToastEl = null;
            undoCallback();
        });

        // Auto-dismiss after 5 seconds
        undoTimer = setTimeout(function() {
            if (undoToastEl) { undoToastEl.remove(); undoToastEl = null; }
            undoTimer = null;
        }, 5000);
    }

    // ═══ Auto-detection + PQ Status Sync ═══
    function autoDetect() {
        var tasksData = OpsFlow.getLocal(PQ_KEY);
        if (!tasksData) return;
        var pq = tasksData.priority || [];

        // PQ → Trunk: if any PQ item is in-progress, set coding to yellow
        var hasInProgress = pq.some(function(i) { return i.status === 'in-progress'; });
        if (hasInProgress && story.trunk.coding === 'red') {
            story.trunk.coding = 'yellow';
            saveStory();
        }

        // Trunk → PQ: derive correct PQ status from workflow state
        var derivedStatus = null;
        var hasCompDone = story.branches.some(function(b) {
            return b.type === 'completion' && isBranchComplete(b);
        });
        var hasCheckpointDone = story.branches.some(function(b) {
            return b.type === 'checkpoint' && isBranchComplete(b);
        });

        if (hasCompDone) derivedStatus = 'done';
        else if (hasCheckpointDone) derivedStatus = 'deployed';
        else if (story.trunk.coding === 'yellow' || story.trunk.coding === 'green') derivedStatus = 'in-progress';

        if (derivedStatus) {
            var changed = false;
            var STATUS_RANK = { 'new': 0, 'discussing': 1, 'in-progress': 2, 'deployed': 3, 'testing': 4, 'done': 5 };
            pq.forEach(function(item) {
                var cur = (item.status || 'new').toLowerCase().replace(/\s+/g, '-');
                var curRank = STATUS_RANK[cur] !== undefined ? STATUS_RANK[cur] : 0;
                var newRank = STATUS_RANK[derivedStatus] !== undefined ? STATUS_RANK[derivedStatus] : 0;
                // Only promote forward, never demote
                if (newRank > curRank) {
                    item.status = derivedStatus;
                    changed = true;
                }
            });
            if (changed) {
                OpsFlow.set(PQ_KEY, tasksData);
            }
        }
    }

    // ═══ SVG Rendering ═══
    function updateButtonStates() {
        var btnCP = document.getElementById('btn-checkpoint');
        var btnComp = document.getElementById('btn-completion');
        var btnNew = document.getElementById('btn-new-story');

        // + Checkpoint: enabled when coding is at least in-progress (yellow/green)
        var codingStarted = story.trunk.coding && story.trunk.coding !== 'red';
        btnCP.disabled = !codingStarted;
        btnCP.title = codingStarted
            ? 'Add a checkpoint branch (commit/push/deploy/verify cycle)'
            : 'Start coding first — nothing to checkpoint yet';

        // + Completion: enabled when at least 1 checkpoint exists AND no completion branch yet
        var hasCheckpoint = story.branches.some(function(b) { return b.type === 'checkpoint'; });
        var hasCompletion = story.branches.some(function(b) { return b.type === 'completion'; });
        btnComp.disabled = !hasCheckpoint || hasCompletion;
        if (hasCompletion) btnComp.title = 'Completion branch already exists';
        else if (!hasCheckpoint) btnComp.title = 'Need at least one checkpoint before completing';
        else btnComp.title = 'Add a completion branch (full cycle with testing and done)';

        // New Story: enabled when there are branches to archive
        var hasBranches = story.branches.length > 0;
        btnNew.disabled = !hasBranches;
        btnNew.title = hasBranches
            ? 'Archive current story to history and start fresh'
            : 'No branches to archive yet';

        // Reset All: always enabled

        // + Discussion: always enabled — you can stack multiple
        var btnDisc = document.getElementById('btn-discussion');
        btnDisc.disabled = false;
        var openCount = getOpenDiscussions().length;
        btnDisc.title = openCount > 0
            ? openCount + ' discussion(s) open — add another anytime'
            : 'Start a discussion chain — jot down ideas while waiting on processes';
    }

    function render() {
        autoDetect();
        updateButtonStates();
        renderDiscussionState();
        renderSVG();
        renderPQ();
        renderHistory();
        renderActionBanner();
        renderBacklog();
    }

    // ═══ Helper: is branch all green (collapsed)? ═══
    function isBranchComplete(branch) {
        var keys = Object.keys(branch.nodes);
        for (var i = 0; i < keys.length; i++) {
            if (branch.nodes[keys[i]] !== 'green') return false;
        }
        return keys.length > 0;
    }

    // ═══ Helper: width a branch takes on the trunk ═══
    function branchWidth(branch) {
        if (branch.type === 'discussion') return COLLAPSED_WIDTH; // discussions are always compact
        if (isBranchComplete(branch)) return COLLAPSED_WIDTH;
        var nodeCount = Object.keys(branch.nodes).length;
        return nodeCount * NODE_SPACING + NODE_SPACING; // nodes + merge gap
    }

    function renderSVG() {
        var svg = document.getElementById('workflow-svg');
        svg.innerHTML = '';

        var hasCompletion = story.branches.some(function(b) { return b.type === 'completion'; });
        var hasExpandedBranch = story.branches.some(function(b) { return !isBranchComplete(b); });

        // ── Build a list of "segments" to lay out ──
        // Segments: trunk nodes first, then each branch (collapsed or expanded)
        // We'll walk through and assign x positions, wrapping rows as needed
        var segments = [];

        // Trunk nodes always come first
        TRUNK_NODES.forEach(function(node, i) {
            segments.push({ type: 'trunk', node: node, width: NODE_SPACING });
        });

        // Each branch
        story.branches.forEach(function(branch, bIdx) {
            if (branch.type === 'discussion') {
                // Discussions always render as compact segments
                segments.push({
                    type: 'discussion',
                    branch: branch,
                    bIdx: bIdx,
                    width: COLLAPSED_WIDTH
                });
            } else {
                segments.push({
                    type: isBranchComplete(branch) ? 'collapsed' : 'expanded',
                    branch: branch,
                    bIdx: bIdx,
                    width: branchWidth(branch)
                });
            }
        });

        // Story Done node if completion exists
        if (hasCompletion) {
            segments.push({ type: 'storyDone', width: NODE_SPACING });
        }

        // Arrowhead at end
        segments.push({ type: 'arrow', width: 50 });

        // ── Assign rows and x positions ──
        var rows = []; // array of { segments: [], startX, y1, y2, width }
        var currentRow = { segments: [], startX: LEFT_PAD, width: 0 };
        var x = LEFT_PAD;

        for (var si = 0; si < segments.length; si++) {
            var seg = segments[si];
            var segW = seg.width;

            // Would this segment overflow the row?
            // Don't break in the middle of trunk nodes (first 3 always on row 0)
            var wouldOverflow = (x + segW) > MAX_ROW_WIDTH && currentRow.segments.length > 0;
            var isTrunk = seg.type === 'trunk';

            if (wouldOverflow && !isTrunk) {
                // Finish this row
                currentRow.width = x - currentRow.startX;
                rows.push(currentRow);
                // Start new row
                currentRow = { segments: [], startX: LEFT_PAD, width: 0 };
                x = LEFT_PAD;
            }

            seg.x = x;
            seg.rowIdx = rows.length; // will be set properly after push
            currentRow.segments.push(seg);
            x += segW;
        }
        // Push last row
        if (currentRow.segments.length > 0) {
            currentRow.width = x - currentRow.startX;
            rows.push(currentRow);
        }

        // ── Calculate SVG dimensions ──
        var svgWidth = MAX_ROW_WIDTH + 40;
        var svgHeight = rows.length * ROW_HEIGHT + 20;
        var hasCollapsedOrDisc = story.branches.length > 0;
        if (!hasExpandedBranch && hasCollapsedOrDisc) svgHeight = rows.length * (LEVEL_1_Y + MINI_BRANCH_DROP + 60);
        else if (!hasExpandedBranch) svgHeight = rows.length * (LEVEL_1_Y + 70);

        svg.setAttribute('width', svgWidth);
        svg.setAttribute('height', Math.max(svgHeight, 120));
        svg.setAttribute('viewBox', '0 0 ' + svgWidth + ' ' + Math.max(svgHeight, 120));

        // ── Draw each row ──
        var trunkCodingX = 0; // track where "coding" node is for branch arcs

        rows.forEach(function(row, rIdx) {
            var baseY = rIdx * ROW_HEIGHT + LEVEL_1_Y;
            var branchY = rIdx * ROW_HEIGHT + LEVEL_2_Y;

            // Draw trunk line for this row
            var rowStartX = row.segments[0].x;
            var rowEndX = row.segments[row.segments.length - 1].x + row.segments[row.segments.length - 1].width - 20;

            // Draw row trunk line
            drawLine(svg, rowStartX, baseY, rowEndX, baseY, COLORS.trunk, 2);

            // Draw each segment on this row
            row.segments.forEach(function(seg) {
                if (seg.type === 'trunk') {
                    var color = COLORS[story.trunk[seg.node.id] || 'red'];
                    drawNode(svg, seg.x, baseY, color, seg.node.label, seg.node.who, function() {
                        cycleTrunkNode(seg.node.id);
                    }, seg.node.tip);
                    if (seg.node.id === 'coding') trunkCodingX = seg.x;

                } else if (seg.type === 'collapsed') {
                    // Collapsed branch: fork down, dot on sub-lane, merge back
                    var dotX = seg.x + COLLAPSED_WIDTH / 2;
                    var miniY = baseY + MINI_BRANCH_DROP;
                    var forkX = seg.x + 10;
                    var mergeBackX = seg.x + COLLAPSED_WIDTH - 10;
                    drawBranchArc(svg, forkX, baseY + 4, dotX, miniY - 12, COLORS.green);
                    drawBranchArc(svg, dotX, miniY - 12, mergeBackX, baseY + 4, COLORS.green);
                    drawCollapsedBranch(svg, dotX, miniY, seg.branch, seg.bIdx);

                } else if (seg.type === 'expanded') {
                    // Full expanded branch
                    var branch = seg.branch;
                    var nodeKeys = branch.type === 'completion'
                        ? CHECKPOINT_NODES.concat(COMPLETION_EXTRA).map(function(n) { return n.id; })
                        : CHECKPOINT_NODES.map(function(n) { return n.id; });
                    var nodeCount = nodeKeys.length;

                    var branchStartX = seg.x;
                    var branchEndX = seg.x + (nodeCount - 1) * NODE_SPACING;
                    var mergeX = branchEndX + NODE_SPACING;
                    var branchColor = branch.type === 'completion' ? '#1f6feb' : COLORS.branch;

                    // Branch arc down (start just below trunk to avoid crossing trunk line)
                    drawBranchArc(svg, branchStartX - NODE_SPACING * 0.4, baseY + 6, branchStartX, branchY, branchColor);
                    // Branch horizontal line
                    drawLine(svg, branchStartX, branchY, branchEndX, branchY, branchColor, 2);
                    // Merge arc back up
                    drawBranchArc(svg, branchEndX, branchY, mergeX + NODE_SPACING * 0.4, baseY + 6, branchColor);

                    // Branch label
                    var labelText = branch.type === 'completion' ? 'Completion' : 'Checkpoint ' + (seg.bIdx + 1);
                    if (branch.version) labelText += ' (' + branch.version + ')';
                    var labelCenterX = branchStartX + (branchEndX - branchStartX) / 2;
                    drawText(svg, labelCenterX, branchY - 28, labelText, '10px', branch.type === 'completion' ? '#58a6ff' : '#484f58', 'branch-label');

                    // Delete button
                    drawDeleteBtn(svg, branchEndX + 14, branchY - 32, seg.bIdx);

                    // Branch nodes
                    var allNodeDefs = CHECKPOINT_NODES.concat(COMPLETION_EXTRA);
                    nodeKeys.forEach(function(nodeId, nIdx) {
                        var nx = branchStartX + nIdx * NODE_SPACING;
                        var nodeDef = allNodeDefs.find(function(n) { return n.id === nodeId; });
                        var ncolor = COLORS[branch.nodes[nodeId] || 'red'];
                        drawNode(svg, nx, branchY, ncolor, nodeDef ? nodeDef.label : nodeId, nodeDef ? nodeDef.who : '', (function(bi, ni) {
                            return function() { cycleBranchNode(bi, ni); };
                        })(seg.bIdx, nodeId), nodeDef ? nodeDef.tip : '');
                    });

                    // Merge point on trunk (subtle, slightly below trunk line)
                    drawSmallDot(svg, mergeX + NODE_SPACING * 0.4, baseY, '#484f58');

                } else if (seg.type === 'discussion') {
                    // Discussion chain: fork down, purple dot on sub-lane, merge back if closed
                    var dotX = seg.x + COLLAPSED_WIDTH / 2;
                    var miniY = baseY + MINI_BRANCH_DROP;
                    var isOpen = !seg.branch.closed;
                    var PURPLE = '#8b5cf6';
                    var forkX = seg.x + 10;
                    var mergeBackX = seg.x + COLLAPSED_WIDTH - 10;
                    drawBranchArc(svg, forkX, baseY + 4, dotX, miniY - 12, PURPLE);
                    if (!isOpen) {
                        drawBranchArc(svg, dotX, miniY - 12, mergeBackX, baseY + 4, PURPLE);
                    }
                    drawDiscussionDot(svg, dotX, miniY, seg.branch, seg.bIdx, isOpen);

                } else if (seg.type === 'storyDone') {
                    var doneStatus = 'red';
                    var compBranch = story.branches.find(function(b) { return b.type === 'completion'; });
                    if (compBranch && compBranch.nodes['done'] === 'green') doneStatus = 'green';
                    else if (compBranch && compBranch.nodes['testing'] !== 'red') doneStatus = 'yellow';
                    drawNode(svg, seg.x, baseY, COLORS[doneStatus], 'Story Done', 'Auto', function() {}, 'Story is fully complete — all tasks done, tested, and deployed');

                } else if (seg.type === 'arrow') {
                    drawArrowhead(svg, seg.x, baseY, '#484f58');
                }
            });
        });

        // ── Draw row connectors (routed clear of branch elements) ──
        for (var ri = 0; ri < rows.length - 1; ri++) {
            var thisRowY = ri * ROW_HEIGHT + LEVEL_1_Y;
            var nextRowY = (ri + 1) * ROW_HEIGHT + LEVEL_1_Y;
            var lastSeg = rows[ri].segments[rows[ri].segments.length - 1];
            var thisRowEndX = lastSeg.x + lastSeg.width + 20; // clear past last element
            var nextRowStartX = LEFT_PAD - 20; // start before first element of next row

            // Route: go right past last element → curve down below branches → sweep left → curve up to next row start
            var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            var clearanceY = thisRowY + MINI_BRANCH_DROP + 50; // well below branch dots
            var midX = (thisRowEndX + nextRowStartX) / 2;
            var d = 'M ' + (thisRowEndX - 20) + ',' + thisRowY
                + ' C ' + (thisRowEndX + 30) + ',' + thisRowY
                + ' ' + (thisRowEndX + 30) + ',' + clearanceY
                + ' ' + midX + ',' + clearanceY
                + ' C ' + (nextRowStartX - 30) + ',' + clearanceY
                + ' ' + (nextRowStartX - 30) + ',' + nextRowY
                + ' ' + (nextRowStartX + 20) + ',' + nextRowY;
            path.setAttribute('d', d);
            path.setAttribute('stroke', COLORS.trunk);
            path.setAttribute('stroke-width', '2');
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-dasharray', '6,4');
            path.setAttribute('opacity', '0.7');
            svg.appendChild(path);
        }
    }

    // ═══ Action Queue System ═══
    // KV key: opsflow_action_queue
    // Shape: { id, type, message, detail, status, options, response, created, updated }
    // Types: commit_push, deploy_confirm, test_request, question, info
    // Status: pending → completed | failed | dismissed
    var ACTION_KEY = 'opsflow_action_queue';

    function renderActionBanner() {
        var banner = document.getElementById('action-banner');
        var action = OpsFlow.getLocal(ACTION_KEY);
        if (!action || !action.id || action.status !== 'pending') {
            banner.classList.remove('visible');
            banner.innerHTML = '';
            return;
        }
        banner.classList.add('visible');

        // Auto-create checkpoint when commit_push action appears
        if (action.type === 'commit_push') {
            var cp = ensureActiveCheckpoint();
            if (cp.nodes.commit !== 'green') {
                cp.nodes.commit = 'green'; // Commit Ready
                saveStory();
                render();
            }
        }

        var timeAgo = '';
        if (action.created) {
            var secs = Math.floor((Date.now() - action.created) / 1000);
            if (secs < 60) timeAgo = secs + 's ago';
            else if (secs < 3600) timeAgo = Math.floor(secs / 60) + 'm ago';
            else timeAgo = Math.floor(secs / 3600) + 'h ago';
        }

        var html = '<div class="action-banner-header">'
            + '<div class="action-banner-icon"></div>'
            + '<span class="action-banner-label">Claude requests</span>'
            + '<span class="action-banner-time">' + timeAgo + '</span>'
            + '</div>';

        html += '<div class="action-banner-message">' + escHtml(action.message || '') + '</div>';

        if (action.detail) {
            html += '<div class="action-banner-detail" id="action-detail">' + escHtml(action.detail) + '</div>';
        }

        html += '<div class="action-banner-actions">';

        if (action.type === 'commit_push' && action.detail) {
            html += '<button class="action-btn action-btn-copy" id="action-copy" title="Copy commit message to clipboard">Copy Commit Msg</button>';
        }

        if (action.type === 'question' && action.options && action.options.length) {
            action.options.forEach(function(opt, idx) {
                var cls = idx === 0 ? 'action-btn-primary' : 'action-btn-copy';
                html += '<button class="action-btn ' + cls + '" data-option="' + escHtml(opt) + '">' + escHtml(opt) + '</button>';
            });
        } else if (action.type === 'test_request') {
            html += '<button class="action-btn action-btn-primary" data-respond="pass">Pass</button>';
            html += '<button class="action-btn action-btn-fail" data-respond="fail">Fail</button>';
        }

        // Button order: [Copy Commit] | Report Issue (center) | Done (right) — natural L→R flow
        html += '<button class="action-btn action-btn-issue" id="action-report-issue" title="Report a problem — opens a discussion linked to this action">&#9888; Report Issue</button>';
        if (action.type !== 'info' && action.type !== 'test_request' && !(action.type === 'question' && action.options)) {
            html += '<button class="action-btn action-btn-primary" data-respond="done">Done ✓</button>';
        }
        html += '<button class="action-btn action-btn-dismiss" data-respond="dismissed">Dismiss</button>';
        html += '</div>';

        banner.innerHTML = html;

        // Wire up buttons
        var copyBtn = document.getElementById('action-copy');
        if (copyBtn) {
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(action.detail || '').then(function() {
                    copyBtn.textContent = 'Copied!';
                    setTimeout(function() { copyBtn.textContent = 'Copy Commit Msg'; }, 1500);
                }).catch(function() {});
            });
        }

        banner.querySelectorAll('[data-respond]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                respondToAction(btn.getAttribute('data-respond'));
            });
        });

        banner.querySelectorAll('[data-option]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                respondToAction(btn.getAttribute('data-option'));
            });
        });

        // Report Issue button — marks action as issue + opens discussion prompt
        var issueBtn = document.getElementById('action-report-issue');
        if (issueBtn) {
            issueBtn.addEventListener('click', function() {
                var action = OpsFlow.getLocal(ACTION_KEY);
                if (!action) return;
                // Mark action as issue (not done, not dismissed)
                action.status = 'issue';
                action.response = 'issue_reported';
                action.updated = Date.now();
                OpsFlow.set(ACTION_KEY, action);
                renderActionBanner();
                // Pre-fill discussion prompt with action context
                document.getElementById('disc-prompt').classList.add('visible');
                var textarea = document.getElementById('disc-topic');
                textarea.value = 'Issue with: ' + (action.message || action.type) + '\n';
                textarea.focus();
                textarea.setSelectionRange(textarea.value.length, textarea.value.length);
            });
        }
    }

    // ═══ Action → Checkpoint LED auto-sync ═══
    function getActiveCheckpoint() {
        for (var i = story.branches.length - 1; i >= 0; i--) {
            if (story.branches[i].type === 'checkpoint' && !isBranchComplete(story.branches[i])) return story.branches[i];
        }
        return null;
    }

    function ensureActiveCheckpoint() {
        var active = getActiveCheckpoint();
        if (!active) {
            var nodes = {};
            CHECKPOINT_NODES.forEach(function(n) { nodes[n.id] = 'red'; });
            var ver = OpsFlow.getLocal('opsflow_version') || '?';
            active = { type: 'checkpoint', nodes: nodes, version: 'v' + ver };
            story.branches.push(active);
            saveStory();
        }
        return active;
    }

    function advanceCheckpointTo(stepId) {
        var cp = ensureActiveCheckpoint();
        var allSteps = CHECKPOINT_NODES.map(function(n) { return n.id; });
        var targetIdx = allSteps.indexOf(stepId);
        if (targetIdx === -1) return;
        for (var i = 0; i <= targetIdx; i++) {
            cp.nodes[allSteps[i]] = 'green';
        }
        saveStory();
        render();
    }

    function respondToAction(response) {
        var action = OpsFlow.getLocal(ACTION_KEY);
        if (!action || !action.id) return;

        // Save previous state for undo
        var prevAction = JSON.parse(JSON.stringify(action));
        var prevStory = JSON.parse(JSON.stringify(story));

        action.status = (response === 'dismissed') ? 'dismissed' : 'completed';
        action.response = response;
        action.updated = Date.now();
        OpsFlow.set(ACTION_KEY, action);
        renderActionBanner();

        // Auto-advance checkpoint LEDs based on action type + response
        if (response !== 'dismissed') {
            if (action.type === 'commit_push') {
                // User confirmed commit+push → advance through pushed
                advanceCheckpointTo('pushed');
            } else if (action.type === 'deploy_confirm') {
                // User confirmed deploy → advance through verify (all green)
                advanceCheckpointTo('verify');
            }

            showUndoToast('Action marked ' + response, function() {
                OpsFlow.set(ACTION_KEY, prevAction);
                story = prevStory;
                saveStory();
                renderActionBanner();
                render();
            });
        }
    }

    function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ═══ PQ Render (full featured — mirrors Tasks page) ═══
    function formatTaskNum(n) { return 'T-' + n; }

    function renderPQ() {
        var el = document.getElementById('pq-list');
        var countEl = document.getElementById('pq-count');
        var tasksData = OpsFlow.getLocal(PQ_KEY);
        var pq = (tasksData && tasksData.priority) ? tasksData.priority : [];
        countEl.textContent = '(' + pq.length + ')';
        if (pq.length === 0) { el.innerHTML = '<div class="empty-state">No items in queue. Promote items from Backlog below.</div>'; return; }

        var html = '';
        for (var i = 0; i < pq.length; i++) {
            var t = pq[i];
            var selectHtml = '<select class="pq-order-select" data-pq-id="' + t.id + '">';
            for (var j = 1; j <= pq.length; j++) {
                selectHtml += '<option value="' + j + '"' + (j === i + 1 ? ' selected' : '') + '>' + j + '</option>';
            }
            selectHtml += '</select>';

            var pqPri = t.priority || 'medium';
            var statusCls = (t.status || 'new').toLowerCase().replace(/\s+/g, '-');
            var taskIdLabel = t.taskNum ? formatTaskNum(t.taskNum) : '';
            var resetBtn = (statusCls !== 'new') ? '<span class="status-reset visible" data-reset-id="' + t.id + '" title="Reset to New">&#8617;</span>' : '';
            var groupTag = t.group ? '<span class="group-tag">' + escHtml(t.group) + '</span>' : '';

            html += '<div class="pq-task">';
            html += '<div class="order-num">' + selectHtml + '</div>';
            html += '<span class="priority ' + pqPri + '" data-pri-id="' + t.id + '" title="Click to change priority"></span>';
            html += '<div class="content">';
            html += '<div class="title">' + (taskIdLabel ? '<span class="task-id">' + taskIdLabel + '</span>' : '') + escHtml(t.title || 'Untitled') + '<span class="status-badge ' + statusCls + '" data-status-id="' + t.id + '" title="Click to cycle status"></span>' + resetBtn + '</div>';
            if (t.desc) html += '<div class="desc">' + escHtml(t.desc) + '</div>';
            html += '<div class="meta"><span class="tag">' + escHtml((t.tag || 'FEATURE').toUpperCase()) + '</span>' + groupTag + ' ' + escHtml(t.meta || '') + '</div>';
            html += '</div>';
            html += '<div class="task-actions">';
            html += '<button class="btn-demote" data-demote-id="' + t.id + '" title="Move to Backlog">&darr; Backlog</button>';
            html += '</div>';
            html += '</div>';
        }
        el.innerHTML = html;

        // Wire up interactive elements
        el.querySelectorAll('.pq-order-select').forEach(function(sel) {
            sel.addEventListener('change', function() { pqReorder(sel.getAttribute('data-pq-id'), sel.value); });
        });
        el.querySelectorAll('[data-status-id]').forEach(function(badge) {
            badge.addEventListener('click', function() { pqCycleStatus(badge.getAttribute('data-status-id')); });
        });
        el.querySelectorAll('[data-reset-id]').forEach(function(btn) {
            btn.addEventListener('click', function(e) { e.stopPropagation(); pqResetStatus(btn.getAttribute('data-reset-id')); });
        });
        el.querySelectorAll('[data-pri-id]').forEach(function(pri) {
            pri.addEventListener('click', function() { pqCyclePriority(pri.getAttribute('data-pri-id')); });
        });
        el.querySelectorAll('[data-demote-id]').forEach(function(btn) {
            btn.addEventListener('click', function() { pqDemote(btn.getAttribute('data-demote-id')); });
        });
    }

    // ═══ PQ Actions ═══
    function pqLoadTasks() { return OpsFlow.getLocal(PQ_KEY); }
    function pqSaveTasks(data) { OpsFlow.set(PQ_KEY, data); }

    function pqReorder(id, newPos) {
        var data = pqLoadTasks(); if (!data) return;
        newPos = parseInt(newPos, 10);
        var oldIdx = -1;
        for (var i = 0; i < data.priority.length; i++) { if (data.priority[i].id === id) { oldIdx = i; break; } }
        if (oldIdx === -1) return;
        var item = data.priority.splice(oldIdx, 1)[0];
        data.priority.splice(newPos - 1, 0, item);
        pqSaveTasks(data); renderPQ();
    }

    function pqCycleStatus(id) {
        var data = pqLoadTasks(); if (!data) return;
        var cycle = { 'new': 'discussing', 'discussing': 'in-progress', 'in-progress': 'deployed', 'deployed': 'testing', 'testing': 'rework', 'rework': 'in-progress' };
        for (var i = 0; i < data.priority.length; i++) {
            if (data.priority[i].id === id) {
                var current = (data.priority[i].status || 'new').toLowerCase().replace(/\s+/g, '-');
                if (current === 'done') break;
                data.priority[i].status = cycle[current] || 'new';
                break;
            }
        }
        pqSaveTasks(data); renderPQ();
    }

    function pqResetStatus(id) {
        var data = pqLoadTasks(); if (!data) return;
        for (var i = 0; i < data.priority.length; i++) {
            if (data.priority[i].id === id) { data.priority[i].status = 'new'; break; }
        }
        pqSaveTasks(data); renderPQ();
    }

    function pqCyclePriority(id) {
        var data = pqLoadTasks(); if (!data) return;
        var cycle = { high: 'medium', medium: 'low', low: 'high' };
        for (var i = 0; i < data.priority.length; i++) {
            if (data.priority[i].id === id) {
                var current = data.priority[i].priority || 'medium';
                data.priority[i].priority = cycle[current] || 'medium';
                break;
            }
        }
        pqSaveTasks(data); renderPQ();
    }

    function pqDemote(id) {
        var data = pqLoadTasks(); if (!data) return;
        var idx = -1;
        for (var i = 0; i < data.priority.length; i++) { if (data.priority[i].id === id) { idx = i; break; } }
        if (idx === -1) return;
        var item = data.priority.splice(idx, 1)[0];
        item.id = 'bl_' + Date.now();
        item.priority = item.priority || 'medium';
        data.backlog.unshift(item);
        pqSaveTasks(data);
        showUndoToast('Moved to Backlog', function() {
            data.backlog.shift();
            item.id = 'pq_' + Date.now();
            data.priority.splice(idx, 0, item);
            pqSaveTasks(data);
            render();
        });
        render();
    }

    // ═══ History Render ═══
    function renderHistory() {
        var el = document.getElementById('cycle-history');
        var hist = OpsFlow.getLocal(HISTORY_KEY) || [];
        if (hist.length === 0) { el.innerHTML = '<div class="empty-state">No completed cycles yet</div>'; return; }
        el.innerHTML = '';
        var sorted = hist.slice().reverse().slice(0, 20);
        sorted.forEach(function(entry) {
            var t = new Date(entry.timestamp);
            var timeStr = t.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + t.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            var div = document.createElement('div');
            div.className = 'history-entry';
            div.innerHTML = '<span class="history-version">' + (entry.version || '?') + '</span>'
                + '<span class="history-type ' + (entry.type || '') + '">' + (entry.type === 'completion' ? 'Completion' : 'Checkpoint') + '</span>'
                + (entry.checkpoints ? '<span style="color:#484f58;font-size:10px;">' + entry.checkpoints + ' checkpoints</span>' : '')
                + '<span class="history-time">' + timeStr + '</span>';
            el.appendChild(div);
        });
    }

    // ═══ Backlog Render ═══
    var _backlogOpen = false;
    function renderBacklog() {
        var tasksData = OpsFlow.getLocal(PQ_KEY);
        var backlog = (tasksData && tasksData.backlog) ? tasksData.backlog : [];
        var countEl = document.getElementById('backlog-count');
        countEl.textContent = '(' + backlog.length + ')';

        if (!_backlogOpen) return; // don't render contents when collapsed

        var el = document.getElementById('backlog-groups');
        if (backlog.length === 0) { el.innerHTML = '<div class="empty-state">No backlog items</div>'; return; }

        // Group dynamically by whatever group field items have
        var groups = {};
        var groupOrder = [];
        backlog.forEach(function(item) {
            var g = item.group || 'Other';
            if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
            groups[g].push(item);
        });
        // Sort groups alphabetically
        groupOrder.sort();

        // Color map for known groups
        var GROUP_COLORS = {
            Pipeline: '#d29922', AI: '#8b5cf6', Architecture: '#1f6feb',
            Infrastructure: '#f0883e', Services: '#2ea44f', UX: '#e6edf3',
            QA: '#f85149', Media: '#388bfd', Workshop: '#a78bfa',
            Keywords: '#58a6ff', Templates: '#8b949e'
        };

        var html = '';
        groupOrder.forEach(function(groupName) {
            var items = groups[groupName];
            if (!items || items.length === 0) return;
            var gColor = GROUP_COLORS[groupName] || '#8b949e';
            html += '<div class="backlog-group-label" style="color:' + gColor + '">' + escHtml(groupName) + ' (' + items.length + ')</div>';
            items.forEach(function(item) {
                var title = item.title || 'Untitled';
                var statusClass = item.status ? item.status.toLowerCase().replace(/\s+/g, '-') : '';
                html += '<div class="backlog-item" title="' + escHtml(item.desc || title) + '">'
                    + '<span class="backlog-item-title">' + escHtml(title) + '</span>'
                    + '<span class="backlog-item-group" style="background:' + gColor + '20;color:' + gColor + '">' + escHtml(groupName) + '</span>';
                if (item.status && item.status.toLowerCase() !== 'new') {
                    html += '<span class="status-badge ' + statusClass + '">' + escHtml(item.status) + '</span>';
                }
                html += '</div>';
            });
        });
        el.innerHTML = html;
    }

    // PQ collapse toggle (persists to localStorage)
    var _pqOpen = localStorage.getItem('opsflow_pq_open') !== 'false'; // open by default
    (function initPQToggle() {
        var list = document.getElementById('pq-list');
        var arrow = document.getElementById('pq-arrow');
        if (!_pqOpen) { list.style.display = 'none'; arrow.innerHTML = '&#9654;'; }
    })();
    document.getElementById('pq-toggle').addEventListener('click', function() {
        _pqOpen = !_pqOpen;
        localStorage.setItem('opsflow_pq_open', _pqOpen);
        var list = document.getElementById('pq-list');
        var arrow = document.getElementById('pq-arrow');
        list.style.display = _pqOpen ? 'block' : 'none';
        arrow.innerHTML = _pqOpen ? '&#9660;' : '&#9654;';
        if (_pqOpen) renderPQ();
    });

    document.getElementById('backlog-toggle').addEventListener('click', function() {
        _backlogOpen = !_backlogOpen;
        var panel = document.getElementById('backlog-panel');
        var arrow = document.getElementById('backlog-arrow');
        panel.style.display = _backlogOpen ? 'block' : 'none';
        if (_backlogOpen) { arrow.classList.add('open'); } else { arrow.classList.remove('open'); }
        renderBacklog();
    });

    // ═══ Event Listeners ═══
    document.getElementById('btn-checkpoint').addEventListener('click', addCheckpoint);
    document.getElementById('btn-completion').addEventListener('click', addCompletion);
    document.getElementById('btn-new-story').addEventListener('click', newStory);
    document.getElementById('btn-reset').addEventListener('click', resetAll);

    // Discussion controls
    document.getElementById('btn-discussion').addEventListener('click', showDiscPrompt);
    document.getElementById('disc-start').addEventListener('click', startDiscussion);
    document.getElementById('disc-cancel').addEventListener('click', hideDiscPrompt);
    // Close buttons are wired dynamically in renderDiscussionState()
    document.getElementById('disc-topic').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startDiscussion(); }
        if (e.key === 'Escape') hideDiscPrompt();
    });

    // Listen for storage changes (other tabs)
    window.addEventListener('storage', function(e) {
        if (e.key === PQ_KEY || e.key === 'opsflow_version') render();
    });

    // ═══ Auto-Refresh Polling (same tab updates) ═══
    var _lastSnapshot = '';
    function getStateSnapshot() {
        var s = JSON.stringify(OpsFlow.getLocal(STATE_KEY) || {});
        var p = JSON.stringify(OpsFlow.getLocal(PQ_KEY) || {});
        var h = JSON.stringify(OpsFlow.getLocal(HISTORY_KEY) || []);
        var v = localStorage.getItem('opsflow_version') || '';
        var a = JSON.stringify(OpsFlow.getLocal(ACTION_KEY) || {});
        var d = JSON.stringify(OpsFlow.getLocal(DISC_KEY) || {});
        return s + '|' + p + '|' + h + '|' + v + '|' + a + '|' + d;
    }
    _lastSnapshot = getStateSnapshot();
    setInterval(function() {
        var snap = getStateSnapshot();
        if (snap !== _lastSnapshot) {
            _lastSnapshot = snap;
            story = OpsFlow.getLocal(STATE_KEY) || makeBlankStory();
            render();
        }
    }, 10000); // 10-second poll

    // ═══ Init ═══
    render();
    </script>
    <script>OpsFlow.init();</script>
</body>
</html>
