<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Git Branch Diagram</title>
<style>
  body { background: #fff; font-family: sans-serif; padding: 20px; }
</style>
</head>
<body>

<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Lane labels -->
<text font-size="12" fill="#888" x="38" y="100" text-anchor="middle" dominant-baseline="central">main</text>
<text font-size="12" fill="#888" x="38" y="200" text-anchor="middle" dominant-baseline="central">feature</text>
<text font-size="12" fill="#888" x="38" y="300" text-anchor="middle" dominant-baseline="central">hotfix</text>
<text font-size="12" fill="#888" x="38" y="400" text-anchor="middle" dominant-baseline="central">release</text>

<!-- Swimlane guide lines (dashed) -->
<line x1="70" y1="100" x2="640" y2="100" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 6"/>
<line x1="70" y1="200" x2="640" y2="200" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 6"/>
<line x1="70" y1="300" x2="640" y2="300" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 6"/>
<line x1="70" y1="400" x2="640" y2="400" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 6"/>

<!-- MAIN branch line -->
<line x1="90" y1="100" x2="620" y2="100" stroke="#aaa" stroke-width="1.5"/>

<!-- FEATURE branch line -->
<line x1="210" y1="200" x2="460" y2="200" stroke="#aaa" stroke-width="1.5"/>

<!-- HOTFIX branch line -->
<line x1="330" y1="300" x2="500" y2="300" stroke="#aaa" stroke-width="1.5"/>

<!-- RELEASE branch line -->
<line x1="510" y1="400" x2="610" y2="400" stroke="#aaa" stroke-width="1.5"/>

<!-- Branch-off: main → feature (C2 → F1) -->
<path d="M210 100 Q210 150 210 200" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Branch-off: main → hotfix (C4 → H1) -->
<path d="M330 100 Q330 200 330 300" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Branch-off: main → release (C6 → R1) -->
<path d="M510 100 Q510 250 510 400" fill="none" stroke="#533AB7" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- Merge: feature → main (F3 → M1) -->
<path d="M460 200 Q460 150 490 100" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Merge: hotfix → main (H2 → M2) -->
<path d="M500 300 Q500 200 540 100" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Merge: release → main (R2 → M3) -->
<path d="M610 400 Q610 250 610 100" fill="none" stroke="#533AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- MAIN commits -->
<g style="cursor:pointer" onclick="alert('C1: Initial commit')">
  <circle cx="90" cy="100" r="14" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="90" y="100" text-anchor="middle" dominant-baseline="central">C1</text>
</g>
<g style="cursor:pointer" onclick="alert('C2: Branch point for feature')">
  <circle cx="210" cy="100" r="14" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="210" y="100" text-anchor="middle" dominant-baseline="central">C2</text>
</g>
<g style="cursor:pointer" onclick="alert('C3: Commit on main')">
  <circle cx="330" cy="100" r="14" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="330" y="100" text-anchor="middle" dominant-baseline="central">C3</text>
</g>
<g style="cursor:pointer" onclick="alert('C4: Commit on main')">
  <circle cx="430" cy="100" r="14" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#444" x="430" y="100" text-anchor="middle" dominant-baseline="central">C4</text>
</g>
<!-- Merge commit: feature into main -->
<g style="cursor:pointer" onclick="alert('M1: Merge feature into main')">
  <circle cx="490" cy="100" r="14" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#085041" x="490" y="100" text-anchor="middle" dominant-baseline="central">M1</text>
</g>
<!-- Merge commit: hotfix into main -->
<g style="cursor:pointer" onclick="alert('M2: Merge hotfix into main')">
  <circle cx="545" cy="100" r="14" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#633806" x="545" y="100" text-anchor="middle" dominant-baseline="central">M2</text>
</g>
<!-- Merge commit: release into main -->
<g style="cursor:pointer" onclick="alert('M3: Merge release into main')">
  <circle cx="610" cy="100" r="14" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" fill="#26215C" x="610" y="100" text-anchor="middle" dominant-baseline="central">M3</text>
</g>

<!-- FEATURE commits -->
<g style="cursor:pointer" onclick="alert('F1: First feature commit')">
  <circle cx="280" cy="200" r="14" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#085041" x="280" y="200" text-anchor="middle" dominant-baseline="central">F1</text>
</g>
<g style="cursor:pointer" onclick="alert('F2: Second feature commit')">
  <circle cx="370" cy="200" r="14" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#085041" x="370" y="200" text-anchor="middle" dominant-baseline="central">F2</text>
</g>
<g style="cursor:pointer" onclick="alert('F3: Final feature commit — ready to merge')">
  <circle cx="460" cy="200" r="14" fill="#5DCAA5" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#085041" x="460" y="200" text-anchor="middle" dominant-baseline="central">F3</text>
</g>

<!-- HOTFIX commits -->
<g style="cursor:pointer" onclick="alert('H1: Hotfix commit')">
  <circle cx="400" cy="300" r="14" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#633806" x="400" y="300" text-anchor="middle" dominant-baseline="central">H1</text>
</g>
<g style="cursor:pointer" onclick="alert('H2: Hotfix complete — ready to merge')">
  <circle cx="500" cy="300" r="14" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#633806" x="500" y="300" text-anchor="middle" dominant-baseline="central">H2</text>
</g>

<!-- RELEASE commits -->
<g style="cursor:pointer" onclick="alert('R1: Release branch commit')">
  <circle cx="560" cy="400" r="14" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" fill="#26215C" x="560" y="400" text-anchor="middle" dominant-baseline="central">R1</text>
</g>
<g style="cursor:pointer" onclick="alert('R2: Release finalized — ready to merge')">
  <circle cx="610" cy="400" r="14" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" fill="#26215C" x="610" y="400" text-anchor="middle" dominant-baseline="central">R2</text>
</g>

<!-- Legend -->
<circle cx="90" cy="455" r="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" fill="#888" x="102" y="459">Feature branch</text>
<circle cx="210" cy="455" r="6" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" fill="#888" x="222" y="459">Hotfix branch</text>
<circle cx="330" cy="455" r="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" fill="#888" x="342" y="459">Release branch</text>
<circle cx="460" cy="455" r="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" fill="#888" x="472" y="459">Main / merge commit</text>

</svg>

</body>
</html>
